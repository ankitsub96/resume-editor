    var map = new Map();
    entries.forEach(function (e) {
      var key = e.section.toLowerCase();
      if (!map.has(key)) {
        map.set(key, { displayName: e.section, items: [] });
      }
      map.get(key).items.push(e);
    });
    return map;
  }

  
  function renderSectionMenu(grouped){
    sectionMenuEl.innerHTML='<div class="menu-title">📚 Sections</div>';
    grouped.forEach(function(group){
      var id='section-'+group.displayName.toLowerCase().replace(/[^a-z0-9]+/g,'-');
      var b=document.createElement('button');
      b.className='menu-item';
      b.dataset.target=id;
      b.textContent=group.displayName+' ('+group.items.length+')';

      b.onclick=function(){
        localStorage.setItem('lastSection', id);

        document.querySelectorAll('.section').forEach(function(s){
          s.style.display='none';
        });

        document.querySelectorAll('.menu-item').forEach(function(x){
          x.classList.remove('active');
        });

        var t=document.getElementById(id);
        if(t) t.style.display='';

        b.classList.add('active');
      };

      sectionMenuEl.appendChild(b);
    });

    setTimeout(function(){
      var saved=localStorage.getItem('lastSection');
      var btn=document.querySelector('.menu-item[data-target="'+saved+'"]')
              || document.querySelector('.menu-item');

      if(btn) btn.click();
    },0);
  }


  function render(entries, warnings, sourceLabel) {
    showWarnings(warnings);
    contentEl.innerHTML = "";

    if (!entries || entries.length === 0) {
      setStatus("0 questions loaded.");
      var empty = document.createElement("div");
      empty.className = "empty-state";
      empty.textContent = "No questions loaded yet — use \"Load JSON files\" or \"Load folder\" above to add a question set.";
      contentEl.appendChild(empty);
      return;
    }

    setStatus(entries.length + " question(s) loaded" + (sourceLabel ? " — " + sourceLabel : "") +
      (warnings && warnings.length ? " (" + warnings.length + " skipped)" : ""));

    var grouped = groupBySection(entries);
    renderSectionMenu(grouped);
    grouped.forEach(function (group) {
      var section = document.createElement("section");
      section.className="section";
      section.id="section-"+group.displayName.toLowerCase().replace(/[^a-z0-9]+/g,"-");

      var header = document.createElement("div");
      header.className = "section-header";
      header.innerHTML = renderInlineMD(group.displayName) +
        ' <span class="count">(' + group.items.length + ")</span>";
      section.appendChild(header);

      group.items.forEach(function (item) {
        var details = document.createElement("details");
        details.className = "q-item";

        var summary = document.createElement("summary");
        summary.className = "q-row";
        summary.innerHTML =
          '<span class="chevron">&#9656;</span>' +
          '<span class="q-text">' + renderInlineMD(item.question) + "</span>";
        details.appendChild(summary);

        var panel = document.createElement("div");
        panel.className = "a-panel";
        if (item.answer && item.answer.trim()) {
          panel.innerHTML = renderBlockMD(item.answer);
        } else {
          panel.innerHTML = '<p class="placeholder-answer">No answer provided</p>';
        }
        details.appendChild(panel);

        section.appendChild(details);
      });

      contentEl.appendChild(section);
    });
  }

  function readFileAsText(file) {
    return new Promise(function (resolve, reject) {
      var reader = new FileReader();
      reader.onload = function () { resolve(reader.result); };
      reader.onerror = function () { reject(reader.error); };
      reader.readAsText(file);
    });
  }

  function loadFiles(fileList) {
    var files = Array.prototype.filter.call(fileList, function (f) {
      return /\.json$/i.test(f.name);
    });
    if (files.length === 0) {
      render([], ["No .json files found in the selection."], "manual selection");
      return;
    }
    Promise.all(files.map(function (file) {
      return readFileAsText(file).then(function (text) {
        var parsed;
        try {
          parsed = JSON.parse(text);
        } catch (e) {
          return { entries: [], warnings: [file.name + ": invalid JSON — file skipped"] };
        }
        return validateEntries(parsed, file.name);
      }).catch(function () {
        return { entries: [], warnings: [file.name + ": could not be read — file skipped"] };
      });
    })).then(function (results) {
      var allEntries = [];
      var allWarnings = [];
      results.forEach(function (r) {
        allEntries = allEntries.concat(r.entries);
        allWarnings = allWarnings.concat(r.warnings);
      });
      // Picked files REPLACE the currently displayed dataset (simpler, predictable UX).
      render(allEntries, allWarnings, "loaded from " + files.length + " file(s) you selected");
    });
  }

  document.getElementById("loadFilesBtn").addEventListener("click", function () {
    document.getElementById("filePicker").click();
  });
  document.getElementById("loadFolderBtn").addEventListener("click", function () {
    document.getElementById("folderPicker").click();
  });
  document.getElementById("filePicker").addEventListener("change", function (e) {
    if (e.target.files.length) loadFiles(e.target.files);
    e.target.value = "";
  });
  document.getElementById("folderPicker").addEventListener("change", function (e) {
    if (e.target.files.length) loadFiles(e.target.files);
    e.target.value = "";
  });

  // Initial render from the build-time embedded dataset, if present.
  // Run it through the same validation as picked files, so a hand-edited or
  // malformed EMBEDDED_DATA array degrades gracefully instead of crashing.
  var initial = validateEntries(EMBEDDED_DATA, "embedded data");
  render(initial.entries, initial.warnings, initial.entries.length ? "built in" : "");
})();
</script>

<script>
(function(){
const themes=[
{name:'Noir',bg:'#10141a',raised:'#161c24',accent:'#8fbf7f'},
{name:'Arctic',bg:'#f5f7fb',raised:'#ffffff',accent:'#3b82f6'},
{name:'Dracula',bg:'#282a36',raised:'#343746',accent:'#bd93f9'},
{name:'Nord',bg:'#2e3440',raised:'#3b4252',accent:'#88c0d0'},
{name:'Tokyo',bg:'#1a1b26',raised:'#24283b',accent:'#7aa2f7'},
{name:'Gruvbox',bg:'#282828',raised:'#3c3836',accent:'#fabd2f'},
{name:'Emerald',bg:'#0f172a',raised:'#1e293b',accent:'#10b981'},
{name:'Solarized',bg:'#002b36',raised:'#073642',accent:'#2aa198'},
{name:'Catppuccin',bg:'#1e1e2e',raised:'#313244',accent:'#f5c2e7'},
{name:'Cyberpunk',bg:'#0d0221',raised:'#1a1040',accent:'#ff00ff'}
];
let themeIndex=+localStorage.getItem('themeIndex')||0;
function applyTheme(){
 const t=themes[themeIndex];
 document.documentElement.style.setProperty('--bg',t.bg);
 document.documentElement.style.setProperty('--bg-raised',t.raised);
 document.documentElement.style.setProperty('--accent',t.accent);
}
applyTheme();

document.getElementById('themeBtn').onclick=function(){
 themeIndex=(themeIndex+1)%themes.length;
 localStorage.setItem('themeIndex',themeIndex);
 applyTheme();
};

function updateProgress(){
 const total=document.querySelectorAll('details.q-item').length;
 const done=JSON.parse(localStorage.getItem('doneQuestions')||'[]').length;
 const badge=document.getElementById('progressBadge');
 if(badge) badge.textContent=`Progress ${done}/${total}`;
}

function wireQuestions(){
 const favs=JSON.parse(localStorage.getItem('favorites')||'[]');
 document.querySelectorAll('details.q-item').forEach(function(d,i){
   const q=d.querySelector('.q-text');
   if(!q || d.dataset.enhanced) return;
   d.dataset.enhanced='1';

   const star=document.createElement('span');
   star.textContent=favs.includes(i)?'⭐':'☆';
   star.style.cursor='pointer';
   star.style.marginRight='8px';
   q.prepend(star);

   star.onclick=function(e){
      e.stopPropagation();
      let arr=JSON.parse(localStorage.getItem('favorites')||'[]');
      if(arr.includes(i)) arr=arr.filter(x=>x!==i);
      else arr.push(i);
      localStorage.setItem('favorites',JSON.stringify(arr));
      star.textContent=arr.includes(i)?'⭐':'☆';
   };

   d.addEventListener('toggle',function(){
      if(d.open){
         document.querySelectorAll('details.q-item').forEach(function(o){
            if(o!==d) o.open=false;
         });
         let done=JSON.parse(localStorage.getItem('doneQuestions')||'[]');
         if(!done.includes(i)){
            done.push(i);
            localStorage.setItem('doneQuestions',JSON.stringify(done));
         }
         localStorage.setItem('lastQuestionIndex',i);
         updateProgress();
      }
   });
 });

 updateProgress();

 const last=+localStorage.getItem('lastQuestionIndex');
 const qs=document.querySelectorAll('details.q-item');
 if(qs[last]){
    setTimeout(()=>{
      qs[last].open=true;
      qs[last].scrollIntoView({behavior:'smooth',block:'start'});
    },500);
 }
}

const observer=new MutationObserver(()=>wireQuestions());
observer.observe(document.getElementById('content'),{childList:true,subtree:true});
setTimeout(wireQuestions,1000);

document.getElementById('globalSearch').addEventListener('input',function(e){
 const q=e.target.value.toLowerCase();
 document.querySelectorAll('details.q-item').forEach(function(d){
   const txt=d.innerText.toLowerCase();
   d.style.display=txt.includes(q)?'':'none';
 });
});

document.getElementById('showFavBtn').onclick=function(){
 const favs=JSON.parse(localStorage.getItem('favorites')||'[]');
 document.querySelectorAll('details.q-item').forEach(function(d,i){
    d.style.display=favs.includes(i)?'':'none';
 });
};

document.addEventListener('keydown',function(e){
 if(e.key==='/' && document.activeElement.id!=='globalSearch'){
   e.preventDefault();
   document.getElementById('globalSearch').focus();
 }
 const qs=[...document.querySelectorAll('details.q-item')].filter(x=>x.offsetParent!==null);
 const current=qs.findIndex(x=>x.open);
 if(e.key==='j' && current<qs.length-1){qs[current+1].open=true;qs[current+1].scrollIntoView({behavior:'smooth'});}
 if(e.key==='k' && current>0){qs[current-1].open=true;qs[current-1].scrollIntoView({behavior:'smooth'});}
 if(e.key==='f' && current>=0){
   const s=qs[current].querySelector('.q-text span');
   if(s) s.click();
 }
});
})();
</script>


<script>
(function(){
  function restoreLastAnswer(){
    var lastId = localStorage.getItem('lastQuestionId');
    if(!lastId) return;

    var target = document.querySelector('details[data-qid="'+lastId.replace(/"/g,'\\"')+'"]');
    if(!target) return;

    var sec = target.closest('.section');
    if(sec){
      var btn = document.querySelector('.menu-item[data-target="'+sec.id+'"]');
      if(btn) btn.click();
    }

    setTimeout(function(){
      target.open = true;
      target.scrollIntoView({behavior:'smooth', block:'start'});
    }, 500);
  }

  var observer = new MutationObserver(function(){
    document.querySelectorAll('details.q-item').forEach(function(d, idx){
      if(d.dataset.persistBound) return;
      d.dataset.persistBound='1';
      if(!d.dataset.qid) d.dataset.qid='q-'+idx+'-'+(d.querySelector('summary')?.innerText||'').slice(0,50);

      d.addEventListener('toggle', function(){
        if(d.open){
          localStorage.setItem('lastQuestionId', d.dataset.qid);
          document.querySelectorAll('details.q-item').forEach(function(o){
            if(o!==d) o.open=false;
          });
        }
      });
    });
    restoreLastAnswer();
  });

  observer.observe(document.getElementById('content'), {childList:true, subtree:true});
})();
</script>
