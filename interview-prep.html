t.\n\n---\n\n## Detailed Explanation\n\n`partial()` creates a new callable with some arguments already bound.\n\nCompared to anonymous lambdas, it:\n\n- Preserves metadata.\n- Is often picklable.\n- Exposes underlying function information.\n- Clearly communicates intent.\n\n---\n\n## Why does this matter?\n\nFeatures such as multiprocessing frequently require functions to be serializable, making `partial()` preferable.\n\n---\n\n## Interview Follow-ups\n\n- Why are lambdas often not picklable?\n- When would a closure be preferable to `partial()`?"}, {"section": "Python Basics", "question": "What does `if __name__ == \"__main__\":` actually check, and why use it?", "answer": "## Short Answer\n\nThe condition checks whether the file is being executed directly rather than imported as a module.\n\n---\n\n## Detailed Explanation\n\nWhen a file is executed directly, Python sets `__name__` to `\"__main__\"`.\n\nWhen imported, `__name__` contains the module's actual name.\n\nPlacing script-specific logic inside this guard prevents it from running during imports.\n\n---\n\n## Benefits\n\n- Allows files to be both reusable modules and executable scripts.\n- Prevents accidental execution during imports.\n- Simplifies testing and code organization.\n\n---\n\n## Interview Follow-ups\n\n- What happens when a module is imported?\n- Why is top-level executable code generally discouraged?"}, {"section": "Python Basics", "question": "What's the difference between an absolute import and a relative import within a package?", "answer": "## Short Answer\n\nAn **absolute import** specifies the complete path from the project's top-level package, whereas a **relative import** uses leading dots to import modules relative to the current module.\n\n---\n\n## Absolute Imports\n\nAbsolute imports explicitly state the full package hierarchy.\n\n### Benefits\n\n- Easier to read and understand.\n- More resilient during refactoring.\n- Less ambiguity in large codebases.\n- Preferred by most style guides.\n\n---\n\n## Relative Imports\n\nRelative imports use `.` notation to reference nearby modules within the same package.\n\n### Benefits\n\n- Shorter import statements.\n- Useful when reorganizing internal package structures.\n\n### Limitations\n\n- Only work inside packages.\n- Cannot be used reliably in standalone scripts.\n- Can become confusing in deeply nested packages.\n\n---\n\n## Best Practice\n\nMost production code prefers absolute imports for clarity and maintainability.\n\n---\n\n## Interview Follow-ups\n\n- Why do relative imports fail in standalone scripts?\n- What determines Python's import search path?"}, {"section": "Python Basics", "question": "What's the purpose of `__init__.py` in a package directory?", "answer": "## Short Answer\n\n`__init__.py` identifies a directory as a Python package and executes when the package is imported.\n\n---\n\n## Detailed Explanation\n\nHistorically, every package directory required an `__init__.py` file.\n\nAlthough namespace packages introduced in Python 3.3 can exist without it, explicitly including the file remains the standard convention.\n\n---\n\n## Common Uses\n\n- Expose selected classes and functions at the package level.\n- Simplify package imports.\n- Perform package initialization.\n- Define package metadata.\n- Control the package's public API.\n\n---\n\n## Why is it useful?\n\nIt allows package authors to hide internal implementation details while presenting a clean interface to users.\n\n---\n\n## Interview Follow-ups\n\n- What are namespace packages?\n- How does `__all__` interact with `__init__.py`?"}, {"section": "Python Basics", "question": "What's the difference between `requirements.txt` and `pyproject.toml` in a modern Python project?", "answer": "## Short Answer\n\n`requirements.txt` lists dependencies to install, whereas `pyproject.toml` describes the entire Python project, including metadata, dependencies, and build configuration.\n\n---\n\n## `requirements.txt`\n\nTypically contains a flat list of dependencies and versions.\n\nIt is commonly used with:\n\n```bash\npip install -r requirements.txt\n```\n\nIts primary purpose is dependency installation and reproducibility.\n\n---\n\n## `pyproject.toml`\n\nIntroduced through PEP 518 and PEP 621, it serves as the standardized configuration file for modern Python projects.\n\nIt can define:\n\n- Project metadata.\n- Dependencies.\n- Build system configuration.\n- Tool configuration (`black`, `pytest`, `ruff`, etc.).\n- Package version information.\n\n---\n\n## Modern Trend\n\nMost modern packaging tools such as Poetry, PDM, Hatch, and modern versions of pip rely heavily on `pyproject.toml`.\n\n---\n\n## Interview Follow-ups\n\n- What problems did PEP 518 solve?\n- How does Poetry use `pyproject.toml`?"}, {"section": "Python Basics", "question": "Why is it best practice to use a virtual environment per project instead of installing packages globally?", "answer": "## Short Answer\n\nVirtual environments isolate dependencies for each project, preventing version conflicts and improving reproducibility.\n\n---\n\n## Why Isolation Matters\n\nDifferent projects often require different versions of the same library.\n\nInstalling packages globally can lead to:\n\n- Dependency conflicts.\n- Broken applications.\n- Difficult upgrades.\n- Unpredictable environments.\n\n---\n\n## Benefits of Virtual Environments\n\n- Dependency isolation.\n- Reproducible builds.\n- Cleaner system Python installation.\n- Easier collaboration across teams.\n- Safer package experimentation.\n\n---\n\n## Common Tools\n\n- `venv`\n- `virtualenv`\n- Poetry\n- Pipenv\n- Conda\n\n---\n\n## Interview Follow-ups\n\n- What is dependency pinning?\n- How do containers complement virtual environments?"}, {"section": "Python Basics", "question": "When would you use `collections.defaultdict` instead of a plain `dict`?", "answer": "## Short Answer\n\nUse `defaultdict` when missing keys should automatically receive a default value.\n\n---\n\n## Detailed Explanation\n\nWith a normal dictionary, accessing a missing key raises `KeyError`.\n\n`defaultdict` automatically creates and inserts a default value whenever a missing key is accessed.\n\nThis significantly reduces boilerplate code.\n\n---\n\n## Common Use Cases\n\n- Grouping data.\n- Counting items.\n- Building nested structures.\n- Aggregating values.\n\n---\n\n## Advantages\n\n- Cleaner code.\n- Fewer conditional checks.\n- Reduced risk of `KeyError`.\n\n---\n\n## Interview Follow-ups\n\n- How does `defaultdict` differ from `dict.setdefault()`?\n- What happens if the default factory is `None`?"}, {"section": "Python Basics", "question": "What does `collections.Counter` give you over manually counting with a `dict`?", "answer": "## Short Answer\n\n`Counter` is a specialized dictionary designed for frequency counting and provides many built-in operations.\n\n---\n\n## Benefits Over a Plain Dictionary\n\n`Counter` automatically handles missing keys and offers additional functionality such as:\n\n- Finding the most common elements.\n- Combining frequency counts.\n- Subtracting counts.\n- Performing multiset operations.\n\n---\n\n## Why use it?\n\nIt makes counting tasks simpler, more expressive, and less error-prone.\n\n---\n\n## Typical Applications\n\n- Word-frequency analysis.\n- Log analysis.\n- Inventory systems.\n- Statistical computations.\n\n---\n\n## Interview Follow-ups\n\n- How does `Counter` handle missing keys?\n- What arithmetic operations does `Counter` support?"}, {"section": "Python Basics", "question": "What's `collections.namedtuple` (or `typing.NamedTuple`) useful for, versus a plain tuple or a class?", "answer": "## Short Answer\n\n`NamedTuple` provides immutable, tuple-like objects with named fields, improving readability without the overhead of a full class.\n\n---\n\n## Compared to a Plain Tuple\n\nRegular tuples rely on positional access, which can make code difficult to understand.\n\nNamed tuples expose descriptive attribute names, making code self-documenting.\n\n---\n\n## Compared to a Class\n\nNamed tuples:\n\n- Require very little boilerplate.\n- Are immutable.\n- Consume less memory.\n- Behave like tuples.\n\n---\n\n## When to Use\n\nUse them for lightweight immutable data structures.\n\nFor richer behavior or mutability, prefer dataclasses or regular classes.\n\n---\n\n## Interview Follow-ups\n\n- How do dataclasses compare with `NamedTuple`?\n- Why is immutability useful?"}, {"section": "Python Basics", "question": "What's the difference between `itertools.chain` and just concatenating lists with `+`?", "answer": "## Short Answer\n\n`itertools.chain()` lazily iterates across multiple iterables without creating a new collection, whereas list concatenation eagerly builds a new list in memory.\n\n---\n\n## `itertools.chain`\n\n- Works with any iterable.\n- Consumes minimal memory.\n- Supports generators and streams.\n- Produces values lazily.\n\n---\n\n## List Concatenation\n\nUsing `+`:\n\n- Requires concrete lists.\n- Creates a new list.\n- Copies all elements.\n- Increases memory usage.\n\n---\n\n## When to Prefer `chain()`\n\n- Large datasets.\n- Generator pipelines.\n- Streaming applications.\n- Memory-sensitive code.\n\n---\n\n## Interview Follow-ups\n\n- What is lazy evaluation?\n- Why are generators memory efficient?"}, {"section": "Python Basics", "question": "Why is `pathlib.Path` generally preferred over `os.path` string manipulation in modern Python code?", "answer": "## Short Answer\n\n`pathlib` provides an object-oriented, readable, and platform-independent way to work with filesystem paths.\n\n---\n\n## Advantages of `pathlib`\n\n- Cleaner syntax.\n- Improved readability.\n- Cross-platform compatibility.\n- Rich built-in methods.\n- Reduced manual string manipulation.\n\n---\n\n## Common Features\n\n`Path` objects provide convenient methods for:\n\n- Existence checks.\n- File extensions.\n- Parent directories.\n- Directory traversal.\n- Path joining.\n\n---\n\n## Why Avoid String Manipulation?\n\nManual path concatenation is error-prone because path separators differ across operating systems.\n\n`pathlib` abstracts these differences automatically.\n\n---\n\n## Interview Follow-ups\n\n- How does `pathlib` improve portability?\n- What are the differences between `Path` and `PurePath`?"}, {"section": "Python Basics", "question": "What's the difference between `datetime.now()` and `datetime.utcnow()` and why does mixing naive datetimes across timezones cause bugs?", "answer": "## Short Answer\n\n`datetime.now()` returns the current local time, whereas `datetime.utcnow()` returns the current UTC time. Both produce naive datetime objects by default.\n\n---\n\n## The Problem with Naive Datetimes\n\nNaive datetimes contain no timezone information.\n\nAs a result, two datetime objects may represent different real-world moments while appearing comparable.\n\nPerforming arithmetic or comparisons between naive datetimes originating from different timezones can silently produce incorrect results.\n\n---\n\n## Best Practice\n\nPrefer timezone-aware datetimes throughout an application.\n\nUsing UTC internally and converting to local time only for display greatly reduces bugs.\n\n---\n\n## Why does this matter?\n\nTimezone bugs are notoriously difficult to diagnose in distributed systems, scheduling applications, and APIs.\n\n---\n\n## Interview Follow-ups\n\n- What is a timezone-aware datetime?\n- Why is storing timestamps in UTC considered a best practice?"}, {"section": "Python Basics", "question": "What's the advantage of f-strings over `.format()` or `%`-formatting?", "answer": "## Short Answer\n\nF-strings are generally more readable, concise, and performant than older string formatting approaches.\n\n---\n\n## Advantages\n\n- Cleaner syntax.\n- Direct access to variables and expressions.\n- Better readability.\n- Faster execution in most cases.\n- Supports inline formatting specifications.\n\n---\n\n## Why are they preferred?\n\nF-strings reduce visual noise and make formatted strings easier to maintain.\n\nThey also allow arbitrary expressions to be evaluated directly within the string.\n\n---\n\n## Modern Recommendation\n\nFor new code, f-strings are typically the preferred formatting mechanism.\n\n---\n\n## Interview Follow-ups\n\n- How are f-strings evaluated?\n- When might `.format()` still be useful?"}, {"section": "Python Basics", "question": "What's the difference between `re.match`, `re.search`, and `re.fullmatch`?", "answer": "## Short Answer\n\n- `match()` checks only at the beginning of the string.\n- `search()` scans the entire string.\n- `fullmatch()` requires the entire string to satisfy the pattern.\n\n---\n\n## Detailed Explanation\n\nThese functions differ only in where matching is allowed to occur.\n\nChoosing the wrong function is a common source of regex bugs.\n\n---\n\n## Typical Use Cases\n\n- `match()` for validating prefixes.\n- `search()` for locating patterns anywhere.\n- `fullmatch()` for strict validation.\n\n---\n\n## Why does this matter?\n\nUsing `match()` when full validation is required may accidentally accept invalid input.\n\n---\n\n## Interview Follow-ups\n\n- How does `^` differ from `match()`?\n- Why is `fullmatch()` useful for validation?"}, {"section": "Python Basics", "question": "Why should you use `re.compile()` instead of calling `re.match()`/`re.search()` directly with a pattern string, when matching repeatedly?", "answer": "## Short Answer\n\n`re.compile()` parses the regular expression once and returns a reusable pattern object, improving clarity and potentially performance when matching repeatedly.\n\n---\n\n## Detailed Explanation\n\nCompiling a pattern avoids repeatedly parsing the same regular expression.\n\nThis can become significant in performance-critical code paths or loops that perform thousands of matches.\n\n---\n\n## Additional Benefits\n\n- Makes intent explicit.\n- Improves code readability.\n- Encourages reuse.\n- Simplifies organization of complex regular expressions.\n\n---\n\n## Important Note\n\nPython internally caches recently used regular expressions, so performance gains may be modest for simple applications.\n\nHowever, explicit compilation remains a common best practice for heavily reused patterns.\n\n---\n\n## Interview Follow-ups\n\n- How does Python's regex cache work?\n- When does explicit compilation provide noticeable performance improvements?"}, {"section": "Python Basics", "question": "What's the difference between `str.split()` with no arguments and `str.split(' ')`?", "answer": "## Short Answer\n\n`str.split()` with no arguments splits on **any whitespace** and automatically collapses consecutive whitespace, while `str.split(' ')` splits only on literal space characters.\n\n---\n\n## Detailed Explanation\n\nCalling `split()` without arguments treats all whitespace characters—spaces, tabs, and newlines—as delimiters.\n\nIt also:\n\n- Ignores leading and trailing whitespace.\n- Treats multiple consecutive whitespace characters as a single separator.\n\nUsing `split(' ')` behaves differently:\n\n- Only literal space characters are considered separators.\n- Consecutive spaces produce empty strings.\n- Leading and trailing spaces generate additional empty elements.\n\n---\n\n## Why does this matter?\n\nChoosing the wrong version can introduce subtle parsing bugs, especially when processing user input, logs, or text files containing inconsistent whitespace.\n\n---\n\n## Best Practice\n\nUse `split()` without arguments when processing human-generated text unless exact spacing is important.\n\n---\n\n## Interview Follow-ups\n\n- What other whitespace characters does Python recognize?\n- When would using `split(' ')` be appropriate?"}, {"section": "Python Basics", "question": "Why shouldn't you use `pickle` to deserialize data from an untrusted source?", "answer": "## Short Answer\n\nBecause unpickling data can execute arbitrary Python code, making it a serious security risk when handling untrusted input.\n\n---\n\n## Detailed Explanation\n\nThe `pickle` module is designed to serialize and reconstruct arbitrary Python objects.\n\nDuring deserialization, Python may execute code necessary to recreate those objects.\n\nA maliciously crafted pickle payload can therefore:\n\n- Execute arbitrary commands.\n- Read or modify files.\n- Access network resources.\n- Completely compromise the system.\n\n---\n\n## Security Implications\n\nTreat unpickling data from external users or networks as equivalent to executing untrusted code.\n\n---\n\n## Safe Alternatives\n\nFor untrusted data, prefer formats such as:\n\n- JSON\n- Protocol Buffers\n- MessagePack\n- XML (with proper precautions)\n\n---\n\n## Interview Follow-ups\n\n- Why is JSON generally safer than pickle?\n- What are common serialization formats used in distributed systems?"}, {"section": "Python Basics", "question": "What's the difference between `json.dump`/`json.load` and `json.dumps`/`json.loads`?", "answer": "## Short Answer\n\nThe `dump` and `load` functions operate on file objects, while `dumps` and `loads` operate on strings in memory.\n\n---\n\n## Detailed Explanation\n\nFunctions without the trailing `s` interact directly with open file handles.\n\nFunctions ending with `s` return or consume JSON represented as strings.\n\n---\n\n## When to Use Each\n\nUse `dump` and `load` when reading from or writing to files.\n\nUse `dumps` and `loads` when:\n\n- Sending JSON over APIs.\n- Storing JSON in memory.\n- Working with network responses.\n- Logging or caching JSON payloads.\n\n---\n\n## Naming Convention\n\nThe trailing `s` stands for **string**.\n\nThis naming pattern appears in several Python standard library modules.\n\n---\n\n## Interview Follow-ups\n\n- Why can JSON only serialize certain types?\n- How can custom objects be serialized to JSON?"}, {"section": "Python Basics", "question": "Why does opening a file with `open('f.txt')` and forgetting to close it matter, even though Python has garbage collection?", "answer": "## Short Answer\n\nBecause open files consume operating-system resources that are limited and are not guaranteed to be released immediately by Python's garbage collector.\n\n---\n\n## Detailed Explanation\n\nOpening a file allocates an OS-level file descriptor.\n\nFile descriptors are finite resources.\n\nIf files remain unclosed:\n\n- The process may eventually run out of descriptors.\n- New files or sockets may fail to open.\n- Data may remain buffered and never be written.\n- Resource leaks may accumulate in long-running applications.\n\n---\n\n## Why Garbage Collection Isn't Enough\n\nGarbage collection timing is implementation-dependent and should not be relied upon for deterministic cleanup.\n\nExplicit resource management is always preferred.\n\n---\n\n## Best Practice\n\nUse context managers to guarantee cleanup.\n\nThis ensures files are closed even if exceptions occur.\n\n---\n\n## Interview Follow-ups\n\n- What other resources should be managed with context managers?\n- Why is deterministic cleanup important?"}, {"section": "Python Basics", "question": "What's the difference between opening a file in text mode (`'r'`) versus binary mode (`'rb'`)?", "answer": "## Short Answer\n\nText mode reads and writes Unicode strings, while binary mode works directly with raw bytes.\n\n---\n\n## Text Mode\n\nText mode:\n\n- Automatically decodes bytes into strings.\n- Uses a character encoding.\n- Performs newline translation.\n- Is intended for human-readable text.\n\n---\n\n## Binary Mode\n\nBinary mode:\n\n- Reads and writes raw bytes.\n- Performs no decoding.\n- Preserves data exactly.\n- Avoids newline conversion.\n\n---\n\n## Typical Use Cases\n\nUse text mode for:\n\n- Logs\n- Configuration files\n- CSV files\n- Source code\n\nUse binary mode for:\n\n- Images\n- PDFs\n- Audio files\n- Serialized objects\n\n---\n\n## Interview Follow-ups\n\n- What happens if you open an image in text mode?\n- Why are encodings important in text processing?"}, {"section": "Python Basics", "question": "What's the main advantage of pytest fixtures over `unittest`'s `setUp`/`tearDown`?", "answer": "## Short Answer\n\nPytest fixtures provide reusable, composable, and explicitly declared dependencies, making tests cleaner and more maintainable.\n\n---\n\n## Detailed Explanation\n\nTraditional `setUp` methods run for every test within a class, regardless of whether each test actually needs the setup.\n\nFixtures are different because:\n\n- Tests explicitly declare dependencies.\n- Setup logic can be reused across files.\n- Different lifetimes can be configured.\n- Dependencies can be composed together.\n\n---\n\n## Fixture Scopes\n\nCommon scopes include:\n\n- Function\n- Class\n- Module\n- Package\n- Session\n\nThis allows expensive setup operations to run only when necessary.\n\n---\n\n## Interview Follow-ups\n\n- How does fixture dependency injection work?\n- What problems do fixtures solve in large test suites?"}, {"section": "Python Basics", "question": "What's the difference between a mock and a stub in testing terminology?", "answer": "## Short Answer\n\nA stub provides predefined responses, while a mock additionally verifies interactions and behavior.\n\n---\n\n## Stubs\n\nStubs are simple test doubles that return predetermined values.\n\nTheir purpose is to isolate the code under test from external dependencies.\n\n---\n\n## Mocks\n\nMocks not only replace dependencies but also record how they were used.\n\nThey allow tests to verify:\n\n- Call counts.\n- Arguments passed.\n- Call ordering.\n- Expected interactions.\n\n---\n\n## Why does this distinction matter?\n\nBehavior verification is sometimes as important as validating returned values.\n\n---\n\n## Interview Follow-ups\n\n- What other types of test doubles exist?\n- When should behavior verification be avoided?"}, {"section": "Python Basics", "question": "Why is over-mocking considered an anti-pattern in testing?", "answer": "## Short Answer\n\nExcessive mocking can cause tests to verify mocked behavior rather than real application behavior.\n\n---\n\n## Detailed Explanation\n\nWhen too many internal components are mocked:\n\n- Tests become tightly coupled to implementation details.\n- Refactoring breaks tests unnecessarily.\n- Real integration problems remain hidden.\n- Tests may pass even though production code fails.\n\n---\n\n## Best Practice\n\nMock external boundaries such as:\n\n- Databases\n- Network calls\n- External APIs\n- File systems\n\nAvoid mocking core business logic whenever possible.\n\n---\n\n## Why does this matter?\n\nTests should provide confidence that the system behaves correctly in realistic scenarios.\n\n---\n\n## Interview Follow-ups\n\n- What should typically be mocked?\n- What is the testing pyramid?"}, {"section": "Python Basics", "question": "What's the difference between unit tests and integration tests, and why do both matter?", "answer": "## Short Answer\n\nUnit tests validate individual components in isolation, while integration tests verify that multiple components work correctly together.\n\n---\n\n## Unit Tests\n\nCharacteristics:\n\n- Fast.\n- Isolated.\n- Deterministic.\n- Focused on small units of code.\n\nThey help quickly identify exactly what broke.\n\n---\n\n## Integration Tests\n\nCharacteristics:\n\n- Exercise real dependencies.\n- Validate interactions between components.\n- Catch configuration issues.\n- Reveal problems hidden by mocks.\n\n---\n\n## Why are both necessary?\n\nUnit tests provide rapid feedback.\n\nIntegration tests ensure the complete system behaves correctly in realistic environments.\n\nA healthy test suite requires both.\n\n---\n\n## Interview Follow-ups\n\n- What is the testing pyramid?\n- Why can unit tests alone be insufficient?"}, {"section": "Python Basics", "question": "What does `pytest.mark.parametrize` let you do, and why is it better than copy-pasting near-identical test functions?", "answer": "## Short Answer\n\n`pytest.mark.parametrize` runs the same test multiple times with different inputs, eliminating duplication while keeping each case independently reported.\n\n---\n\n## Benefits\n\n- Reduces duplicated test code.\n- Improves maintainability.\n- Produces clearer test reports.\n- Encourages broader test coverage.\n\n---\n\n## Why avoid copy-paste tests?\n\nDuplicated tests increase maintenance overhead.\n\nWhen behavior changes, every copied test may need updating.\n\nParameterized tests centralize logic while preserving separate pass/fail results.\n\n---\n\n## Interview Follow-ups\n\n- How does pytest generate individual test cases?\n- What are indirect parameters in pytest?"}, {"section": "Python Basics", "question": "Before optimizing slow Python code, what should you do first, and why?", "answer": "## Short Answer\n\nAlways profile the application before attempting optimization.\n\n---\n\n## Detailed Explanation\n\nDeveloper intuition about performance bottlenecks is frequently wrong.\n\nProfiling identifies where the application actually spends time.\n\nWithout measurement, optimization efforts may target code that has negligible impact.\n\n---\n\n## Benefits of Profiling\n\n- Identifies true bottlenecks.\n- Prevents wasted effort.\n- Quantifies improvements.\n- Guides optimization decisions.\n\n---\n\n## Common Profiling Tools\n\n- `cProfile`\n- `py-spy`\n- `line_profiler`\n- Performance monitoring systems\n\n---\n\n## Interview Follow-ups\n\n- What is premature optimization?\n- How would you profile a production system?"}, {"section": "Python Basics", "question": "Why might a Python program with heavy string concatenation in a loop be unexpectedly slow, and how do you fix it?", "answer": "## Short Answer\n\nRepeated string concatenation can be slow because strings are immutable, causing repeated allocations and copies.\n\n---\n\n## Detailed Explanation\n\nEach concatenation creates a brand-new string object.\n\nIn loops, this can result in quadratic time complexity as increasingly larger strings are repeatedly copied.\n\n---\n\n## Better Approach\n\nAccumulate pieces separately and combine them once at the end.\n\nThis minimizes allocations and significantly improves performance.\n\n---\n\n## Why does immutability matter?\n\nImmutable objects cannot be modified in place, so every update requires allocating new memory.\n\n---\n\n## Interview Follow-ups\n\n- Why are strings immutable?\n- What other Python objects are immutable?"}, {"section": "Python Basics", "question": "What's the difference between `__slots__` and a regular class, performance-wise?", "answer": "## Short Answer\n\n`__slots__` reduces per-instance memory usage and can slightly improve attribute access speed by avoiding an instance dictionary.\n\n---\n\n## Regular Classes\n\nBy default, instance attributes are stored in a dynamic `__dict__`.\n\nThis provides flexibility but consumes additional memory.\n\n---\n\n## Classes Using `__slots__`\n\nInstances allocate a fixed set of attributes.\n\nBenefits include:\n\n- Lower memory consumption.\n- Faster attribute access.\n- Reduced overhead for large numbers of objects.\n\n---\n\n## Trade-offs\n\n- No arbitrary attribute creation.\n- More complexity with inheritance.\n- Reduced flexibility.\n\n---\n\n## Interview Follow-ups\n\n- When is using `__slots__` worthwhile?\n- How does inheritance interact with `__slots__`?"}, {"section": "Python Basics", "question": "Why does `0.1 + 0.2 == 0.3` evaluate to `False` in Python?", "answer": "## Short Answer\n\nBecause floating-point numbers are represented in binary, many decimal values cannot be stored exactly.\n\n---\n\n## Detailed Explanation\n\nNumbers such as `0.1` and `0.2` have no exact binary representation.\n\nSmall approximation errors accumulate during arithmetic operations.\n\nAs a result, equality comparisons using `==` may unexpectedly fail.\n\n---\n\n## Important Note\n\nThis behavior is not unique to Python.\n\nIt affects nearly all programming languages implementing IEEE 754 floating-point arithmetic.\n\n---\n\n## Best Practices\n\n- Use approximate comparisons for floating-point values.\n- Use decimal arithmetic when exact precision is required.\n\n---\n\n## Interview Follow-ups\n\n- What is IEEE 754?\n- Why are floating-point comparisons difficult?"}, {"section": "Python Basics", "question": "What's wrong with using `except Exception as e: print(e)` as your standard error-handling pattern in production code?", "answer": "## Short Answer\n\nUsing `print()` provides poor observability and often hides important debugging information.\n\n---\n\n## Problems with This Pattern\n\n- No timestamps.\n- No severity levels.\n- Difficult searching and aggregation.\n- Missing stack traces.\n- Poor integration with monitoring systems.\n\n---\n\n## Production Requirements\n\nProduction systems typically require:\n\n- Structured logging.\n- Centralized log aggregation.\n- Tracebacks.\n- Alerting integration.\n\n---\n\n## Best Practice\n\nUse Python's logging framework or an equivalent observability solution.\n\n---\n\n## Interview Follow-ups\n\n- Why are stack traces important?\n- What log levels are commonly used?"}, {"section": "Python Basics", "question": "Why can iterating over a dictionary while modifying it raise a `RuntimeError`?", "answer": "## Short Answer\n\nDictionary iteration assumes the dictionary's structure remains stable during iteration.\n\nModifying its size while iterating invalidates the iterator.\n\n---\n\n## Detailed Explanation\n\nAdding or removing keys changes the dictionary's internal structure.\n\nAllowing iteration to continue could lead to:\n\n- Skipped entries.\n- Duplicate processing.\n- Corrupted iteration state.\n- Undefined behavior.\n\nPython therefore raises a `RuntimeError` to prevent subtle bugs.\n\n---\n\n## Safe Approaches\n\nWhen modification is required, iterate over a separate snapshot of keys or items.\n\n---\n\n## Why is this safeguard valuable?\n\nFailing fast is generally preferable to silently producing incorrect results.\n\n---\n\n## Interview Follow-ups\n\n- Why doesn't modifying values raise the same error?\n- How do iterators work internally?"}, {"section": "Python Basics", "question": "Why is comparing floats to check 'did this loop run the expected number of times' (e.g. via repeated `+= 0.1`) unreliable?", "answer": "## Short Answer\n\nFloating-point numbers are represented approximately in binary, so repeated additions can accumulate rounding errors and make exact equality comparisons unreliable.\n\n---\n\n## Detailed Explanation\n\nMost decimal fractions, including `0.1`, cannot be represented exactly in binary floating-point format.\n\nEach arithmetic operation introduces tiny rounding errors. While these errors are usually very small, they can accumulate over repeated operations.\n\nAs a result, a value that mathematically should equal `1.0` after ten additions of `0.1` may instead be stored as something extremely close to, but not exactly, `1.0`.\n\nBecause of this, comparisons using `==` may unexpectedly fail.\n\n---\n\n## Why does this matter?\n\nLoop termination conditions based on exact floating-point equality can:\n\n- Run too many iterations.\n- Stop prematurely.\n- Produce inconsistent behavior across platforms.\n- Introduce difficult-to-diagnose bugs.\n\n---\n\n## Best Practices\n\n- Prefer integer counters for loop control.\n- Avoid using exact equality for floating-point comparisons.\n- Use tolerance-based comparisons when working with floats.\n\n---\n\n## Interview Follow-ups\n\n- Why can't decimal values like `0.1` be represented exactly in binary?\n- What is IEEE 754 floating-point representation?\n- Why is `math.isclose()` preferred over `==` for float comparisons?"}, {"section": "Python Basics", "question": "Why does modifying a list while iterating over it with a `for` loop sometimes skip elements?", "answer": "## Short Answer\n\nModifying a list while iterating can change the positions of elements, causing the loop's internal iterator to skip items or behave unexpectedly.\n\n---\n\n## Detailed Explanation\n\nA `for` loop over a list maintains an internal index that advances after each iteration.\n\nIf elements are added or removed during iteration, the list's contents shift in memory while the iterator continues advancing according to its original progression.\n\nThis mismatch between the iterator's position and the modified list structure can cause:\n\n- Elements to be skipped.\n- Elements to be processed multiple times.\n- Unexpected results.\n\n---\n\n## Why does this happen?\n\nThe iterator assumes that the underlying collection remains structurally stable throughout the iteration.\n\nUnlike dictionaries, Python lists do not raise an exception when modified during iteration, making these bugs particularly subtle.\n\n---\n\n## Safe Alternatives\n\nCommon approaches include:\n\n- Iterating over a copy of the list.\n- Creating a new filtered list.\n- Collecting changes separately and applying them afterward.\n\n---\n\n## Why is this important in production code?\n\nMutating collections during iteration often leads to non-obvious bugs that are difficult to reproduce and maintain.\n\nFavor immutable or copy-based approaches whenever possible.\n\n---\n\n## Interview Follow-ups\n\n- Why do dictionaries raise `RuntimeError` during structural modification while lists generally do not?\n- What are the trade-offs between mutating in place and creating new collections?"}, {"section": "RAG", "question": "What is RAG, and what problem does it solve that a plain LLM call doesn't?", "answer": "RAG (Retrieval-Augmented Generation) retrieves relevant external documents/passages at query time and injects them into the LLM's prompt, so the model generates its answer grounded in that retrieved context instead of relying solely on what it memorized during training. This solves three core LLM limitations: a **fixed knowledge cutoff** (the model can't know about anything after training, but retrieval can pull from up-to-date sources), **no access to private/proprietary data** (the model was never trained on your internal docs, but retrieval can index them), and **hallucination on facts it doesn't actually know** (grounding the answer in retrieved text gives the model something concrete to draw from, and gives you something to check the answer against)."}, {"section": "RAG", "question": "What's the basic architecture of a RAG pipeline, end to end?", "answer": "1) **Ingestion** (offline): documents are chunked, embedded into vectors, and stored in a vector database (often alongside metadata and the original text). 2) **Retrieval** (at query time): the user's query is embedded with the same model, and the vector DB returns the top-K most similar chunks (by some distance metric). 3) **Augmentation**: those retrieved chunks are inserted into a prompt template alongside the user's question. 4) **Generation**: the LLM generates an answer conditioned on that augmented prompt. This basic ('naive') pipeline is the starting point; production systems typically add re-ranking, query transformation, and filtering on top of these four stages."}, {"section": "RAG", "question": "Why not just put all your documents directly in the prompt instead of using retrieval?", "answer": "Two hard limits make this impractical at any real scale: the **context window** (even large-context models have a finite token budget, and most document collections — internal wikis, support tickets, codebases — vastly exceed it), and **cost/latency** (every token in the prompt costs money and adds processing time, so stuffing thousands of irrelevant pages into every single query is wasteful even when it technically fits). Retrieval solves both by selecting only the small, relevant subset of documents that actually matter for *this specific query*, rather than paying for and reasoning over everything every time."}, {"section": "RAG", "question": "What's the difference between RAG and simply fine-tuning a model on your documents?", "answer": "RAG keeps the model's weights frozen and supplies relevant knowledge dynamically, per-query, via the prompt — knowledge can be updated instantly (just re-index a changed document) and answers can cite exactly which source they came from. Fine-tuning bakes knowledge into the model's weights through additional training, which changes the model's behavior/style more deeply but makes updating knowledge expensive (requires retraining) and doesn't naturally give you per-answer source attribution — the model just 'knows' things now, with no traceable pointer back to where that knowledge came from. In practice these aren't mutually exclusive: some systems fine-tune a model to be better at *using* retrieved context (e.g. following instructions, citing sources correctly) while still using RAG for the actual knowledge."}, {"section": "RAG", "question": "What are the main failure modes of a 'naive' RAG pipeline?", "answer": "**Retrieval failure**: the relevant chunk simply isn't retrieved (wrong embedding similarity, the query phrasing doesn't match how the answer is phrased in the source) — no amount of good generation can fix missing context. **Context fragmentation**: a chunk is retrieved but lost necessary surrounding context (e.g. a table row split from its header) making it ambiguous or misleading on its own. **Irrelevant context overload**: too many low-relevance chunks get included, diluting the signal and sometimes actively confusing the model. **Hallucination despite context**: the model still generates something not actually supported by the retrieved text, especially when the retrieved context doesn't fully answer the question but the model 'fills in the gaps' anyway. **Stale or duplicate data**: the index contains outdated or redundant versions of documents that weren't properly cleaned up, leading to ranked but actually wrong answers."}, {"section": "RAG", "question": "What's the difference between 'naive RAG' and what's often called 'advanced' or 'modular' RAG?", "answer": "**Naive RAG** is the straightforward embed-query → retrieve-top-K → stuff-into-prompt → generate pipeline. **Advanced RAG** adds optimizations at each stage: pre-retrieval (query rewriting/expansion, routing the query to the right index), retrieval itself (hybrid search, metadata filtering, re-ranking), and post-retrieval (compressing/summarizing retrieved chunks, reordering by relevance before the prompt). **Modular RAG** goes further, treating the pipeline as composable, swappable modules (a retrieval module, a routing module, a memory module, a fusion module) that can be combined flexibly, sometimes with feedback loops (e.g. the generation step decides retrieval was insufficient and triggers another retrieval round) rather than one fixed linear sequence — this is the direction 'agentic RAG' builds further on."}, {"section": "RAG", "question": "How do you decide whether a use case actually needs RAG at all?", "answer": "RAG adds real complexity (an indexing pipeline, a vector store, retrieval-quality tuning) — it's justified when the model needs access to information it wasn't trained on (private/internal data, frequently-changing data, or data too voluminous to fit in any prompt) and when **traceable grounding** (being able to point to a source) matters. It's often *not* needed for tasks that are purely about reasoning/transformation over information the user already provides in the prompt (summarization of a pasted document, code generation from a spec already in context, general knowledge questions a base model already answers correctly) — adding retrieval there just adds latency and failure surface for no benefit."}, {"section": "RAG", "question": "What's the difference between open-domain and closed-domain RAG?", "answer": "**Closed-domain RAG** retrieves exclusively from a curated, controlled corpus you've explicitly indexed (your company's docs, a specific knowledge base) — retrieval quality is more controllable since the corpus is known and finite, and you can reason confidently about coverage. **Open-domain RAG** retrieves from the broader web or a very large, loosely-curated corpus — much harder to guarantee retrieval quality or source reliability, and typically needs additional safeguards (source credibility filtering, more aggressive re-ranking) since the retrieved content's trustworthiness varies far more than in a closed, curated system."}, {"section": "RAG", "question": "Why does chunking matter so much in a RAG pipeline?", "answer": "Chunk size and boundaries directly determine what gets embedded, what gets retrieved, and what context the LLM ultimately sees. Chunks that are **too large** dilute the embedding's specificity (a 2,000-word chunk's embedding is an average signal over many different sub-topics, making it less likely to score highly for a query about one specific detail buried inside it) and waste context-window budget on irrelevant surrounding text. Chunks that are **too small** lose necessary context (a sentence fragment without its surrounding paragraph might be ambiguous or meaningless on its own) and increase the number of chunks needed to cover any given topic, increasing retrieval noise. Getting chunking right is often the single highest-leverage tuning knob in a RAG system, more impactful than swapping embedding models."}, {"section": "RAG", "question": "What's fixed-size chunking, and what's its main weakness?", "answer": "Fixed-size chunking splits text into chunks of a constant length (e.g. every 500 tokens), often with some overlap between consecutive chunks to avoid losing context right at chunk boundaries. It's simple and fast to implement, but its main weakness is that it **ignores document structure entirely** — it will cut in the middle of a sentence, split a table from its header, or sever a code block mid-function, since it only counts characters/tokens with no awareness of where natural semantic boundaries actually are."}, {"section": "RAG", "question": "What's recursive character/token splitting, and how does it improve on naive fixed-size chunking?", "answer": "Recursive splitting (e.g. LangChain's `RecursiveCharacterTextSplitter`) tries a prioritized list of separators — paragraphs (`\\n\\n`), then lines (`\\n`), then sentences, then words — recursively splitting at the highest-priority separator that still respects the target chunk size, only falling back to a lower-priority (more granular) separator if a chunk is still too large after trying the current one. This keeps chunks aligned to natural document boundaries (paragraphs, sentences) far more often than blind fixed-size splitting, while still enforcing a maximum chunk size as a hard constraint.\n```python\nfrom langchain.text_splitter import RecursiveCharacterTextSplitter\n\nsplitter = RecursiveCharacterTextSplitter(\n    chunk_size=500,\n    chunk_overlap=50,\n    separators=['\\n\\n', '\\n', '. ', ' ', '']\n)\nchunks = splitter.split_text(document_text)\n```"}, {"section": "RAG", "question": "What's chunk overlap, and why use it?", "answer": "Overlap means consecutive chunks share some amount of text at their boundary (e.g. the last 50 tokens of chunk N are repeated as the first 50 tokens of chunk N+1), rather than chunks being strictly back-to-back with zero shared content. This reduces the risk of losing meaning right at a chunk boundary — e.g. a sentence that explains a concept introduced at the very end of one chunk would otherwise be split awkwardly across two chunks with neither one making full sense alone; overlap gives each chunk a better chance of being self-contained. The trade-off is increased storage/index size and some redundant retrieval (the same overlapping sentence might get retrieved twice, in two different chunks)."}, {"section": "RAG", "question": "What is semantic chunking, and how does it differ from fixed-size or recursive splitting?", "answer": "Semantic chunking splits text based on actual **meaning shifts** rather than character/token counts or fixed separator hierarchies — typically by embedding consecutive sentences and looking for points where the embedding similarity between adjacent sentences drops significantly (indicating a topic change), and splitting there. This produces chunks that are more likely to be genuinely coherent, self-contained units of meaning regardless of their length, at the cost of being more computationally expensive (requires embedding every sentence during the chunking process itself, not just at indexing time) and producing variable-sized chunks that can complicate consistent prompt budgeting."}, {"section": "RAG", "question": "What's a sensible default chunk size to start with, and what factors push it larger or smaller?", "answer": "A common starting point is roughly **300-800 tokens** per chunk with **10-20% overlap**, then tuned based on evaluation against your actual use case. Push chunks **larger** when: the embedding model has a small context window that constrains larger chunks anyway (less common with modern embedding models), or your documents have long, necessary context spans (legal documents where a single clause's meaning depends on multiple preceding paragraphs). Push chunks **smaller** when: your queries are typically about specific, narrow facts (a number, a date, a single API parameter) that get diluted in a larger chunk's embedding, or when you need fine-grained retrieval precision and can compensate for lost context via overlap or by retrieving the chunk's neighbors alongside it. There's no universally correct number — it should be empirically tuned against your actual document types and query patterns."}, {"section": "RAG", "question": "What's 'parent-child' (or hierarchical) chunking, and what problem does it solve?", "answer": "It indexes small chunks for retrieval precision but, on retrieval, returns the larger 'parent' chunk (or the original full document section) that the matched small chunk belongs to — getting the best of both: small chunks give precise, high-signal embeddings for matching, while the larger parent chunk gives the LLM enough surrounding context to actually answer well, rather than feeding it an isolated, context-poor fragment. This is implemented by storing a parent-ID reference on each small chunk at indexing time, then doing a lookup to the parent content after the vector search returns matching child-chunk IDs."}, {"section": "RAG", "question": "How should you handle tables when chunking documents for RAG?", "answer": "Tables are particularly prone to being destroyed by naive text-based chunking, since a row split from its header (or split mid-table) often becomes meaningless on its own ('Q3: 4.2M' means nothing without knowing which metric and which table it came from). Better approaches: chunk tables as a **single unit** when small enough to fit in one chunk, **repeat the header row** in every chunk if a table must be split across multiple chunks, or convert the table into a more LLM-friendly serialized format (e.g. a sequence of `column: value` sentences per row, or markdown table syntax) at ingestion time rather than relying on the table's raw visual/HTML structure to survive chunking intact."}, {"section": "RAG", "question": "How should chunking handle code (e.g. for a codebase-search RAG system)?", "answer": "Code shouldn't be chunked by raw character count, since that can split a function mid-body or separate a function from its docstring/signature — instead, chunk along **syntactic boundaries** (function/class/method definitions, using a language-aware parser like `tree-sitter` to identify these boundaries reliably) so each chunk is a complete, meaningful unit (a whole function, a whole class). It's also common to prepend useful surrounding context to each code chunk — the containing class name, relevant imports, or a one-line docstring summary — since a function in isolation often lacks context (what class it belongs to, what it depends on) that matters for both retrieval relevance and the LLM's ability to use it correctly afterward."}, {"section": "RAG", "question": "What's the trade-off in choosing how much metadata to attach to each chunk at indexing time?", "answer": "Attaching rich metadata (source document title, section heading, page number, last-updated date, author, document type) to each chunk enables powerful filtering (restrict retrieval to a specific document type or date range before/during the similarity search) and lets you show users exactly where an answer came from. The trade-off is **ingestion complexity** (you need a pipeline that reliably extracts this metadata from heterogeneous source documents, which isn't always trivial) and **storage overhead** (more metadata per chunk, more index size) — but in practice the retrieval-quality and trust/citation benefits of good metadata almost always outweigh these costs, so most production RAG systems invest meaningfully in metadata extraction rather than treating it as an afterthought."}, {"section": "RAG", "question": "What is a text embedding, and what makes it useful for retrieval?", "answer": "An embedding is a fixed-length vector of floating-point numbers that represents a piece of text's *meaning* in a high-dimensional space, produced by a model trained so that semantically similar texts end up with vectors that are close together (by some distance metric) and dissimilar texts end up far apart. This is useful for retrieval because it lets you find relevant content based on **meaning rather than exact keyword overlap** — a query like 'how do I cancel my subscription' can match a document saying 'terminating your plan' even though they share almost no literal words, something traditional keyword search (BM25/TF-IDF) generally can't do on its own."}, {"section": "RAG", "question": "Why must you embed your query with the same embedding model used to embed your documents?", "answer": "Different embedding models produce vectors in entirely different, model-specific vector spaces — there's no guaranteed geometric relationship between a vector produced by Model A and one produced by Model B, even for the exact same input text. Comparing a query embedded with one model against documents embedded with a different model produces meaningless, essentially random similarity scores, since the two sets of vectors don't share a coordinate system at all. This also means switching embedding models requires **re-embedding your entire corpus**, not just changing the model used for new queries — a common, costly mistake when upgrading embedding models in production."}, {"section": "RAG", "question": "What's the difference between dense embeddings and sparse embeddings/representations?", "answer": "**Dense embeddings** (from neural models like `text-embedding-3` or `sentence-transformers` models) pack meaning into a relatively small number of dimensions (e.g. 384-3072) where every dimension typically has a non-zero value, capturing semantic similarity even across different vocabulary. **Sparse representations** (TF-IDF, BM25) are extremely high-dimensional (one dimension per vocabulary term) but mostly zero — only the actual words present in the text have non-zero weight — and they excel at exact keyword/term matching but miss semantic similarity between texts using different words for the same idea. This complementary trade-off is exactly why **hybrid search** (combining both) often outperforms either alone."}, {"section": "RAG", "question": "How do you choose between general-purpose embedding models (e.g. OpenAI's `text-embedding-3`) and domain-specific or open-source embedding models?", "answer": "General-purpose hosted models (OpenAI, Cohere) are easy to integrate (a simple API call), well-maintained, and perform well across broad domains out of the box — a sensible default for most applications, especially early on. Open-source models (e.g. from the `sentence-transformers` family, or models topping the MTEB leaderboard) let you self-host (no per-call cost or external dependency, important at high volume or for data-residency requirements) and can be **fine-tuned** on domain-specific data (legal, medical, code) where general-purpose embeddings sometimes underperform due to specialized vocabulary or notions of similarity that differ from general web text. The right choice depends on volume/cost constraints, data-privacy requirements, and whether your domain's notion of 'similar' meaningfully diverges from general language."}, {"section": "RAG", "question": "What does embedding dimensionality control, and what's the trade-off in choosing it?", "answer": "Higher-dimensional embeddings can encode more nuanced distinctions between texts, generally improving retrieval quality (especially for subtle semantic differences), but cost more to store (linearly more storage per vector) and more to compute similarity over (slower search, especially at large index sizes) — and beyond a certain point, the quality gains diminish while costs keep scaling linearly. Some modern embedding models (e.g. OpenAI's `text-embedding-3` family) support **configurable output dimensions**, letting you explicitly trade off some retrieval quality for reduced storage/compute by truncating the embedding to fewer dimensions than the model's maximum, often with surprisingly little quality loss for many use cases — worth empirically testing rather than always defaulting to the maximum dimension."}, {"section": "RAG", "question": "What's the difference between symmetric and asymmetric embedding search, and why does it matter for choosing/using an embedding model?", "answer": "**Symmetric search** compares two pieces of text of roughly similar nature/length, e.g. finding similar questions to a given question, or near-duplicate documents — the query and the indexed content are 'the same kind of thing.' **Asymmetric search** (the typical RAG case) compares a short query against longer documents/passages — a query and a passage are structurally very different texts even when topically related, and some embedding models are specifically trained to handle this asymmetry well (often via separate 'query' and 'passage' encoding modes, e.g. needing a prefix like `'query: '` vs `'passage: '` before the text, as some models like E5 require). Using a model not designed for asymmetric search, or forgetting a required query/passage prefix, can measurably hurt retrieval quality even if the model otherwise performs well on general semantic-similarity benchmarks."}, {"section": "RAG", "question": "What's embedding drift, and why does it matter for a long-running RAG system?", "answer": "Embedding drift refers to the fact that if you ever change or update your embedding model (even a minor version bump from the provider), the new model's vector space generally isn't compatible with vectors generated by the old model — meaning the entire index must be re-embedded and rebuilt, not incrementally updated, when you switch models. This matters operationally: it's a non-trivial migration (re-embedding a large corpus has real cost and time, and you typically need to run both old and new indexes in parallel during a cutover to avoid downtime), so embedding-model choice isn't something to treat as casually swappable in a mature production system — switching has real engineering cost attached."}, {"section": "RAG", "question": "How would you evaluate whether an embedding model is a good fit for your specific retrieval task, beyond trusting a general leaderboard like MTEB?", "answer": "General leaderboards (MTEB) measure average performance across many generic benchmark tasks, which may not reflect your specific domain's vocabulary, document style, or notion of relevance. The more reliable approach is building a small **labeled evaluation set** specific to your use case — a set of representative queries paired with the document(s) that should ideally be retrieved for each — and measuring actual retrieval metrics (recall@K, MRR — see the evaluation section) for each candidate embedding model against *your* corpus and queries, not a generic benchmark. This is more upfront work, but it's the only way to know which model actually performs best for your specific documents and the kinds of questions your users actually ask."}, {"section": "RAG", "question": "What is dense retrieval, mechanically?", "answer": "Dense retrieval embeds both the query and all indexed documents/chunks into vectors using a neural embedding model, then finds the documents whose vectors are closest to the query's vector by some similarity metric (cosine similarity, dot product) — typically using an approximate nearest-neighbor (ANN) index (like HNSW) rather than comparing against every single vector exhaustively, since exhaustive comparison doesn't scale to large corpora. The key strength is capturing semantic similarity beyond exact keyword overlap; the key weakness is that it can sometimes miss documents containing an exact, rare keyword/term (a specific product code, an exact error message) if that term's surrounding semantic context doesn't push the embeddings close enough together."}, {"section": "RAG", "question": "What is sparse retrieval (e.g. BM25), and why does it still matter alongside modern dense embeddings?", "answer": "Sparse retrieval represents documents/queries as high-dimensional, mostly-zero vectors based on exact term presence/frequency (BM25 improves on basic TF-IDF by accounting for document length normalization and term-frequency saturation). It still matters because it excels precisely where dense embeddings can be weak: exact matches on rare tokens — specific error codes, product SKUs, exact names, acronyms — that a dense embedding model might not have learned a strong specific representation for, especially if those tokens were rare or absent in the embedding model's own training data. This is the core motivation for hybrid search: combining both captures complementary strengths rather than betting entirely on one retrieval paradigm."}, {"section": "RAG", "question": "What is hybrid search, and how do you combine dense and sparse retrieval results?", "answer": "Hybrid search runs both a dense (vector similarity) search and a sparse (BM25/keyword) search against the same corpus, then combines their results into one ranked list. A common combination method is **Reciprocal Rank Fusion (RRF)**: for each document, compute `1 / (rank_in_list_A + k) + 1 / (rank_in_list_B + k)` (with a small constant `k`, often 60, to dampen the effect of very top ranks) and re-sort by this combined score — this avoids needing to calibrate the two systems' raw scores onto a comparable scale (cosine similarity and BM25 scores aren't naturally on the same numeric scale), since RRF only relies on each result's *rank position* within its own list, not the magnitude of its score.\n```python\ndef reciprocal_rank_fusion(dense_results, sparse_results, k=60):\n    scores = {}\n    for rank, doc_id in enumerate(dense_results):\n        scores[doc_id] = scores.get(doc_id, 0) + 1 / (rank + k)\n    for rank, doc_id in enumerate(sparse_results):\n        scores[doc_id] = scores.get(doc_id, 0) + 1 / (rank + k)\n    return sorted(scores, key=scores.get, reverse=True)\n```"}, {"section": "RAG", "question": "What is Maximal Marginal Relevance (MMR), and what problem does it solve in retrieval?", "answer": "Plain top-K similarity search can return K results that are all highly relevant to the query but also highly **similar to each other** (e.g. five near-duplicate paragraphs all saying roughly the same thing) — wasting context-window budget on redundant information instead of diverse coverage. MMR re-ranks candidates by balancing relevance to the query against **diversity from already-selected results**: it iteratively picks the next document that maximizes `λ × relevance_to_query − (1−λ) × max_similarity_to_already_selected`, so each newly added result must be both reasonably relevant *and* meaningfully different from what's already been chosen, producing a more diverse, broader-coverage final result set."}, {"section": "RAG", "question": "What's the difference between top-K retrieval and similarity-threshold retrieval?", "answer": "**Top-K** always returns a fixed number of results (the K most similar items), regardless of how relevant any of them actually are — if the corpus has nothing genuinely relevant to a query, top-K still returns K items, just with low similarity scores, which can mislead the LLM into treating weakly-related content as if it were good context. **Threshold-based** retrieval only returns results above some minimum similarity score, potentially returning fewer than K (or even zero) results if nothing meets the bar — better at avoiding forcing irrelevant context into the prompt, but requires calibrating a sensible threshold (which varies by embedding model and even by query type, making it harder to set a single universal cutoff that works well across all queries)."}, {"section": "RAG", "question": "How do you decide what value of K (number of retrieved chunks) to use?", "answer": "Too small a K risks missing genuinely relevant context that didn't quite rank in the very top few results (especially for questions that need information synthesized from multiple chunks). Too large a K wastes context-window budget on increasingly marginal/irrelevant chunks and can dilute the signal the model needs to focus on, sometimes measurably *hurting* answer quality ('lost in the middle' effects, where models attend less reliably to information buried in a long prompt). In practice, K is tuned empirically against your evaluation set, often in the range of **3-10** for naive RAG, sometimes higher when paired with a re-ranking step that first retrieves a larger candidate set (e.g. K=50) and then re-ranks down to a smaller final set (e.g. top 5) actually sent to the LLM."}, {"section": "RAG", "question": "What's metadata filtering in vector search, and when do you apply it relative to the similarity search itself?", "answer": "Metadata filtering restricts the candidate set to documents matching specific structured criteria (e.g. `document_type == 'policy'` and `date > '2024-01-01'`) — either **pre-filtering** (narrow the candidate set by metadata first, then run vector similarity only within that subset — generally faster and more precise when the filter is selective) or **post-filtering** (run the full vector search first, then discard results that don't match the metadata filter — simpler to implement, but can return fewer than K useful results if many of the top similarity matches happen to be filtered out afterward). Most production vector databases support efficient pre-filtering natively (integrated into the same index traversal as the similarity search), which is generally preferred over a naive post-filter approach once filters are meaningfully selective."}, {"section": "RAG", "question": "What's multi-vector retrieval, and when would you use it (e.g. ColBERT-style approaches)?", "answer": "Instead of representing an entire document/chunk as one single embedding vector, multi-vector approaches (like ColBERT) produce a separate embedding **per token** (or per small span), and compute relevance via a more granular comparison (e.g. for each query token, find its best-matching document token, then sum those best-match scores) rather than one coarse document-level vector comparison. This captures finer-grained matching (a document is relevant because of specific overlapping concepts in specific positions, not just overall topical similarity) often improving retrieval precision, at the cost of significantly higher storage (many vectors per document instead of one) and more complex/expensive retrieval computation — generally reserved for cases where retrieval quality matters enough to justify that overhead."}, {"section": "RAG", "question": "How does retrieval differ when documents need to be retrieved across multiple languages?", "answer": "If queries and documents might be in different languages (a user asking in Spanish about English-language documentation), you need either a **multilingual embedding model** specifically trained so that semantically equivalent text in different languages ends up close together in vector space regardless of language, or an explicit **translation step** (translate the query into the corpus's primary language, or translate documents into the query's language, before/during retrieval) — multilingual embeddings are generally preferred when available since they avoid translation latency/cost and translation-introduced errors, but their cross-lingual retrieval quality can be noticeably weaker than same-language retrieval, so this should be specifically evaluated rather than assumed to 'just work.'"}, {"section": "RAG", "question": "What's a retrieval pipeline's recall ceiling, and why does improving generation quality never compensate for poor recall?", "answer": "Recall ceiling refers to the maximum possible answer quality given what the retrieval stage actually surfaced — if the truly relevant document was never retrieved at all (a recall failure), no amount of prompt engineering or generation-quality improvement can make the LLM produce a correct, grounded answer, since the necessary information simply isn't present in its context. This is why RAG debugging should generally start by checking retrieval quality in isolation (did the right chunk even get retrieved, ignoring whether the final answer was good) before investigating prompt/generation issues — a system that 'hallucinates wrong answers' is very often actually a retrieval failure being misdiagnosed as a generation failure."}, {"section": "RAG", "question": "What is re-ranking in a RAG pipeline, and why add it after retrieval already returned results?", "answer": "Re-ranking takes the initial set of retrieved candidates (often a larger set than you'll actually use, e.g. top 50) and re-scores/re-orders them using a more accurate (but more computationally expensive) relevance model, then keeps only the top few after re-ranking (e.g. top 5) to actually send to the LLM. It's added because the initial retrieval step (typically fast vector similarity search) optimizes for speed across a huge corpus and is a comparatively weaker relevance signal, while a re-ranker can afford to be much more precise since it only needs to evaluate a small candidate set, not the entire corpus — this two-stage 'retrieve broad, then re-rank precisely' pattern is standard in modern search and RAG systems."}, {"section": "RAG", "question": "What's a cross-encoder, and how does it differ from the embedding model used for initial retrieval?", "answer": "The embedding model used for retrieval is typically a **bi-encoder**: it encodes the query and each document *independently* into separate vectors, then compares them via a simple similarity metric — fast, since document embeddings can be precomputed once and compared cheaply at query time. A **cross-encoder** instead takes the query and a candidate document **together** as a single input, processing them jointly through a transformer so the model can directly attend to interactions between query and document tokens — this produces a much more accurate relevance score, but is far more expensive (can't be precomputed; every query-document pair needs a fresh forward pass), which is exactly why cross-encoders are used for re-ranking a small candidate set, not for searching an entire large corpus directly."}, {"section": "RAG", "question": "How would you actually wire a re-ranking step into a retrieval pipeline?", "answer": "```python\nfrom sentence_transformers import CrossEncoder\n\nreranker = CrossEncoder('cross-encoder/ms-marco-MiniLM-L-6-v2')\n\n# initial retrieval returns a broader candidate set\ncandidates = vector_search(query, top_k=50)\n\npairs = [(query, doc.text) for doc in candidates]\nscores = reranker.predict(pairs)\n\nreranked = [doc for doc, score in sorted(zip(candidates, scores), key=lambda x: x[1], reverse=True)]\ntop_results = reranked[:5]  # only the best few go into the LLM prompt\n```\nThe pattern is always: retrieve a wider net cheaply first, then spend the more expensive re-ranking computation only on that smaller candidate set."}, {"section": "RAG", "question": "What's the trade-off of re-ranking in terms of latency, and how do production systems manage it?", "answer": "Re-ranking adds a real latency cost (cross-encoder inference on potentially dozens of candidates, each requiring its own forward pass, is much slower than the initial vector search) directly in the user-facing request path. Production systems manage this by keeping the re-ranking candidate set small (re-ranking 20-50 candidates rather than hundreds), using smaller/faster cross-encoder models (distilled or smaller architectures trade some accuracy for significantly lower latency), batching the cross-encoder calls efficiently (processing multiple query-document pairs in one batched forward pass rather than sequentially), and sometimes using **hosted re-ranking APIs** (e.g. Cohere's rerank API) that are optimized specifically for this latency-sensitive workload rather than self-hosting a generic cross-encoder."}, {"section": "RAG", "question": "Can an LLM itself be used as a re-ranker, and what's the trade-off versus a dedicated cross-encoder model?", "answer": "Yes — you can prompt an LLM with the query and a candidate document and ask it to score/judge relevance (or even just ask it to pick the best K out of N candidates directly). This can sometimes capture more nuanced relevance judgments (real reasoning about whether a document actually answers the question, not just topical similarity) than a smaller dedicated cross-encoder, but it's typically **much slower and more expensive** per candidate (a full LLM call vs. a lightweight cross-encoder forward pass), making it impractical to apply to many candidates — it's more commonly used for re-ranking only a very small final shortlist, or in offline evaluation rather than the live, latency-sensitive request path."}, {"section": "RAG", "question": "Why might re-ranking sometimes hurt overall answer quality instead of helping?", "answer": "If the re-ranker model itself isn't well-suited to your domain (e.g. trained primarily on general web search relevance, but your documents are highly technical/specialized), it can systematically deprioritize genuinely useful chunks in favor of ones that merely *look* more topically relevant on the surface. It can also introduce additional **failure surface and latency for marginal gain** if your initial retrieval was already reasonably accurate for your specific use case — re-ranking isn't free, and blindly adding it without measuring its actual impact on your evaluation set (does it actually improve answer quality/recall@K for your specific queries) can add cost and complexity without a corresponding quality benefit."}, {"section": "RAG", "question": "Why would you transform a user's raw query before using it for retrieval, instead of embedding it directly?", "answer": "A user's raw query is often poorly phrased for retrieval purposes — too short and ambiguous, phrased very differently from how the answer is worded in the source documents, or actually containing multiple distinct sub-questions bundled into one. Query transformation techniques (rewriting, expansion, decomposition, hypothetical-document generation) aim to bridge that gap between how users naturally ask things and how relevant information is actually phrased/structured in the indexed corpus, generally improving retrieval recall and precision without requiring the user to phrase their question 'correctly' for the retrieval system's benefit."}, {"section": "RAG", "question": "What is HyDE (Hypothetical Document Embeddings), and how does it work?", "answer": "Instead of embedding the user's actual (often short, underspecified) query directly, HyDE first prompts an LLM to generate a **hypothetical answer/document** that would plausibly answer the query — even though this generated text might not be factually correct — and then embeds *that* hypothetical document for the similarity search instead of the raw query. The intuition is that a hypothetical answer is phrased much more similarly to how a real answer document would be phrased (matching vocabulary, structure, level of detail) than a short raw query is, often improving retrieval recall, especially for queries phrased very differently from the corpus's natural language style.\n```python\nhypothetical_doc = llm.generate(f'Write a short passage that would answer: {query}')\nquery_embedding = embed(hypothetical_doc)  # not embed(query) directly\nresults = vector_search(query_embedding, top_k=5)\n```"}, {"section": "RAG", "question": "What is query expansion, and how is it typically implemented with an LLM?", "answer": "Query expansion generates multiple related rephrasings or sub-aspects of the original query (e.g. synonyms, related terms, alternative phrasings) and either embeds/searches with several of them (then merging/deduplicating results) or appends the expanded terms onto the original query before embedding. With an LLM, this is usually done by prompting it directly: 'Generate 3 alternative phrasings of this query that might appear in source documents,' then running retrieval for each variant and combining the results (often via the same rank-fusion approach used in hybrid search) — improving recall for cases where the single original phrasing happens to miss relevant documents that use different terminology."}, {"section": "RAG", "question": "What is multi-query retrieval, and how does it differ from simple query expansion?", "answer": "Multi-query retrieval generates several distinct, meaningfully *different* reformulations of the user's question (not just synonyms, but genuinely different angles/framings of the same underlying information need) and runs retrieval separately for each, then deduplicates and combines all retrieved results into one final candidate set. The distinction from basic query expansion is more about *intent*: expansion typically broadens a single query's surface vocabulary, while multi-query reformulation often aims to cover genuinely different facets or interpretations of an ambiguous question, increasing the chance that at least one reformulation closely matches how the relevant answer is actually phrased in the source corpus."}, {"section": "RAG", "question": "What is query decomposition, and when is it necessary?", "answer": "Some user questions are actually **compound** — bundling multiple distinct sub-questions into one (e.g. 'What's the refund policy, and does it differ for international orders?' is really two related but separate questions). Query decomposition breaks such a question into its constituent sub-questions, retrieves relevant context for *each* sub-question independently, and then synthesizes a combined answer — necessary because a single retrieval pass over the compound question as written often retrieves context biased toward just one of the sub-questions (whichever dominates the embedding), missing relevant content for the other part entirely."}, {"section": "RAG", "question": "What is query routing, and why might a RAG system need it?", "answer": "Query routing decides, before retrieval even happens, **which** index/data source/retrieval strategy a given query should actually use — relevant when a system has multiple distinct knowledge sources (e.g. a product-docs index, a billing-FAQ index, a code-search index) and blindly searching all of them for every query wastes computation and risks pulling in irrelevant cross-domain noise. A router (often a lightweight LLM classification call, or even a simpler keyword/embedding-based classifier) examines the query and decides which specific index(es) to actually query, sometimes also choosing between different retrieval strategies entirely (e.g. 'this looks like a factual lookup, use dense retrieval' vs. 'this looks like an exact code search, use sparse/keyword search')."}, {"section": "RAG", "question": "How would you handle a query that requires information from multiple, separately-indexed sources?", "answer": "Either run retrieval against each relevant source independently (using routing or simply querying all sources in parallel if there are few enough) and merge/rank the combined results before passing them to the LLM, or — for queries that genuinely require reasoning *across* sources sequentially (where the second retrieval depends on something learned from the first) — use a **multi-hop** retrieval pattern: retrieve initial context, let the LLM identify what additional information is still needed, issue a follow-up retrieval based on that gap, and repeat until enough context has been gathered to actually answer the full question."}, {"section": "RAG", "question": "What's the risk of over-engineering query transformation, and how do you know when it's actually helping?", "answer": "Each added transformation step (query rewriting, expansion, HyDE, decomposition) adds latency and LLM-call cost, and not every query actually needs it — for many simple, well-phrased queries, the original query embedded directly already retrieves perfectly well, and adding transformation just adds cost with no quality benefit (and occasionally even *hurts*, e.g. a poorly-generated hypothetical document in HyDE that drifts off-topic). The only reliable way to know is **empirical evaluation**: measure retrieval metrics (recall@K, MRR) with and without each transformation technique on a representative evaluation set of real queries, and only keep the techniques that demonstrably improve results for your actual query distribution — not because a technique is popular or sounds theoretically sound."}, {"section": "RAG", "question": "What is multi-hop RAG, and what kind of questions does it handle that single-pass RAG can't?", "answer": "Multi-hop RAG handles questions that require **chaining** together facts from multiple separate documents, where the second piece of information needed can't even be identified until after the first piece has been found — e.g. 'What's the revenue of the company that acquired Company X?' requires first finding who acquired Company X, *then* retrieving that acquirer's revenue, which couldn't be looked up in a single retrieval pass since the query for the second fact (the acquirer's name) doesn't exist until after the first retrieval resolves it. The pipeline performs retrieval, lets the LLM reason about what's still missing/needed, issues another retrieval based on that gap, and repeats until it has enough chained information to actually answer the original compound question."}, {"section": "RAG", "question": "What is Self-RAG, conceptually?", "answer": "Self-RAG trains (or prompts) a model to generate special **reflection tokens** alongside its output that explicitly judge: whether retrieval is even needed for this query at all, whether each retrieved passage is actually relevant, and whether the generated answer is genuinely supported by/grounded in the retrieved content. This turns retrieval and generation quality control into something the model actively reasons about and signals explicitly, rather than always retrieving blindly and trusting whatever was retrieved unconditionally — allowing the system to skip retrieval entirely for queries that don't need it, or flag/discard low-quality retrieved passages before using them."}, {"section": "RAG", "question": "What is Corrective RAG (CRAG), and what problem does it address?", "answer": "Corrective RAG adds an explicit **relevance-grading step** after retrieval: a lightweight evaluator (often a smaller model) scores each retrieved document as correct/ambiguous/incorrect relative to the query. If retrieval quality is judged poor (e.g. all retrieved documents
