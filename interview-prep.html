<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Interview Prep — Python / FastAPI / System Design</title>
<style>
  :root{
    --bg:#10141a;
    --bg-raised:#161c24;
    --bg-hover:#1d242e;
    --border:#262e39;
    --text:#dde3ea;
    --text-dim:#8893a1;
    --accent:#8fbf7f;
    --accent-dim:#5f8a52;
    --warn:#e8a14b;
    --mono:"JetBrains Mono","Fira Code",ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;
    --sans:"Inter",-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:var(--sans);}
  body{padding-bottom:4rem;}
  a{color:var(--accent);}

  header.topbar{
    position:sticky;top:0;z-index:10;
    background:var(--bg);border-bottom:1px solid var(--border);
    padding:.9rem 1rem;
  }
  .topbar-inner{max-width:840px;margin:0 auto;display:flex;flex-wrap:wrap;align-items:center;gap:.6rem;}
  .brand{
    font-family:var(--mono);font-size:.95rem;color:var(--accent);
    white-space:nowrap;margin-right:auto;
  }
  .brand .dim{color:var(--text-dim);}
  .controls{display:flex;gap:.5rem;flex-wrap:wrap;}
  button.ctrl{
    font-family:var(--sans);font-size:.82rem;font-weight:600;
    background:var(--bg-raised);color:var(--text);border:1px solid var(--border);
    border-radius:6px;padding:.5rem .8rem;cursor:pointer;min-height:38px;
  }
  button.ctrl:hover{background:var(--bg-hover);border-color:var(--accent-dim);}
  button.ctrl:focus-visible{outline:2px solid var(--accent);outline-offset:1px;}

  #status{
    max-width:840px;margin:.6rem auto 0;padding:0 1rem;
    font-family:var(--mono);font-size:.78rem;color:var(--text-dim);
  }

  #warnings{max-width:840px;margin:0.6rem auto 0;padding:0 1rem;}
  .warn-box{
    background:#2a2013;border:1px solid var(--warn);border-radius:8px;
    padding:.7rem .9rem;font-size:.82rem;color:#f0d9ad;
  }
  .warn-box summary{cursor:pointer;font-weight:600;color:var(--warn);}
  .warn-box ul{margin:.5rem 0 0;padding-left:1.2rem;}
  .warn-box li{margin-bottom:.25rem;word-break:break-word;}

  main{max-width:840px;margin:1.2rem auto;padding:0 1rem;}

  
.layout{display:flex;max-width:1400px;margin:1rem auto;padding:0 1rem;gap:1rem}
.section-menu{width:280px;flex-shrink:0;position:sticky;top:80px;max-height:calc(100vh - 100px);overflow:auto;background:rgba(22,28,36,.85);backdrop-filter:blur(14px);border:1px solid var(--border);border-radius:16px;padding:1rem}
.menu-title{font-family:var(--mono);color:var(--accent);margin-bottom:.8rem}
.menu-item{display:block;width:100%;text-align:left;padding:.7rem;border:none;background:none;color:var(--text);border-radius:10px;cursor:pointer;margin-bottom:.35rem}
.menu-item:hover{background:var(--bg-hover)}
.menu-item.active{background:var(--accent);color:#000}
@media(max-width:900px){.layout{flex-direction:column}.section-menu{width:100%;position:static;max-height:none}}

.empty-state{
    text-align:center;color:var(--text-dim);font-family:var(--mono);
    padding:3rem 1rem;border:1px dashed var(--border);border-radius:10px;margin-top:1rem;
  }

  .section{margin-bottom:1.8rem;}
  .section-header{
    display:flex;align-items:baseline;gap:.5rem;
    font-family:var(--mono);color:var(--accent);font-size:1.0rem;
    border-bottom:1px solid var(--border);padding-bottom:.4rem;margin-bottom:.7rem;
  }
  .section-header::before{content:"$ ";color:var(--accent-dim);}
  .section-header .count{color:var(--text-dim);font-size:.78rem;font-weight:normal;}
  .section-header p{display:inline;margin:0;}

  details.q-item{
    border:1px solid var(--border);border-radius:8px;
    background:var(--bg-raised);margin-bottom:.55rem;overflow:hidden;
  }
  details.q-item[open]{border-color:var(--accent-dim);}
  summary.q-row{
    list-style:none;cursor:pointer;
    display:flex;align-items:flex-start;gap:.6rem;
    padding:.75rem .9rem;min-height:44px;
  }
  summary.q-row::-webkit-details-marker{display:none;}
  summary.q-row:hover{background:var(--bg-hover);}
  summary.q-row:focus-visible{outline:2px solid var(--accent);outline-offset:-2px;}
  .chevron{
    font-family:var(--mono);color:var(--accent-dim);flex-shrink:0;
    transition:transform .15s ease;margin-top:.1rem;
  }
  details.q-item[open] .chevron{transform:rotate(90deg);color:var(--accent);}
  .q-text{font-family:var(--mono);font-size:.92rem;line-height:1.5;}
  .q-text p{margin:0;display:inline;}
  .q-text code{background:var(--bg-hover);padding:.1em .3em;border-radius:4px;}

  .a-panel{padding:0 .9rem .9rem 2.3rem;font-size:.92rem;line-height:1.6;color:var(--text);}
  .a-panel p{margin:.4rem 0;}
  .a-panel ul,.a-panel ol{margin:.4rem 0;padding-left:1.3rem;}
  .a-panel li{margin-bottom:.25rem;}
  .a-panel code{
    font-family:var(--mono);background:var(--bg-hover);
    padding:.1em .35em;border-radius:4px;font-size:.88em;
  }
  .a-panel pre{
    background:#0b0e13;border:1px solid var(--border);border-radius:6px;
    padding:.7rem .8rem;overflow-x:auto;margin:.5rem 0;
  }
  .a-panel pre code{background:none;padding:0;}
  .a-panel a{text-decoration:underline;}
  .placeholder-answer{color:var(--text-dim);font-style:italic;}

  @media (prefers-reduced-motion: reduce){
    .chevron{transition:none;}
  }
</style>
</head>
<body>

<header class="topbar">
  <div class="topbar-inner">
    <span class="brand">$ study <span class="dim">python · fastapi · system-design</span></span>
    <div class="controls">
      <button type="button" class="ctrl" id="loadFilesBtn">Load JSON files</button>
      <button type="button" class="ctrl" id="loadFolderBtn">Load folder</button>
      <input type="file" id="filePicker" accept=".json,application/json" multiple hidden>
      <input type="file" id="folderPicker" webkitdirectory hidden>
    </div>
  </div>
</header>

<div id="status"></div>
<div id="warnings"></div>

<div id="enhancedToolbar" style="max-width:840px;margin:1rem auto;padding:0 1rem;display:flex;gap:.5rem;flex-wrap:wrap">
  <input id="globalSearch" placeholder="🔍 Search questions & answers (/)" style="flex:1;min-width:220px;padding:.7rem;border-radius:8px;border:1px solid #333;background:#161c24;color:#dde3ea">
  <button id="themeBtn" class="ctrl">🎨 Theme</button>
  <button id="showFavBtn" class="ctrl">⭐ Favorites</button>
  <span id="progressBadge" style="padding:.7rem;color:#8893a1;font-family:monospace"></span>
</div>

<div class="layout"><aside id="sectionMenu" class="section-menu"></aside><main id="content"></main></div>

  var EMBEDDED_DATA = [{"section": "FastAPI", "question": "What is FastAPI, and what is it actually built on top of?", "answer": "## Short Answer\n\nFastAPI is a modern, high-performance Python web framework for building APIs. It is built primarily on top of **Starlette** and **Pydantic**.\n\n---\n\n## Underlying Components\n\n### 1. Starlette\n\nFastAPI uses **Starlette** as its ASGI toolkit.\n\nStarlette provides:\n\n- Routing\n- Request and Response objects\n- Middleware support\n- WebSocket support\n- Background tasks\n- Lifespan events\n- ASGI compatibility\n\nEssentially, Starlette handles the actual web framework layer.\n\n---\n\n### 2. Pydantic\n\nFastAPI uses **Pydantic** for:\n\n- Data validation\n- Data parsing\n- Serialization\n- Type conversion\n- JSON Schema generation\n\nPydantic allows FastAPI to automatically validate incoming requests based on Python type hints.\n\n---\n\n## What Does FastAPI Add?\n\nFastAPI adds a developer-friendly layer that provides:\n\n- Automatic request validation.\n- Dependency Injection.\n- Automatic OpenAPI generation.\n- Swagger UI and ReDoc documentation.\n- Type-hint-driven API development.\n- Automatic serialization.\n\n---\n\n## Architecture Overview\n\n```text\nClient Request\n      ↓\nASGI Server (Uvicorn/Hypercorn)\n      ↓\nStarlette\n      ↓\nFastAPI\n      ↓\nPydantic Validation\n      ↓\nYour Endpoint Logic\n```\n\n---\n\n## Why is FastAPI so Fast?\n\n- ASGI-based asynchronous architecture.\n- Built on highly optimized Starlette.\n- Pydantic v2 uses Rust-based validation (`pydantic-core`).\n- Supports native async I/O.\n\n---\n\n## Interview Follow-ups\n\n- What's the difference between ASGI and WSGI?\n- Why can't Flask handle async as efficiently?\n- What role does Uvicorn play?"}, {"section": "FastAPI", "question": "How does FastAPI decide whether a function parameter is a path param, a query param, or a request body field?", "answer": "## Short Answer\n\nFastAPI infers parameter locations primarily from the parameter's **name**, **type annotation**, and the route definition.\n\n---\n\n## Path Parameters\n\nIf the parameter name appears inside the route path, FastAPI treats it as a path parameter.\n\n```python\n@app.get('/users/{user_id}')\nasync def get_user(user_id: int):\n    pass\n```\n\nHere, `user_id` becomes a path parameter.\n\n---\n\n## Query Parameters\n\nIf a parameter:\n\n- Is not part of the path.\n- Uses a simple type (`str`, `int`, `bool`, etc.).\n\nFastAPI treats it as a query parameter.\n\n```python\n@app.get('/users')\nasync def list_users(limit: int = 10):\n    pass\n```\n\nRequest:\n\n```text\nGET /users?limit=20\n```\n\n---\n\n## Request Body\n\nIf a parameter is a Pydantic model, FastAPI assumes it comes from the request body.\n\n```python\nclass UserCreate(BaseModel):\n    name: str\n    age: int\n\n@app.post('/users')\nasync def create_user(user: UserCreate):\n    pass\n```\n\nExpected request:\n\n```json\n{\n  \"name\": \"John\",\n  \"age\": 25\n}\n```\n\n---\n\n## Explicit Overrides\n\nYou can override FastAPI's inference using:\n\n- `Query()`\n- `Path()`\n- `Body()`\n- `Header()`\n- `Cookie()`\n\n---\n\n## Interview Follow-ups\n\n- How are multiple body parameters handled?\n- How does FastAPI parse headers and cookies?"}, {"section": "FastAPI", "question": "When do you need to use `Query()`, `Path()`, or `Body()` explicitly instead of relying on inference?", "answer": "## Short Answer\n\nYou typically use them when you need additional validation, metadata, documentation, aliases, or special behavior.\n\n---\n\n## Validation Constraints\n\nExample:\n\n```python\n@app.get('/users')\nasync def get_users(\n    age: int = Query(18, ge=0, le=120)\n):\n    pass\n```\n\nThis adds:\n\n- Default value.\n- Minimum value.\n- Maximum value.\n\n---\n\n## Documentation Metadata\n\n```python\nq: str = Query(\n    ..., \n    description='Search query',\n    min_length=3\n)\n```\n\nThese details automatically appear in Swagger UI.\n\n---\n\n## Path Validation\n\n```python\nitem_id: int = Path(..., gt=0)\n```\n\nUseful when IDs must satisfy constraints.\n\n---\n\n## Request Body Customization\n\nSometimes a single body parameter should be wrapped.\n\n```python\nitem: Item = Body(embed=True)\n```\n\nExpected JSON:\n\n```json\n{\n  \"item\": {\n    \"name\": \"Book\"\n  }\n}\n```\n\nWithout `embed=True`:\n\n```json\n{\n  \"name\": \"Book\"\n}\n```\n\n---\n\n## Interview Follow-ups\n\n- What does `...` mean inside `Query()`?\n- How do aliases work?"}, {"section": "FastAPI", "question": "How do you set a custom response status code, and what's the difference between the decorator's `status_code` and setting it on a `Response` object inside the function?", "answer": "## Short Answer\n\nThe decorator's `status_code` defines a static default status code, while modifying a `Response` object allows dynamic runtime selection.\n\n---\n\n## Static Status Code\n\n```python\n@app.post('/users', status_code=201)\nasync def create_user():\n    return {'message': 'created'}\n```\n\nEvery successful request returns:\n\n```text\n201 Created\n```\n\nThis status also appears in OpenAPI documentation.\n\n---\n\n## Dynamic Status Code\n\n```python\nfrom fastapi import Response\n\n@app.put('/users/{id}')\nasync def upsert_user(id: int, response: Response):\n\n    created = True\n\n    if created:\n        response.status_code = 201\n    else:\n        response.status_code = 200\n\n    return {'id': id}\n```\n\nThe response status depends on runtime logic.\n\n---\n\n## Key Difference\n\n| Decorator | Response Object |\n|-----------|----------------|\n| Static | Dynamic |\n| Included in docs | Not automatically documented |\n| Determined at startup | Determined at runtime |\n\n---\n\n## Interview Follow-ups\n\n- How do you document multiple response codes?\n- What is the `responses` parameter in route decorators?"}, {"section": "FastAPI", "question": "What does `response_model` do, and why specify it separately from the function's `-> ReturnType` annotation?", "answer": "## Short Answer\n\n`response_model` validates, serializes, and filters the actual response sent to the client.\n\n---\n\n## Example\n\n```python\nclass UserOut(BaseModel):\n    id: int\n    username: str\n\n@app.get('/users/{id}', response_model=UserOut)\nasync def get_user(id: int):\n    return {\n        'id': id,\n        'username': 'john',\n        'password': 'secret'\n    }\n```\n\nClient receives:\n\n```json\n{\n  \"id\": 1,\n  \"username\": \"john\"\n}\n```\n\nThe password is automatically removed.\n\n---\n\n## Why Not Only Use Return Types?\n\n```python\nasync def get_user() -> UserOut:\n```\n\nReturn annotations are mostly hints for:\n\n- IDEs\n- Static type checkers\n\nThey are not sufficient for runtime serialization control.\n\n---\n\n## Benefits of `response_model`\n\n- Runtime validation.\n- Field filtering.\n- Documentation generation.\n- Security against accidental data leaks.\n\n---\n\n## Interview Follow-ups\n\n- What happens when returned data doesn't match the response model?\n- How does `response_model_exclude_unset` work?"}, {"section": "FastAPI", "question": "How does a path converter like `/files/{file_path:path}` work, and why is it needed?", "answer": "## Short Answer\n\nThe `:path` converter tells FastAPI to capture the remainder of the URL, including slashes.\n\n---\n\n## Default Behavior\n\n```python\n@app.get('/files/{file_path}')\n```\n\nMatches:\n\n```text\n/files/readme.txt\n```\n\nBut not:\n\n```text\n/files/docs/readme.txt\n```\n\nbecause normal path parameters stop at `/`.\n\n---\n\n## Using `:path`\n\n```python\n@app.get('/files/{file_path:path}')\nasync def get_file(file_path: str):\n    return {'path': file_path}\n```\n\nRequest:\n\n```text\n/files/docs/python/readme.txt\n```\n\nProduces:\n\n```python\nfile_path = 'docs/python/readme.txt'\n```\n\n---\n\n## Common Use Cases\n\n- File servers.\n- Static assets.\n- Nested directories.\n- Proxy services.\n\n---\n\n## Interview Follow-ups\n\n- Why is this converter inherited from Starlette?\n- What other converters exist?"}, {"section": "FastAPI", "question": "If you have both `/items/{item_id}` and `/items/me`, why does declaration order matter?", "answer": "## Short Answer\n\nFastAPI evaluates routes in registration order, and the first matching route wins.\n\n---\n\n## Problem Example\n\n```python\n@app.get('/items/{item_id}')\nasync def get_item(item_id: str):\n    pass\n\n@app.get('/items/me')\nasync def get_current_user_item():\n    pass\n```\n\nRequest:\n\n```text\nGET /items/me\n```\n\nmatches:\n\n```python\n/items/{item_id}\n```\n\nwith:\n\n```python\nitem_id = 'me'\n```\n\nThe `/items/me` route is never reached.\n\n---\n\n## Correct Order\n\n```python\n@app.get('/items/me')\nasync def get_current_user_item():\n    pass\n\n@app.get('/items/{item_id}')\nasync def get_item(item_id: str):\n    pass\n```\n\n---\n\n## Best Practice\n\nAlways define:\n\n1. Specific routes first.\n2. Generic parameterized routes afterward.\n\n---\n\n## Interview Follow-ups\n\n- How does Starlette route matching work internally?\n- How can type converters reduce ambiguity?"}, {"section": "FastAPI", "question": "What is Pydantic's main role inside a FastAPI application?", "answer": "## Short Answer\n\nPydantic provides data validation, parsing, serialization, and schema generation.\n\n---\n\n## Incoming Requests\n\nPydantic validates incoming request data.\n\nInvalid data automatically produces:\n\n```text\n422 Unprocessable Entity\n```\n\nresponses.\n\n---\n\n## Outgoing Responses\n\nPydantic serializes Python objects into JSON-compatible structures.\n\n---\n\n## Documentation Generation\n\nFastAPI uses Pydantic models to generate:\n\n- OpenAPI Schema.\n- Swagger UI.\n- ReDoc documentation.\n\n---\n\n## Single Source of Truth\n\nA single model definition drives:\n\n- Validation.\n- Serialization.\n- Documentation.\n\nThis greatly reduces duplication.\n\n---\n\n## Interview Follow-ups\n\n- How does Pydantic perform type coercion?\n- What are the performance improvements in Pydantic v2?"}, {"section": "FastAPI", "question": "What changed between Pydantic v1 and v2 that's relevant to a FastAPI developer?", "answer": "## Short Answer\n\nPydantic v2 introduced a new Rust-based validation engine, significant performance improvements, and several API changes.\n\n---\n\n## Major Changes\n\n### Serialization\n\nOld:\n\n```python\nmodel.dict()\nmodel.json()\n```\n\nNew:\n\n```python\nmodel.model_dump()\nmodel.model_dump_json()\n```\n\n---\n\n### Validators\n\nOld:\n\n```python\n@validator('name')\n```\n\nNew:\n\n```python\n@field_validator('name')\n```\n\n---\n\n### Configuration\n\nOld:\n\n```python\nclass Config:\n    orm_mode = True\n```\n\nNew:\n\n```python\nmodel_config = ConfigDict(from_attributes=True)\n```\n\n---\n\n### Settings\n\n`BaseSettings` moved into:\n\n```python\npydantic-settings\n```\n\n---\n\n## Biggest Benefit\n\nPydantic v2 is often several times faster than v1.\n\n---\n\n## Interview Follow-ups\n\n- What is `pydantic-core`?\n- Why was validation rewritten in Rust?"}, {"section": "FastAPI", "question": "How do you make a Pydantic field optional with a default, versus required?", "answer": "## Short Answer\n\nA field is required when no default value is provided. It becomes optional only when a default value exists.\n\n---\n\n## Required Field\n\n```python\nclass User(BaseModel):\n    name: str\n```\n\nThe client must provide `name`.\n\n---\n\n## Optional With Default\n\n```python\nclass User(BaseModel):\n    nickname: str | None = None\n```\n\nClients may omit `nickname`.\n\n---\n\n## Important Gotcha\n\n```python\nage: int | None\n```\n\nThis field:\n\n- Allows `None`.\n- Is still required.\n\nbecause no default value exists.\n\n---\n\n## Rule to Remember\n\nType annotation determines:\n\n> What values are allowed.\n\nDefault value determines:\n\n> Whether the field is required.\n\n---\n\n## Interview Follow-ups\n\n- What's the difference between missing and null values?\n- How does FastAPI represent optional fields in OpenAPI?"}, {"section": "FastAPI", "question": "What's a `field_validator`, and when do you need one instead of relying on the type system alone?", "answer": "## Short Answer\n\nA `field_validator` allows custom validation logic that cannot be expressed using simple type annotations or built-in constraints.\n\n---\n\n## Why Use It?\n\nThe type system can validate:\n\n- Data types.\n- Numeric bounds.\n- String lengths.\n- Regular expressions.\n\nHowever, business rules often require additional logic.\n\nExamples:\n\n- Username restrictions.\n- Password complexity checks.\n- Data normalization.\n- Cross-system validation.\n\n---\n\n## Example\n\n```python\nfrom pydantic import BaseModel, field_validator\n\nclass User(BaseModel):\n    username: str\n\n    @field_validator('username')\n    @classmethod\n    def validate_username(cls, value):\n        if ' ' in value:\n            raise ValueError('Spaces are not allowed')\n        return value\n```\n\n---\n\n## Cross-Field Validation\n\nIf validation depends on multiple fields, use:\n\n```python\n@model_validator\n```\n\ninstead.\n\n---\n\n## Interview Follow-ups\n\n- What's the difference between `field_validator` and `model_validator`?\n- In what order are validators executed?"}, {"section": "FastAPI", "question": "How are validation errors reported for nested Pydantic models, e.g. a list of sub-objects?", "answer": "## Short Answer\n\nFastAPI automatically returns a **422 Unprocessable Entity** response when validation fails. For nested models, each error includes a precise location (`loc`) indicating exactly where the invalid data exists.\n\n---\n\n## Example\n\nConsider the following models:\n\n```python\nfrom pydantic import BaseModel\n\nclass Item(BaseModel):\n    name: str\n    price: float\n\nclass Order(BaseModel):\n    items: list[Item]\n```\n\nSuppose the client sends:\n\n```json\n{\n  \"items\": [\n    {\"name\": \"Book\", \"price\": 10.5},\n    {\"name\": \"Pen\", \"price\": 5.0},\n    {\"name\": \"Laptop\", \"price\": \"expensive\"}\n  ]\n}\n```\n\nFastAPI returns:\n\n```json\n{\n  \"detail\": [\n    {\n      \"loc\": [\"body\", \"items\", 2, \"price\"],\n      \"msg\": \"Input should be a valid number\",\n      \"type\": \"float_parsing\"\n    }\n  ]\n}\n```\n\n---\n\n## Understanding `loc`\n\n```text\nbody → request body\nitems → items field\n2 → third element in the list\nprice → price field inside that object\n```\n\nThis means:\n\n> The third item in `items` contains an invalid `price`.\n\n---\n\n## Why is this useful?\n\nFrontend applications can directly map validation errors back to specific form fields without parsing ambiguous error messages.\n\n---\n\n## Interview Follow-ups\n\n- Why does FastAPI return HTTP 422 instead of 400?\n- How can custom validation errors be generated?"}, {"section": "FastAPI", "question": "What's the difference between `model_dump()` and just accessing a Pydantic model's attributes directly?", "answer": "## Short Answer\n\nAccessing attributes returns the live Python objects stored in the model, while `model_dump()` recursively converts the entire model into plain Python data structures suitable for serialization.\n\n---\n\n## Example\n\n```python\nfrom datetime import datetime\nfrom pydantic import BaseModel\n\nclass User(BaseModel):\n    name: str\n    created_at: datetime\n\nuser = User(\n    name='John',\n    created_at=datetime.utcnow()\n)\n```\n\nAttribute access:\n\n```python\nuser.name\nuser.created_at\n```\n\nreturns:\n\n```python\n'John'\ndatetime(...)\n```\n\n---\n\n## Using `model_dump()`\n\n```python\nuser.model_dump()\n```\n\nreturns:\n\n```python\n{\n    'name': 'John',\n    'created_at': datetime(...)\n}\n```\n\nNested models are also converted into dictionaries automatically.\n\n---\n\n## Useful Options\n\nExclude fields:\n\n```python\nuser.model_dump(exclude={'password'})\n```\n\nOnly include explicitly provided fields:\n\n```python\nuser.model_dump(exclude_unset=True)\n```\n\nUse aliases:\n\n```python\nuser.model_dump(by_alias=True)\n```\n\n---\n\n## JSON Serialization\n\n```python\nuser.model_dump_json()\n```\n\nreturns a JSON string and properly serializes types such as:\n\n- `datetime`\n- `UUID`\n- `Decimal`\n\n---\n\n## Interview Follow-ups\n\n- When would `exclude_unset=True` be useful?\n- What's the difference between `model_dump()` and `model_dump_json()`?"}, {"section": "FastAPI", "question": "How do you use different schemas for input vs output, e.g. accepting a password on creation but never returning it?", "answer": "## Short Answer\n\nCreate separate Pydantic models for requests and responses.\n\nThis prevents sensitive fields from accidentally being exposed.\n\n---\n\n## Example\n\n### Request Schema\n\n```python\nclass UserCreate(BaseModel):\n    username: str\n    email: str\n    password: str\n```\n\n### Response Schema\n\n```python\nclass UserPublic(BaseModel):\n    id: int\n    username: str\n    email: str\n```\n\n---\n\n## Route Example\n\n```python\n@app.post('/users', response_model=UserPublic)\nasync def create_user(user: UserCreate):\n\n    db_user = {\n        'id': 1,\n        'username': user.username,\n        'email': user.email,\n        'password': 'hashed_password'\n    }\n\n    return db_user\n```\n\nClient receives:\n\n```json\n{\n  \"id\": 1,\n  \"username\": \"john\",\n  \"email\": \"john@example.com\"\n}\n```\n\nThe password field is automatically removed.\n\n---\n\n## Why is this important?\n\nUsing separate schemas:\n\n- Prevents data leaks.\n- Makes APIs self-documenting.\n- Clearly distinguishes client input from server output.\n- Supports different validation rules for requests and responses.\n\n---\n\n## Best Practice\n\nMany teams maintain:\n\n```text\nUserBase\nUserCreate\nUserUpdate\nUserInDB\nUserPublic\n```\n\nas separate schemas.\n\n---\n\n## Interview Follow-ups\n\n- Why shouldn't ORM models be exposed directly?\n- How does `response_model` protect sensitive data?"}, {"section": "FastAPI", "question": "What is FastAPI's dependency injection system, and how does `Depends()` work at a basic level?", "answer": "## Short Answer\n\nFastAPI's dependency injection (DI) system automatically creates and provides objects or executes reusable logic before running a path operation.\n\n---\n\n## Basic Example\n\n```python\nfrom fastapi import Depends\n\n\ndef get_db():\n    return DatabaseSession()\n\n\n@app.get('/users')\nasync def get_users(db = Depends(get_db)):\n    return db.fetch_users()\n```\n\nBefore the route executes, FastAPI:\n\n1. Calls `get_db()`.\n2. Receives its return value.\n3. Injects that value into `db`.\n4. Executes the route.\n\n---\n\n## Why use Dependencies?\n\nDependencies help centralize reusable logic such as:\n\n- Database sessions.\n- Authentication.\n- Authorization.\n- Logging.\n- Configuration.\n- Common query parameters.\n\n---\n\n## Dependencies Can Have Dependencies\n\n```python\nasync def get_current_user(\n    db = Depends(get_db)\n):\n    ...\n```\n\nFastAPI automatically resolves the entire dependency graph.\n\n---\n\n## Benefits\n\n- Reusable code.\n- Separation of concerns.\n- Easier testing.\n- Less duplication.\n\n---\n\n## Interview Follow-ups\n\n- How does FastAPI build the dependency graph?\n- How are dependency results cached?"}, {"section": "FastAPI", "question": "How do dependencies that use `yield` act like context managers, and why is that useful?", "answer": "## Short Answer\n\nDependencies that use `yield` behave similarly to context managers. Code before `yield` runs before the request, while code after `yield` always executes afterward, even if an exception occurs.\n\n---\n\n## Example\n\n```python\nfrom sqlalchemy.orm import Session\n\n\ndef get_db():\n    db = SessionLocal()\n\n    try:\n        yield db\n\n    finally:\n        db.close()\n```\n\n---\n\n## Execution Flow\n\n```text\nCreate DB session\n        ↓\nYield session to endpoint\n        ↓\nEndpoint executes\n        ↓\nResponse returned\n        ↓\nfinally block executes\n        ↓\nDB session closed\n```\n\n---\n\n## Why is this useful?\n\nIt guarantees cleanup of resources such as:\n\n- Database sessions.\n- File handles.\n- Locks.\n- Network connections.\n\nregardless of whether the request succeeds or fails.\n\n---\n\n## Equivalent Context Manager\n\nConceptually, this behaves like:\n\n```python\nwith SessionLocal() as db:\n    route_logic()\n```\n\n---\n\n## Interview Follow-ups\n\n- What happens if an exception occurs inside the route?\n- When does cleanup code execute relative to the response lifecycle?"}, {"section": "FastAPI", "question": "How do you share a dependency across many path operations without re-declaring `Depends()` on every single one?", "answer": "## Short Answer\n\nRegister the dependency at the router or application level.\n\n---\n\n## Router-Level Dependency\n\n```python\nrouter = APIRouter(\n    prefix='/admin',\n    dependencies=[Depends(verify_admin)]\n)\n```\n\nEvery route on this router automatically executes `verify_admin`.\n\n```python\n@router.get('/users')\nasync def get_users():\n    pass\n\n@router.delete('/users/{id}')\nasync def delete_user(id: int):\n    pass\n```\n\nNo need to repeat:\n\n```python\nDepends(verify_admin)\n```\n\nin every endpoint.\n\n---\n\n## App-Level Dependency\n\n```python\napp = FastAPI(\n    dependencies=[Depends(log_request)]\n)\n```\n\nThis dependency executes for every request in the application.\n\n---\n\n## Common Use Cases\n\n- Authentication.\n- API key verification.\n- Request logging.\n- Tenant identification.\n\n---\n\n## Interview Follow-ups\n\n- When should router-level dependencies be preferred over app-level dependencies?"}, {"section": "FastAPI", "question": "What's the practical difference between a dependency declared at the path-operation level, the router level, and the app level?", "answer": "## Short Answer\n\nThe difference lies in scope.\n\n---\n\n## Path Operation Level\n\n```python\n@app.get('/users')\nasync def get_users(\n    user = Depends(get_current_user)\n):\n    pass\n```\n\nRuns only for this endpoint.\n\n---\n\n## Router Level\n\n```python\nrouter = APIRouter(\n    dependencies=[Depends(authenticate)]\n)\n```\n\nRuns for every endpoint on that router.\n\n---\n\n## Application Level\n\n```python\napp = FastAPI(\n    dependencies=[Depends(log_request)]\n)\n```\n\nRuns for every request in the entire application.\n\n---\n\n## Execution Order\n\nFor a request:\n\n```text\nApp dependencies\n        ↓\nRouter dependencies\n        ↓\nPath dependencies\n        ↓\nEndpoint execution\n```\n\n---\n\n## Choosing the Right Scope\n\n| Scope | Typical Use |\n|--------|-------------|\n| Path | Route-specific logic |\n| Router | Authentication/authorization |\n| App | Logging, metrics, tracing |\n\n---\n\n## Interview Follow-ups\n\n- How are dependency failures propagated?\n- Are dependencies executed concurrently?"}, {"section": "FastAPI", "question": "How do you override a dependency in tests, e.g. to swap a real database for a test one?", "answer": "## Short Answer\n\nUse `app.dependency_overrides` to replace production dependencies with test versions.\n\n---\n\n## Production Dependency\n\n```python\ndef get_db():\n    db = SessionLocal()\n    try:\n        yield db\n    finally:\n        db.close()\n```\n\n---\n\n## Test Dependency\n\n```python\ndef get_test_db():\n    db = TestSessionLocal()\n    try:\n        yield db\n    finally:\n        db.close()\n```\n\n---\n\n## Override Example\n\n```python\napp.dependency_overrides[get_db] = get_test_db\n```\n\nNow every endpoint using:\n\n```python\nDepends(get_db)\n```\n\nreceives the test database instead.\n\n---\n\n## Cleanup\n\nAlways clear overrides after tests:\n\n```python\napp.dependency_overrides.clear()\n```\n\nA pytest fixture is typically used.\n\n---\n\n## Benefits\n\n- No production code changes.\n- Isolated tests.\n- Faster execution.\n- No real external dependencies.\n\n---\n\n## Interview Follow-ups\n\n- Why is dependency overriding superior to monkey patching?\n- How would you mock authentication dependencies?"}, {"section": "FastAPI", "question": "Can a dependency itself depend on other dependencies, and how deep can that nesting go?", "answer": "## Short Answer\n\nYes. Dependencies can depend on other dependencies recursively, forming a dependency graph.\n\n---\n\n## Example\n\n```python\nasync def get_db():\n    ...\n\n\nasync def get_current_user(\n    db = Depends(get_db)\n):\n    ...\n\n\nasync def verify_admin(\n    user = Depends(get_current_user)\n):\n    ...\n```\n\nEndpoint:\n\n```python\n@app.get('/admin')\nasync def admin_panel(\n    admin = Depends(verify_admin)\n):\n    pass\n```\n\n---\n\n## Dependency Graph\n\n```text\nadmin_panel\n      ↓\nverify_admin\n      ↓\nget_current_user\n      ↓\nget_db\n```\n\nFastAPI automatically resolves the entire graph.\n\n---\n\n## Nesting Depth\n\nThere is no practical hard limit imposed by FastAPI.\n\nHowever, extremely deep dependency trees can:\n\n- Increase complexity.\n- Reduce readability.\n- Make debugging harder.\n\n---\n\n## Best Practice\n\nKeep dependencies focused and composable.\n\n---\n\n## Interview Follow-ups\n\n- How does FastAPI detect circular dependencies?\n- How are dependency results cached?"}, {"section": "FastAPI", "question": "What is FastAPI's dependency caching within a single request, and how do you turn it off?", "answer": "## Short Answer\n\nWithin a single request, FastAPI executes each dependency only once and reuses the result wherever needed.\n\n---\n\n## Example\n\nSuppose two dependencies require the same user:\n\n```python\nasync def get_current_user():\n    print('Fetching user')\n    return user\n```\n\n```python\n@app.get('/profile')\nasync def profile(\n    user = Depends(get_current_user),\n    permissions = Depends(check_permissions)\n):\n    pass\n```\n\nEven if `check_permissions` also depends on `get_current_user`, FastAPI calls it only once.\n\n---\n\n## Benefits\n\n- Avoids duplicate database queries.\n- Improves performance.\n- Prevents redundant authentication checks.\n\n---\n\n## Disabling Cache\n\n```python\nDepends(get_current_user, use_cache=False)\n```\n\nThis forces FastAPI to execute the dependency every time it is requested.\n\n---\n\n## When to Disable?\n\nRarely.\n\nTypical use cases include:\n\n- Time-sensitive values.\n- Random value generation.\n- Mutable state retrieval.\n\n---\n\n## Interview Follow-ups\n\n- Is dependency caching shared across requests?\n- How long does dependency cache live?"}, {"section": "FastAPI", "question": "How would you implement a reusable 'get current user' dependency for authenticated routes?", "answer": "## Short Answer\n\nCreate a dependency that extracts a JWT token, validates it, fetches the user, and returns the authenticated user object.\n\n---\n\n## Step 1: Token Extraction\n\n```python\nfrom fastapi.security import OAuth2PasswordBearer\n\noauth2_scheme = OAuth2PasswordBearer(\n    tokenUrl='token'\n)\n```\n\nThis extracts the bearer token from:\n\n```text\nAuthorization: Bearer <token>\n```\n\n---\n\n## Step 2: Current User Dependency\n\n```python\nasync def get_current_user(\n    token: str = Depends(oauth2_scheme),\n    db = Depends(get_db)\n):\n\n    payload = decode_jwt(token)\n\n    user = db.get_user(payload['sub'])\n\n    if not user:\n        raise HTTPException(\n            status_code=401,\n            detail='Invalid credentials'\n        )\n\n    return user\n```\n\n---\n\n## Step 3: Use in Routes\n\n```python\n@app.get('/profile')\nasync def profile(\n    current_user = Depends(get_current_user)\n):\n    return current_user\n```\n\n---\n\n## Benefits\n\n- Centralized authentication logic.\n- Reusable across endpoints.\n- Easier testing.\n- Consistent security behavior.\n\n---\n\n## Interview Follow-ups\n\n- Why should authentication logic not be duplicated inside routes?\n- How would you implement role-based authorization?"}, {"section": "FastAPI", "question": "When should a path operation be `async def` versus a plain `def`?", "answer": "## Short Answer\n\nUse `async def` for non-blocking asynchronous I/O and `def` for blocking synchronous work.\n\n---\n\n## Use `async def` When\n\nYour endpoint uses async libraries:\n\n```python\n@app.get('/users')\nasync def get_users():\n    users = await async_db.fetch_all()\n    return users\n```\n\nExamples:\n\n- Async databases.\n- Async HTTP clients.\n- Async Redis clients.\n- Async file operations.\n\n---\n\n## Use `def` When\n\nYour code uses blocking libraries:\n\n```python\n@app.get('/users')\ndef get_users():\n    return sync_db.fetch_all()\n```\n\nFastAPI automatically executes sync routes in a thread pool.\n\n---\n\n## What Should Be Avoided?\n\n```python\n@app.get('/bad')\nasync def bad_route():\n    time.sleep(5)\n```\n\nThis blocks the event loop and prevents other requests from being processed.\n\n---\n\n## Rule of Thumb\n\n```text\nAsync I/O → async def\nBlocking I/O → def\nCPU-intensive work → background workers\n```\n\n---\n\n## Interview Follow-ups\n\n- What happens internally when FastAPI executes a sync route?\n- Why is blocking code inside `async def` dangerous?"}, {"section": "FastAPI", "question": "If you define a path operation as a plain `def` (sync), does FastAPI block the whole server while it runs?", "answer": "No. FastAPI does **not** execute synchronous (`def`) path operations directly on the event loop.\n\nInstead, FastAPI (through Starlette) automatically runs synchronous route handlers in a **thread pool**. This allows the event loop to continue serving other requests while the blocking code executes in a worker thread.\n\nThis means a blocking operation inside a synchronous route generally affects only the worker thread handling that request, not the entire application.\n\n### Example\n\n```python\n@app.get('/users')\ndef get_users():\n    time.sleep(5)  # Blocking operation\n    return {'status': 'done'}\n```\n\nEven though `time.sleep()` blocks, other requests can still be served because this route runs in a separate thread.\n\n### Important considerations\n\n- Thread pools have a limited number of worker threads.\n- Very high numbers of concurrent blocking requests can exhaust the pool.\n- Thread switching introduces overhead.\n- Async code usually scales better for I/O-heavy workloads.\n\nFor highly concurrent applications, prefer fully async libraries and `async def` routes whenever possible."}, {"section": "FastAPI", "question": "What happens if you call a blocking synchronous library (e.g. `time.sleep()`, a sync requests call) inside an `async def` route?", "answer": "This is one of the most common performance mistakes in FastAPI.\n\nAn `async def` route executes directly on the **event loop**. If you call blocking code inside it, the event loop cannot switch to other coroutines until that operation finishes.\n\nAs a result, **all concurrent requests handled by that worker become stalled**.\n\n### Problematic example\n\n```python\n@app.get('/data')\nasync def get_data():\n    time.sleep(5)\n    return {'ok': True}\n```\n\n`time.sleep()` blocks the entire event loop for 5 seconds.\n\nSimilarly:\n\n```python\n@app.get('/external')\nasync def external_call():\n    response = requests.get('https://api.example.com')\n    return response.json()\n```\n\nThe synchronous `requests` library blocks the event loop.\n\n### Correct alternatives\n\nUse async-compatible libraries:\n\n```python\nawait asyncio.sleep(5)\n```\n\n```python\nasync with httpx.AsyncClient() as client:\n    response = await client.get(url)\n```\n\n### Rule of thumb\n\n- `async def` → use async libraries.\n- `def` → blocking code is acceptable."}, {"section": "FastAPI", "question": "Given that sync `def` routes run in a thread pool, how do you intentionally run a blocking call from inside an `async def` route without freezing the event loop?", "answer": "When an async route must execute blocking code, explicitly offload that work to a worker thread.\n\nFastAPI and Starlette provide `run_in_threadpool()` for this purpose.\n\n### Example\n\n```python\nfrom starlette.concurrency import run_in_threadpool\n\n\ndef expensive_operation():\n    time.sleep(5)\n    return 'done'\n\n\n@app.get('/process')\nasync def process():\n    result = await run_in_threadpool(expensive_operation)\n    return {'result': result}\n```\n\nThe blocking function executes in a separate thread while the event loop remains free to process other requests.\n\n### Lower-level alternative\n\n```python\nloop = asyncio.get_running_loop()\nresult = await loop.run_in_executor(\n    None,\n    expensive_operation\n)\n```\n\n### When to use this\n\n- Legacy synchronous libraries.\n- CPU-light blocking operations.\n- Existing code that cannot easily be converted to async.\n\nFor long-running or CPU-intensive work, a task queue is usually a better solution."}, {"section": "FastAPI", "question": "Why can mixing sync and async database drivers in the same FastAPI app cause problems?", "answer": "Mixing synchronous and asynchronous database access patterns often introduces complexity and subtle performance issues.\n\n### Common problems\n\n### 1. Blocking the event loop\n\nUsing a synchronous driver inside an async route can freeze the event loop.\n\n```python\n@app.get('/users')\nasync def users():\n    result = sync_session.query(User).all()\n    return result\n```\n\nIf the query is slow, every request handled by that worker is delayed.\n\n---\n\n### 2. Multiple connection pools\n\nYou may end up maintaining both:\n\n```python\nsync_engine = create_engine(...)\n```\n\nand\n\n```python\nasync_engine = create_async_engine(...)\n```\n\nEach maintains separate:\n\n- connections\n- pools\n- sessions\n- transaction management\n\nThis increases operational complexity.\n\n---\n\n### 3. Different programming models\n\nSynchronous:\n\n```python\nsession.execute(query)\n```\n\nAsynchronous:\n\n```python\nawait session.execute(query)\n```\n\nDevelopers can easily forget `await` or accidentally use the wrong session type.\n\n### Best practice\n\nChoose a single approach whenever possible:\n\n- Fully synchronous application.\n- Fully asynchronous application.\n\nModern FastAPI projects typically prefer async drivers such as:\n\n- `asyncpg`\n- SQLAlchemy Async\n- Motor (MongoDB)"}, {"section": "FastAPI", "question": "How do you run a long task without blocking the response — and when do you use `BackgroundTasks` versus a real task queue?", "answer": "FastAPI provides `BackgroundTasks` for lightweight tasks that should execute after the response is sent.\n\n### Example\n\n```python\nfrom fastapi import BackgroundTasks\n\n\ndef send_email(email: str):\n    # send email\n    pass\n\n\n@app.post('/signup')\nasync def signup(\n    email: str,\n    background_tasks: BackgroundTasks\n):\n\n    background_tasks.add_task(send_email, email)\n\n    return {'message': 'User created'}\n```\n\nThe client receives the response immediately, while the email is sent afterward.\n\n## Use `BackgroundTasks` when:\n\n- Sending emails.\n- Writing audit logs.\n- Cache invalidation.\n- Small notifications.\n\n## Limitations\n\nBackground tasks:\n\n- run inside the same process\n- are not persisted\n- disappear if the server crashes\n- provide no retries\n- cannot be monitored easily\n\n## Use a real task queue when:\n\n- Tasks take minutes.\n- Retries are required.\n- Work must survive restarts.\n- Tasks need monitoring.\n- Heavy CPU work is involved.\n\nPopular choices:\n\n- Celery\n- Dramatiq\n- RQ\n- Huey\n\n### Example architecture\n\n```text\nFastAPI\n   ↓\nMessage Broker (Redis/RabbitMQ)\n   ↓\nWorker Processes\n```"}, {"section": "FastAPI", "question": "What's `APIRouter` for, and why split routes across multiple routers instead of one giant `app` object?", "answer": "`APIRouter` allows you to organize related endpoints into separate, reusable modules instead of placing every route on a single `FastAPI` application object.\n\nWithout routers:\n\n```python\napp = FastAPI()\n\n@app.get('/users')\ndef get_users():\n    ...\n\n@app.get('/orders')\ndef get_orders():\n    ...\n\n@app.get('/products')\ndef get_products():\n    ...\n```\n\nAs the project grows, `main.py` becomes huge and difficult to maintain.\n\nUsing routers:\n\n```python\n# users/router.py\nfrom fastapi import APIRouter\n\nrouter = APIRouter()\n\n@router.get('/')\ndef get_users():\n    return []\n```\n\n```python\n# main.py\nfrom users.router import router as user_router\n\napp = FastAPI()\napp.include_router(user_router, prefix='/users')\n```\n\nTypical project structure:\n\n```text\napp/\n├── main.py\n├── users/\n│   ├── router.py\n│   ├── service.py\n│   └── schemas.py\n├── orders/\n│   ├── router.py\n│   ├── service.py\n│   └── schemas.py\n```\n\nBenefits:\n\n- Better separation of concerns\n- Easier maintenance\n- Reusable route groups\n- Cleaner code organization\n- Enables team ownership by feature\n\nFor medium and large projects, using `APIRouter` is considered essential."}, {"section": "FastAPI", "question": "How do you apply a common URL prefix and shared dependencies to a whole group of routes at once?", "answer": "You can configure an entire `APIRouter` with a common prefix, tags, and dependencies.\n\nExample:\n\n```python\nfrom fastapi import APIRouter, Depends\n\nrouter = APIRouter(\n    prefix='/users',\n    tags=['Users'],\n    dependencies=[Depends(get_current_user)]\n)\n\n@router.get('/')\ndef list_users():\n    return []\n\n@router.get('/{user_id}')\ndef get_user(user_id: int):\n    return {'id': user_id}\n```\n\nAll routes automatically become:\n\n```text\nGET /users/\nGET /users/{user_id}\n```\n\nAnd all routes automatically execute:\n\n```python\nDepends(get_current_user)\n```\n\nYou can also apply shared dependencies while including routers:\n\n```python\napp.include_router(\n    router,\n    prefix='/api/v1',\n    dependencies=[Depends(authenticate)]\n)\n```\n\nThis avoids duplicating authentication, authorization, or validation logic on every route."}, {"section": "FastAPI", "question": "Does FastAPI treat `/items` and `/items/` as the same route?", "answer": "By default, FastAPI (via Starlette) automatically redirects between trailing-slash and non-trailing-slash routes.\n\nExample:\n\n```python\n@app.get('/items/')\ndef get_items():\n    return []\n```\n\nRequest:\n\n```http\nGET /items\n```\n\nTypically results in:\n\n```http\n307 Temporary Redirect\n```\n\nRedirecting to:\n\n```http\nGET /items/\n```\n\nSimilarly:\n\n```python\n@app.get('/items')\n```\n\nwill redirect `/items/` to `/items`.\n\nAlthough FastAPI handles this automatically, it's good practice to adopt a consistent convention across the API.\n\nMost teams either:\n\n- Always use trailing slashes (`/items/`)\n- Never use trailing slashes (`/items`)\n\nConsistency improves documentation and client experience."}, {"section": "FastAPI", "question": "What are common approaches to API versioning in a FastAPI project?", "answer": "The most common API versioning strategies are:\n\n### 1. URL Path Versioning (Most Popular)\n\n```text\n/api/v1/users\n/api/v2/users\n```\n\nExample:\n\n```python\napp.include_router(v1_router, prefix='/api/v1')\napp.include_router(v2_router, prefix='/api/v2')\n```\n\nPros:\n\n- Explicit and easy to understand\n- Browser-friendly\n- Works well with gateways and caches\n\nCons:\n\n- Can duplicate routes across versions\n\n---\n\n### 2. Header Versioning\n\n```http\nAccept: application/vnd.myapi.v2+json\n```\n\nPros:\n\n- Keeps URLs clean\n\nCons:\n\n- Less discoverable\n- Harder to test manually\n\n---\n\n### 3. Query Parameter Versioning\n\n```http\nGET /users?version=2\n```\n\nPros:\n\n- Easy to implement\n\nCons:\n\n- Easy for clients to forget\n\nFor most FastAPI projects, path-based versioning (`/v1`, `/v2`) is the preferred approach because of its simplicity and tooling support."}, {"section": "FastAPI", "question": "What is middleware in FastAPI/Starlette terms, and what's a typical use case?", "answer": "Middleware is code that executes **for every request and response** passing through the application.\n\nIt sits between the client and your route handlers.\n\nRequest flow:\n\n```text\nClient\n   ↓\nMiddleware\n   ↓\nRoute Handler\n   ↓\nMiddleware\n   ↓\nClient\n```\n\nTypical use cases:\n\n- Request logging\n- Authentication\n- CORS\n- Metrics collection\n- Rate limiting\n- Timing requests\n- Adding custom headers\n\nExample built-in middleware:\n\n```python\nfrom fastapi.middleware.cors import CORSMiddleware\n\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=['*']\n)\n```\n\nMiddleware is ideal when logic must run globally for every request."}, {"section": "FastAPI", "question": "How do you write custom middleware to log request/response timing?", "answer": "FastAPI provides the `@app.middleware('http')` decorator.\n\nExample:\n\n```python\nimport time\nfrom fastapi import Request\n\n@app.middleware('http')\nasync def log_timing(request: Request, call_next):\n    start = time.perf_counter()\n\n    response = await call_next(request)\n\n    duration = time.perf_counter() - start\n\n    print(\n        f'{request.method} {request.url.path} '\n        f'took {duration:.3f}s'\n    )\n\n    response.headers['X-Process-Time'] = str(duration)\n\n    return response\n```\n\nFlow:\n\n```text\nRequest arrives\n↓\nMiddleware starts timer\n↓\nRoute executes\n↓\nMiddleware measures duration\n↓\nResponse returned\n```\n\nThis is commonly used for observability and performance monitoring."}, {"section": "FastAPI", "question": "What's the practical difference between middleware and a dependency, and when would you choose one over the other?", "answer": "Both middleware and dependencies execute additional logic, but they operate at different levels.\n\n### Middleware\n\nRuns for **every request globally**.\n\nExamples:\n\n- Logging\n- Metrics\n- CORS\n- Security headers\n- Request timing\n\n```python\n@app.middleware('http')\nasync def middleware(request, call_next):\n    ...\n```\n\n---\n\n### Dependency\n\nRuns only for routes that explicitly declare it.\n\nExamples:\n\n- Authentication\n- Database sessions\n- Permission checks\n- Pagination\n\n```python\n@app.get('/users')\ndef users(user=Depends(get_current_user)):\n    ...\n```\n\n---\n\n### Rule of thumb\n\nUse **middleware** when:\n\n> The logic should apply to every request.\n\nUse **dependencies** when:\n\n> The logic is route-specific or endpoint-specific.\n\nDependencies also integrate naturally with FastAPI's dependency injection system and are easier to override during testing."}, {"section": "FastAPI", "question": "In what order do multiple registered middlewares execute?", "answer": "Middleware execution follows a **stack (nested) pattern**.\n\nFor requests:\n\n- The last middleware added executes first.\n\nFor responses:\n\n- The first middleware added executes first.\n\nExample:\n\n```python\napp.add_middleware(MiddlewareA)\napp.add_middleware(MiddlewareB)\n```\n\nRequest flow:\n\n```text\nRequest\n↓\nMiddlewareB\n↓\nMiddlewareA\n↓\nRoute\n```\n\nResponse flow:\n\n```text\nRoute\n↓\nMiddlewareA\n↓\nMiddlewareB\n↓\nClient\n```\n\nEquivalent nesting:\n\n```text\nMiddlewareB(\n    MiddlewareA(\n        Route\n    )\n)\n```\n\nThis behavior is important when combining logging, authentication, compression, and custom middleware because ordering can affect correctness."}, {"section": "FastAPI", "question": "How do you return a custom error response using `HTTPException`?", "answer": "`HTTPException` is FastAPI's built-in mechanism for intentionally returning HTTP errors.\n\nRaising an `HTTPException` immediately stops execution of the current request and returns a response with the specified status code and error payload.\n\n### Basic example\n\n```python\nfrom fastapi import FastAPI, HTTPException\n\napp = FastAPI()\n\n\n@app.get('/items/{item_id}')\nasync def get_item(item_id: int):\n    if item_id != 1:\n        raise HTTPException(\n            status_code=404,\n            detail='Item not found'\n        )\n\n    return {'id': item_id}\n```\n\nResponse:\n\n```json\n{\n  \"detail\": \"Item not found\"\n}\n```\n\n### Returning structured errors\n\nThe `detail` parameter can contain more than just a string.\n\n```python\nraise HTTPException(\n    status_code=400,\n    detail={\n        'error_code': 'INVALID_ITEM',\n        'message': 'Item already exists'\n    }\n)\n```\n\nResponse:\n\n```json\n{\n  \"detail\": {\n    \"error_code\": \"INVALID_ITEM\",\n    \"message\": \"Item already exists\"\n  }\n}\n```\n\n### Common status codes\n\n- `400` → Bad Request\n- `401` → Unauthorized\n- `403` → Forbidden\n- `404` → Not Found\n- `409` → Conflict\n- `422` → Validation Error\n- `500` → Internal Server Error\n\n`HTTPException` is commonly raised inside routes, dependencies, authentication checks, and business logic."}, {"section": "FastAPI", "question": "How do you create a global exception handler for a custom exception type?", "answer": "FastAPI allows registering global exception handlers that automatically convert specific exception types into HTTP responses.\n\nThis keeps error handling centralized and avoids repeating `try/except` blocks throughout the application.\n\n### Step 1: Define a custom exception\n\n```python\nclass ItemAlreadyExists(Exception):\n    def __init__(self, item_id: int):\n        self.item_id = item_id\n```\n\n### Step 2: Register a global handler\n\n```python\nfrom fastapi.responses import JSONResponse\n\n\n@app.exception_handler(ItemAlreadyExists)\nasync def item_exists_handler(request, exc):\n    return JSONResponse(\n        status_code=409,\n        content={\n            'detail': f'Item {exc.item_id} already exists'\n        }\n    )\n```\n\n### Step 3: Raise the exception anywhere\n\n```python\n@app.post('/items')\nasync def create_item(item_id: int):\n    if item_id == 1:\n        raise ItemAlreadyExists(item_id)\n\n    return {'success': True}\n```\n\nBenefits:\n\n- Centralized error handling.\n- Consistent API responses.\n- Cleaner route handlers.\n- Easy logging and monitoring.\n\nThis pattern is especially useful for domain-specific exceptions such as:\n\n- `UserNotFound`\n- `InsufficientFunds`\n- `OrderAlreadyShipped`\n- `PermissionDenied`"}, {"section": "FastAPI", "question": "What's the difference between raising `HTTPException` and letting an unhandled exception propagate, in terms of what the client sees?", "answer": "`HTTPException` represents an **expected application error**, while an unhandled exception usually indicates a bug or unexpected failure.\n\n## Raising `HTTPException`\n\n```python\nif user is None:\n    raise HTTPException(\n        status_code=404,\n        detail='User not found'\n    )\n```\n\nClient receives:\n\n```json\n{\n  \"detail\": \"User not found\"\n}\n```\n\nStatus:\n\n```text\n404 Not Found\n```\n\nThe response is predictable and intentionally designed.\n\n---\n\n## Unhandled exception\n\n```python\n@app.get('/users/{id}')\nasync def get_user(id: int):\n    return users[id]\n```\n\nIf `id` doesn't exist:\n\n```python\nKeyError\n```\n\nFastAPI catches it and returns:\n\n```text\n500 Internal Server Error\n```\n\nProduction response:\n\n```json\n{\n  \"detail\": \"Internal Server Error\"\n}\n```\n\nInternal stack traces are logged on the server but hidden from clients.\n\n### Best practice\n\nUse:\n\n- `HTTPException` for expected business errors.\n- Global exception handlers for domain exceptions.\n- Generic exception handlers for unexpected failures.\n\nNever expose raw exception messages to clients in production."}, {"section": "FastAPI", "question": "How do you customize the response shape for FastAPI's built-in request-validation errors (the default 422)?", "answer": "FastAPI automatically raises `RequestValidationError` when incoming data fails validation.\n\nBy default, the response looks like:\n\n```json\n{\n  \"detail\": [\n    {\n      \"loc\": [\"body\", \"age\"],\n      \"msg\": \"field required\",\n      \"type\": \"value_error.missing\"\n    }\n  ]\n}\n```\n\nYou can override this globally.\n\n### Example\n\n```python\nfrom fastapi.exceptions import RequestValidationError\nfrom fastapi.responses import JSONResponse\n\n\n@app.exception_handler(RequestValidationError)\nasync def validation_exception_handler(request, exc):\n    errors = {}\n\n    for err in exc.errors():\n        field = err['loc'][-1]\n        errors[field] = err['msg']\n\n    return JSONResponse(\n        status_code=422,\n        content={\n            'success': False,\n            'errors': errors\n        }\n    )\n```\n\nExample response:\n\n```json\n{\n  \"success\": false,\n  \"errors\": {\n    \"email\": \"field required\",\n    \"age\": \"value is not a valid integer\"\n  }\n}\n```\n\nThis is often necessary when frontend applications expect a specific error structure."}, {"section": "FastAPI", "question": "How would you structure consistent error response bodies across an entire API?", "answer": "Large APIs should expose a consistent error format regardless of the error source.\n\nA common schema is:\n\n```json\n{\n  \"error_code\": \"USER_NOT_FOUND\",\n  \"message\": \"User does not exist\",\n  \"details\": {}\n}\n```\n\n### Example Pydantic model\n\n```python\nfrom pydantic import BaseModel\n\n\nclass ErrorResponse(BaseModel):\n    error_code: str\n    message: str\n    details: dict | None = None\n```\n\n### Example global handler\n\n```python\n@app.exception_handler(UserNotFound)\nasync def handler(request, exc):\n    return JSONResponse(\n        status_code=404,\n        content={\n            'error_code': 'USER_NOT_FOUND',\n            'message': str(exc),\n            'details': None\n        }\n    )\n```\n\nAll errors—including validation errors and unexpected exceptions—should follow the same format.\n\nBenefits:\n\n- Simpler frontend code.\n- Easier API documentation.\n- Consistent client experience.\n- Easier monitoring and analytics."}, {"section": "FastAPI", "question": "What does FastAPI's `OAuth2PasswordBearer` actually do?", "answer": "`OAuth2PasswordBearer` is a FastAPI dependency that extracts a bearer token from the `Authorization` header.\n\nIt does **not** validate or decode the token.\n\n### Example\n\n```python\nfrom fastapi.security import OAuth2PasswordBearer\n\noauth2_scheme = OAuth2PasswordBearer(\n    tokenUrl='token'\n)\n```\n\nUsage:\n\n```python\n@app.get('/profile')\nasync def profile(\n    token: str = Depends(oauth2_scheme)\n):\n    return {'token': token}\n```\n\nRequest:\n\n```http\nAuthorization: Bearer eyJhbGciOi...\n```\n\nThe dependency simply returns:\n\n```python\n\"eyJhbGciOi...\"\n```\n\nResponsibilities of `OAuth2PasswordBearer`:\n\n- Read Authorization header.\n- Extract bearer token.\n- Return token as a string.\n- Configure Swagger's Authorize button.\n\nResponsibilities **it does NOT perform**:\n\n- JWT signature verification.\n- Expiry validation.\n- User lookup.\n- Permission checks.\n\nThose responsibilities belong to a separate dependency such as `get_current_user()`."}, {"section": "FastAPI", "question": "How do you implement JWT-based authentication in FastAPI end-to-end?", "answer": "JWT authentication generally consists of four steps.\n\n## Step 1: User logs in\n\n```python\n@app.post('/login')\nasync def login(credentials: LoginRequest):\n    user = authenticate(credentials)\n\n    token = create_access_token(\n        {'sub': str(user.id)}\n    )\n\n    return {'access_token': token}\n```\n\n---\n\n## Step 2: Client stores token\n\nClient sends:\n\n```http\nAuthorization: Bearer <jwt>\n```\n\non every protected request.\n\n---\n\n## Step 3: Extract token\n\n```python\noauth2_scheme = OAuth2PasswordBearer(\n    tokenUrl='login'\n)\n```\n\n---\n\n## Step 4: Validate token\n\n```python\nasync def get_current_user(\n    token: str = Depends(oauth2_scheme)\n):\n\n    payload = jwt.decode(\n        token,\n        SECRET_KEY,\n        algorithms=['HS256']\n    )\n\n    user_id = payload.get('sub')\n\n    user = get_user(user_id)\n\n    if not user:\n        raise HTTPException(401)\n\n    return user\n```\n\nProtected route:\n\n```python\n@app.get('/me')\nasync def me(\n    user=Depends(get_current_user)\n):\n    return user\n```\n\nTypical JWT claims:\n\n- `sub` → subject/user id\n- `exp` → expiration\n- `iat` → issued at\n- `iss` → issuer\n\nAlways verify:\n\n- signature\n- expiration\n- algorithm\n- issuer (optional)"}, {"section": "FastAPI", "question": "What's the difference between authentication and authorization, and where does each typically live in a FastAPI app?", "answer": "Authentication and authorization solve different problems.\n\n## Authentication\n\nQuestion:\n\n> Who are you?\n\nExamples:\n\n- Username/password validation.\n- JWT verification.\n- Session validation.\n\nTypical implementation:\n\n```python\nasync def get_current_user(...):\n    ...\n```\n\n---\n\n## Authorization\n\nQuestion:\n\n> Are you allowed to do this?\n\nExamples:\n\n- Admin-only endpoint.\n- Premium subscription required.\n- Resource ownership checks.\n\nTypical implementation:\n\n```python\nasync def require_admin(\n    user=Depends(get_current_user)\n):\n\n    if user.role != 'admin':\n        raise HTTPException(403)\n```\n\nProtected route:\n\n```python\n@app.delete('/users/{id}')\nasync def delete_user(\n    user=Depends(require_admin)\n):\n    pass\n```\n\nSeparating authentication and authorization keeps the code modular, reusable, and easier to maintain."}, {"section": "FastAPI", "question": "How would you implement role-based access control (RBAC) as a reusable dependency?", "answer": "A common approach is to create a dependency factory.\n\n### Example\n\n```python\ndef require_role(*roles):\n\n    def checker(\n        user=Depends(get_current_user)\n    ):\n\n        if user.role not in roles:\n            raise HTTPException(\n                status_code=403,\n                detail='Insufficient permissions'\n            )\n\n        return user\n\n    return checker\n```\n\nUsage:\n\n```python\n@app.delete('/users/{id}')\nasync def delete_user(\n    user=Depends(require_role('admin'))\n):\n    pass\n```\n\nMultiple roles:\n\n```python\nDepends(\n    require_role('admin', 'manager')\n)\n```\n\nBenefits:\n\n- Reusable.\n- Declarative.\n- Centralized authorization logic.\n- Easy to extend.\n\nAdvanced systems often move from simple roles to permission-based access control."}, {"section": "FastAPI", "question": "What's the security risk of storing JWTs in `localStorage` versus an HttpOnly cookie?", "answer": "The main difference involves the threats each storage mechanism is vulnerable to.\n\n## `localStorage`\n\nAdvantages:\n\n- Simple.\n- Easy for SPAs.\n- Full JavaScript access.\n\nMajor risk:\n\n### XSS (Cross-Site Scripting)\n\nIf malicious JavaScript executes on your page:\n\n```javascript\nconst token = localStorage.getItem('token')\n```\n\nThe attacker can steal the JWT and impersonate the user.\n\n---\n\n## HttpOnly Cookies\n\nAdvantages:\n\n- JavaScript cannot access them.\n- Resistant to token theft via XSS.\n\nExample:\n\n```python\nresponse.set_cookie(\n    key='access_token',\n    value=token,\n    httponly=True\n)\n```\n\nMajor concern:\n\n### CSRF (Cross-Site Request Forgery)\n\nBecause browsers automatically send cookies:\n\n```http\nCookie: access_token=...\n```\n\nan attacker may trick users into submitting unintended requests.\n\nMitigations:\n\n- `SameSite=Lax` or `Strict`\n- CSRF tokens\n- Origin checks\n\n## General recommendation\n\nFor browser applications:\n\n- Prefer HttpOnly cookies.\n- Enable `Secure=True`.\n- Configure `SameSite`.\n- Implement CSRF protection when necessary.\n\nThere is no universally correct solution; the choice depends on the application's threat model."}, {"section": "FastAPI", "question": "How do you securely hash and verify passwords in a FastAPI app?", "answer": "Passwords should **never** be stored in plaintext or hashed using fast algorithms such as `MD5`, `SHA1`, or plain `SHA256`.\n\nInstead, use dedicated password hashing algorithms such as **bcrypt** or **Argon2**. These algorithms are intentionally computationally expensive and automatically include a random salt, making brute-force attacks significantly harder.\n\nA common approach is to use the `passlib` library.\n\n### Password hashing\n\n```python\nfrom passlib.context import CryptContext\n\npwd_context = CryptContext(\n    schemes=['bcrypt'],\n    deprecated='auto'\n)\n\nhashed_password = pwd_context.hash('mysecretpassword')\n```\n\n### Password verification\n\n```python\nis_valid = pwd_context.verify(\n    'mysecretpassword',\n    hashed_password\n)\n```\n\n### Typical login flow\n\n```python\nuser = get_user_from_db(username)\n\nif not user:\n    raise HTTPException(status_code=401)\n\nif not pwd_context.verify(password, user.hashed_password):\n    raise HTTPException(status_code=401)\n```\n\n## Interview points\n\n- Never store plaintext passwords.\n- Never use fast hashing algorithms.\n- Always use salted password hashing algorithms.\n- `bcrypt` and `Argon2` are industry standards.\n- `passlib` is commonly used with FastAPI."}, {"section": "FastAPI", "question": "What is CSRF, and does it matter for a FastAPI JSON API consumed by a separate single-page frontend?", "answer": "**CSRF (Cross-Site Request Forgery)** is an attack where a malicious website tricks a logged-in user's browser into sending unwanted requests to another website where the user is already authenticated.\n\nThis attack primarily affects applications that authenticate users using **cookies**, because browsers automatically send cookies with requests.\n\n### Example scenario\n\n1. User logs into `bank.com`.\n2. Browser stores authentication cookie.\n3. User visits a malicious site.\n4. Malicious page submits:\n\n```html\n<form action=\"https://bank.com/transfer\" method=\"POST\">\n  <input name=\"amount\" value=\"10000\">\n</form>\n```\n\n5. Browser automatically includes the auth cookie.\n6. Transfer occurs without user intent.\n\n## Does it affect SPAs?\n\n### If using Bearer tokens\n\n```http\nAuthorization: Bearer eyJhbGci...\n```\n\nCSRF is generally **not a concern**, because browsers do not automatically attach Authorization headers.\n\n### If using HttpOnly cookies\n\nCSRF protection is required.\n\nTypical protections:\n\n- `SameSite=Lax`\n- `SameSite=Strict`\n- CSRF tokens\n- Double-submit cookies\n\n## Interview takeaway\n\n- Cookie authentication → vulnerable to CSRF.\n- Bearer-token authentication → mostly immune to CSRF.\n- Cookie auth + FastAPI → implement CSRF protection."}, {"section": "FastAPI", "question": "How do you protect a login endpoint against brute-force password-guessing attempts?", "answer": "A secure login system should implement multiple defenses against automated password guessing.\n\n## 1. Rate limiting\n\nLimit login attempts per IP or username.\n\nExample using `slowapi`:\n\n```python\nfrom slowapi import Limiter\n\nlimiter = Limiter(key_func=get_remote_address)\n\n@app.post('/login')\n@limiter.limit('5/minute')\nasync def login():\n    ...\n```\n\n## 2. Account lockout\n\nTemporarily lock accounts after repeated failures.\n\n```text\n5 failed attempts -> lock for 15 minutes\n```\n\n## 3. Exponential backoff\n\nIncrease delay after each failure.\n\n```text\n1st failure -> 1 sec\n2nd failure -> 2 sec\n3rd failure -> 4 sec\n```\n\n## 4. CAPTCHA\n\nRequire CAPTCHA after several failed attempts.\n\n## 5. Generic error messages\n\nAvoid revealing whether username exists.\n\nBad:\n\n```text\nUser does not exist\n```\n\nGood:\n\n```text\nInvalid username or password\n```\n\n## 6. Logging and monitoring\n\nLog suspicious activity.\n\n```python\nlogger.warning(\n    f'Failed login for {username}'\n)\n```\n\n## Interview takeaway\n\nProtect login endpoints using:\n\n- Rate limiting\n- Lockouts\n- CAPTCHA\n- Generic errors\n- Monitoring"}, {"section": "FastAPI", "question": "What are `BackgroundTasks` for, and what are their real limitations?", "answer": "`BackgroundTasks` allow FastAPI to execute work **after the HTTP response has been sent**.\n\nTypical use cases:\n\n- Sending emails\n- Writing audit logs\n- Triggering notifications\n\nExample:\n\n```python\nfrom fastapi import BackgroundTasks\n\n\ndef send_email(email):\n    print(f'Sending email to {email}')\n\n\n@app.post('/signup')\nasync def signup(\n    background_tasks: BackgroundTasks\n):\n\n    background_tasks.add_task(\n        send_email,\n        'user@example.com'\n    )\n\n    return {'message': 'User created'}\n```\n\nThe client receives the response immediately.\n\n## Limitations\n\n### No persistence\n\nIf server crashes:\n\n```text\nTask is lost forever.\n```\n\n### No retries\n\nFailed tasks are not automatically retried.\n\n### Same process execution\n\nTasks run inside the API worker process.\n\nLong tasks can consume API resources.\n\n### No monitoring\n\nNo dashboards, queues, or status tracking.\n\n## Interview takeaway\n\nUse `BackgroundTasks` only for:\n\n- Lightweight\n- Non-critical\n- Fire-and-forget work"}, {"section": "FastAPI", "question": "When should you reach for Celery/RQ instead of `BackgroundTasks`?", "answer": "Use a real task queue whenever work becomes:\n\n- Long-running\n- Critical\n- Retryable\n- Distributed\n- Monitorable\n\nExamples:\n\n### Good for BackgroundTasks\n\n- Send welcome email\n- Write audit logs\n- Cache refresh\n\n### Requires Celery/RQ\n\n- Video processing\n- PDF generation\n- ML inference\n- Payment processing\n- Bulk email campaigns\n\n## Example architecture\n\n```text\nClient\n   |\nFastAPI API\n   |\nRedis/RabbitMQ\n   |\nCelery Workers\n```\n\nExample:\n\n```python\nsend_email.delay(user.email)\n```\n\nBenefits:\n\n- Automatic retries\n- Persistent queue\n- Multiple workers\n- Scheduling support\n- Monitoring dashboards\n\n## Interview takeaway\n\nIf losing the task is unacceptable, use Celery/RQ."}, {"section": "FastAPI", "question": "What happens to a `BackgroundTasks` job if the server process crashes right after the response is sent but before the task runs?", "answer": "The task is permanently lost.\n\n`BackgroundTasks` have **no persistence layer**.\n\nExample timeline:\n\n```text\nClient sends request\n↓\nFastAPI sends response\n↓\nBackground task scheduled\n↓\nServer crashes\n↓\nTask never executes\n```\n\nThere is:\n\n- No retry.\n- No recovery.\n- No queue.\n- No warning.\n\nExample:\n\n```python\nbackground_tasks.add_task(\n    send_password_reset_email,\n    user.email\n)\n```\n\nIf the process dies immediately after returning:\n\n```text\nUser never receives email.\n```\n\nThis is why critical operations should use:\n\n- Celery\n- RQ\n- Dramatiq\n\n## Interview takeaway\n\n`BackgroundTasks` provide **best-effort execution only**."}, {"section": "FastAPI", "question": "How do you implement a basic WebSocket endpoint in FastAPI?", "answer": "FastAPI supports WebSockets through Starlette.\n\nBasic implementation:\n\n```python\nfrom fastapi import WebSocket\nfrom fastapi import WebSocketDisconnect\n\n\n@app.websocket('/ws')\nasync def websocket_endpoint(\n    websocket: WebSocket\n):\n\n    await websocket.accept()\n\n    try:\n        while True:\n            message = await websocket.receive_text()\n\n            await websocket.send_text(\n                f'Echo: {message}'\n            )\n\n    except WebSocketDisconnect:\n        print('Client disconnected')\n```\n\nImportant methods:\n\n```python\nawait websocket.accept()\nawait websocket.receive_text()\nawait websocket.send_text()\nawait websocket.close()\n```\n\n## Connection lifecycle\n\n```text\nClient connects\n↓\nServer accepts handshake\n↓\nReceive/send loop\n↓\nClient disconnects\n```\n\nAlways handle:\n\n```python\nWebSocketDisconnect\n```\n\nto avoid noisy exceptions."}, {"section": "FastAPI", "question": "How do you manage multiple connected WebSocket clients, e.g. to broadcast a message to everyone?", "answer": "The typical approach is to maintain a connection manager.\n\n```python\nclass ConnectionManager:\n\n    def __init__(self):\n        self.connections = []\n\n    async def connect(self, websocket):\n        await websocket.accept()\n        self.connections.append(websocket)\n\n    def disconnect(self, websocket):\n        self.connections.remove(websocket)\n\n    async def broadcast(self, message):\n        for connection in self.connections:\n            await connection.send_text(message)\n```\n\nUsage:\n\n```python\nmanager = ConnectionManager()\n```\n\nInside endpoint:\n\n```python\nawait manager.connect(websocket)\n\nawait manager.broadcast('Hello everyone')\n```\n\n## Single process limitation\n\nThis works only within one server process.\n\nFor multiple servers:\n\n```text\nFastAPI Instance 1\nFastAPI Instance 2\nFastAPI Instance 3\n```\n\nUse shared pub/sub:\n\n- Redis Pub/Sub\n- Kafka\n- RabbitMQ\n\nOtherwise broadcasts reach only locally connected clients.\n\n## Interview takeaway\n\nSingle instance → in-memory list.\n\nMulti-instance → Redis pub/sub."}, {"section": "FastAPI", "question": "How does authentication work for WebSocket connections, given the initial handshake can't always carry custom headers from a browser client?", "answer": "Browser WebSocket APIs cannot easily send arbitrary headers such as:\n\n```http\nAuthorization: Bearer token\n```\n\nCommon approaches include:\n\n## 1. Query parameter token\n\n```text\nwss://api.example.com/ws?token=abc123\n```\n\nServer:\n\n```python\ntoken = websocket.query_params['token']\n```\n\nSimple but tokens may appear in logs.\n\n## 2. First-message authentication\n\nClient connects.\n\nFirst message:\n\n```json\n{\n  \"token\": \"abc123\"\n}\n```\n\nServer validates before proceeding.\n\n## 3. Cookie authentication\n\nBrowsers automatically include cookies during handshake.\n\nUseful when application already uses session cookies.\n\n## Example\n\n```python\n@app.websocket('/ws')\nasync def ws(websocket: WebSocket):\n\n    token = websocket.query_params.get('token')\n\n    if not validate_token(token):\n        await websocket.close()\n        return\n\n    await websocket.accept()\n```\n\n## Interview takeaway\n\nMost real-world applications use:\n\n- Query tokens\n- First-message authentication\n- Session cookies"}, {"section": "FastAPI", "question": "What's the typical 'session per request' pattern for integrating SQLAlchemy with FastAPI?", "answer": "The recommended pattern is to create one SQLAlchemy session for every request.\n\nExample:\n\n```python\ndef get_db():\n    db = SessionLocal()\n\n    try:\n        yield db\n\n    finally:\n        db.close()\n```\n\nUsage:\n\n```python\n@app.get('/users')\ndef get_users(\n    db: Session = Depends(get_db)\n):\n    return db.query(User).all()\n```\n\nRequest lifecycle:\n\n```text\nRequest starts\n↓\nCreate DB session\n↓\nRoute executes\n↓\nSession closed\n```\n\nBenefits:\n\n- Isolation between requests.\n- Proper connection cleanup.\n- Prevents connection leaks.\n\nThis pattern is the industry standard."}, {"section": "FastAPI", "question": "What's the practical difference between using SQLAlchemy synchronously versus with async support (e.g. `asyncpg`)?", "answer": "## Synchronous SQLAlchemy\n\n```python\nengine = create_engine(...)\n```\n\nQueries block the current thread.\n\n```python\ndef route(db: Session):\n    users = db.query(User).all()\n```\n\nWorks well inside:\n\n```python\ndef route()\n```\n\nbecause FastAPI executes sync routes in a thread pool.\n\n---\n\n## Async SQLAlchemy\n\n```python\nengine = create_async_engine(...)\n```\n\nUses async drivers:\n\n- asyncpg\n- aiomysql\n\nExample:\n\n```python\nasync with AsyncSession(engine) as db:\n    result = await db.execute(stmt)\n```\n\nWorks naturally with:\n\n```python\nasync def route()\n```\n\nBenefits:\n\n- Better concurrency.\n- Non-blocking I/O.\n- Efficient resource usage.\n\nTrade-offs:\n\n- Slightly more complex API.\n- Not all libraries support async.\n\n## Interview takeaway\n\nHigh-concurrency applications generally prefer async SQLAlchemy."}, {"section": "FastAPI", "question": "Why use a per-request dependency to manage the DB session instead of one global session shared by the whole app?", "answer": "SQLAlchemy sessions are **not thread-safe** and should never be shared globally.\n\nBad:\n\n```python\nglobal_db = SessionLocal()\n```\n\nMultiple requests could:\n\n- Modify shared state.\n- Corrupt transactions.\n- Leak data between users.\n- Cause unpredictable bugs.\n\nA session represents a single unit of work.\n\nTherefore each request should receive its own session.\n\n```python\ndef get_db():\n    db = SessionLocal()\n\n    try:\n        yield db\n\n    finally:\n        db.close()\n```\n\nBenefits:\n\n- Isolation.\n- Thread safety.\n- Automatic cleanup.\n- Connection reuse through pool.\n\n## Interview takeaway\n\nAlways use:\n\n```text\nOne request → One DB session\n```\n\nNever:\n\n```text\nEntire app → One DB session\n```"}, {"section": "FastAPI", "question": "How do you handle database schema migrations in a FastAPI project?", "answer": "**Alembic** (SQLAlchemy's companion migration tool) is the standard choice. It auto-generates migration scripts by diffing your SQLAlchemy models against the live database schema:\n\n```bash\nalembic revision --autogenerate -m \"add user table\"\nalembic upgrade head\n```\n\nThis gives you a versioned, reviewable history of schema changes instead of manual `ALTER TABLE` scripts. You can also roll forward/backward safely using `upgrade` and `downgrade` across dev, staging, and production environments."}, {"section": "FastAPI", "question": "What's the N+1 query problem, and how do you avoid it with SQLAlchemy in a FastAPI endpoint?", "answer": "The **N+1 query problem** happens when you fetch N parent records and then trigger an additional query per parent for related data.\n\nExample issue:\n```python\nfor order in orders:\n    print(order.customer.name)\n```\nThis causes 1 query for orders + N queries for customers.\n\n**Fix: eager loading** using `joinedload` or `selectinload`:\n\n```python\nfrom sqlalchemy.orm import joinedload\n\norders = db.query(Order).options(joinedload(Order.customer)).all()\n```\n\nThis reduces it to a single (or constant number of) optimized queries regardless of N."}, {"section": "FastAPI", "question": "How would you implement pagination for an endpoint returning a large dataset?", "answer": "Two common approaches:\n\n### 1. Offset/Limit Pagination\n```http\nGET /items?skip=20&limit=10\n```\nSQL:\n```sql\nOFFSET 20 LIMIT 10\n```\nPros: simple\nCons: slow on large offsets, unstable under concurrent inserts/deletes\n\n### 2. Cursor-based Pagination (preferred)\n```http\nGET /items?after_id=123&limit=10\n```\nSQL:\n```sql\nWHERE id > 123 ORDER BY id LIMIT 10\n```\nPros: fast, stable, scalable\nCons: cannot jump to arbitrary page numbers\n\nCursor-based pagination is preferred for large or frequently changing datasets."}, {"section": "FastAPI", "question": "What's database connection pooling, and why does it matter under load?", "answer": "A **connection pool** reuses existing database connections instead of opening a new one per request.\n\nCreating a new DB connection is expensive (TCP handshake, authentication, allocation) and doesn't scale under high concurrency.\n\nSQLAlchemy example:\n```python\ncreate_engine(\n    DB_URL,\n    pool_size=10,\n    max_overflow=20\n)\n```\n\nBenefits:\n- Reduces latency\n- Prevents DB connection exhaustion\n- Improves throughput\n\nMisconfiguration risks:\n- Too small → request queueing\n- Too large → DB overload (too many connections across app instances)"}, {"section": "FastAPI", "question": "How do you handle a transaction spanning multiple database operations within one endpoint, so they all succeed or all roll back together?", "answer": "Use a **single SQLAlchemy session per request**, which naturally groups operations into one transaction.\n\nExample pattern:\n\n```python\ntry:\n    user = U
