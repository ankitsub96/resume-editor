casional gaps in access, but more expensive to track accurately. **TTL (Time To Live)**: evict entries after a fixed expiration time regardless of access pattern — simple, and a good fit when you know data has a natural 'freshness window' (e.g. a stock price cached for 5 seconds). Real systems often combine TTL (as a safety net against eventually-stale data) with LRU/LFU (for managing limited memory under normal operation)."}, {"section": "System Design", "question": "What's 'cache stampede' (thundering herd), and how do you prevent it?", "answer": "Cache stampede happens when a popular cached item **expires**, and a large burst of concurrent requests all simultaneously experience a cache miss for that same key — all of them then hit the underlying database/service at once trying to regenerate it, potentially overwhelming it (sometimes badly enough to cause a cascading failure) even though only one regeneration was actually needed. Common mitigations: **locking/single-flight** (only let one request actually regenerate the value; others wait for it to finish and then read the now-fresh cache); **probabilistic early expiration** (refresh slightly before the TTL actually expires, spread randomly, so not every request hits the exact same expiry moment); and **stale-while-revalidate** (keep serving the slightly-stale cached value to most requests while one request refreshes it in the background, rather than letting everyone block/miss simultaneously)."}, {"section": "System Design", "question": "How would you use a CDN as a caching layer for a global application?", "answer": "Static, rarely-changing assets (images, CSS, JS bundles, even some API responses for non-personalized data) get a `Cache-Control` header with an appropriate `max-age`/`s-maxage`, and the CDN's edge nodes cache them automatically on first request from each region, serving subsequent requests from that region without ever reaching the origin. For content that changes but is still cacheable for a short window (e.g. a public leaderboard updated every minute), short TTLs balance freshness against load reduction. For genuinely dynamic/personalized content, you'd typically bypass CDN caching entirely (or cache only specific cacheable *fragments* of an otherwise dynamic page) — the key design decision is identifying which parts of your traffic are cacheable at the edge at all, since CDN caching only helps for content that's actually shared across many users' requests."}, {"section": "System Design", "question": "What's the difference between caching at the application layer, the database layer, and the CDN/edge layer?", "answer": "**Application-layer caching** (Redis, in-process) caches computed results or query outputs your own backend code explicitly manages — full control over what's cached and when it's invalidated, but you own that complexity. **Database-layer caching** is often built into the database itself (query result caches, buffer pools caching recently-accessed pages in memory) — largely automatic and transparent to the application, but less controllable/customizable. **CDN/edge caching** caches entire HTTP responses geographically close to users, controlled mostly via HTTP cache headers rather than application code — best for content that's identical across many users' requests (static assets, public API responses), since edge caches generally can't see into the application's internal cache-invalidation logic at all. A mature system layers all three, each handling the kind of data it's best suited for."}, {"section": "System Design", "question": "How do you keep a cache consistent with the source of truth when the underlying data changes?", "answer": "The most common approach is **explicit invalidation on write**: whenever the source of truth (database) is updated, the same code path also deletes (or updates) the corresponding cache key, so the next read is a cache miss that repopulates with fresh data — simpler and safer than trying to update the cache value directly, since deleting just requires knowing the key, not recomputing the correct new value. For systems where multiple services/paths can write the same underlying data, this requires discipline (every write path must remember to invalidate) or, better, centralizing writes through a single layer that handles invalidation consistently. A **short TTL as a safety net** is commonly layered on top regardless, so that even a missed invalidation (a bug, a write path someone forgot about) self-heals within a bounded time window instead of serving stale data indefinitely."}, {"section": "System Design", "question": "What problem do message queues solve in a distributed system?", "answer": "They **decouple** producers (services emitting work/events) from consumers (services processing them) in both time and space — the producer doesn't need the consumer to be available *right now*, doesn't need to know how many consumers exist, and doesn't block waiting for processing to complete. This absorbs traffic spikes (the queue buffers a burst of work that consumers process at their own sustainable pace instead of being overwhelmed directly), enables retrying failed processing without the producer being involved again, and lets you scale producers and consumers independently of each other."}, {"section": "System Design", "question": "What's the difference between a message queue and a pub-sub system?", "answer": "A traditional **message queue** delivers each message to exactly **one** consumer (even with multiple consumers reading from the same queue, each message is processed by only one of them — useful for distributing work across a pool of workers). A **pub-sub** system delivers each message to **every** subscriber interested in that topic — useful for broadcasting an event to multiple independent systems that each need to react to it (e.g. an 'order placed' event triggering inventory update, email notification, and analytics tracking, each as separate independent subscribers). Some systems (Kafka) blur this line by supporting both patterns depending on how consumers are grouped."}, {"section": "System Design", "question": "What's the difference between at-most-once, at-least-once, and exactly-once delivery guarantees?", "answer": "**At-most-once**: a message is delivered zero or one times — if something fails after sending but before confirmation, it's simply lost, never retried (fastest, but risks silent data loss). **At-least-once**: a message is guaranteed to be delivered, but might be delivered **more than once** (e.g. the consumer processed it but crashed before acknowledging, so the broker resends it) — this is the most common real-world guarantee, and it pushes the responsibility of handling duplicates onto the consumer (hence the importance of idempotency). **Exactly-once**: delivered and processed exactly one time, no duplicates, no loss — theoretically ideal but extremely hard to guarantee end-to-end in a truly distributed system (it generally requires either idempotent processing layered on top of at-least-once delivery, or tight coordination/transactional support between the broker and consumer that few systems fully provide)."}, {"section": "System Design", "question": "What is idempotency, and why does it matter for message processing?", "answer": "An idempotent operation produces the **same result no matter how many times it's applied** — calling it once or ten times with the same input has the same effect as calling it once. This matters because most real-world message brokers only guarantee at-least-once delivery, meaning your consumer *will* eventually process the same message more than once (due to retries, redelivery after a crash, network issues). If processing 'charge the customer $10' isn't idempotent, a duplicate delivery charges them twice. The fix is usually an idempotency key: track which message IDs (or business-level keys, like an order ID) have already been processed (in a database or cache), and skip/no-op if you see a duplicate.\n```python\ndef process_payment(message):\n    if already_processed(message.id):\n        return  # safe no-op on duplicate delivery\n    charge_customer(message.amount)\n    mark_processed(message.id)\n```"}, {"section": "System Design", "question": "What's a dead-letter queue, and what's it for?", "answer": "A dead-letter queue (DLQ) is a separate queue where messages get routed after they've failed processing some configured number of times (rather than being retried forever or silently dropped). This prevents a single persistently-failing message (e.g. malformed data that will never successfully process) from clogging the main queue and blocking/delaying all the healthy messages behind it, while still preserving the failed message for inspection, alerting, or manual reprocessing instead of losing it entirely. Engineers typically set up monitoring/alerts on DLQ depth, since a growing DLQ usually signals a real bug in the consumer or a genuine data-quality problem upstream."}, {"section": "System Design", "question": "What's the practical difference between Kafka and a traditional message queue like RabbitMQ?", "answer": "**RabbitMQ** is a traditional broker built around the message-queue model: messages are typically consumed and removed from the queue once acknowledged, it has rich routing capabilities (exchanges, routing keys) for directing messages to specific queues, and it's well-suited for task distribution among a worker pool. **Kafka** is built around a durable, append-only, partitioned **log** — messages aren't removed after consumption, they persist for a configurable retention period, and multiple independent consumer groups can each read the same data at their own pace/position (it acts more like a replayable stream than a one-shot queue). This makes Kafka especially well-suited for event streaming, analytics pipelines, and cases where you want multiple different systems to independently process the same event history (potentially even replaying old events), whereas RabbitMQ fits more naturally as a task/work-distribution queue between a producer and a pool of workers."}, {"section": "System Design", "question": "How would you design an event-driven architecture for an e-commerce order pipeline?", "answer": "When an order is placed, the order service publishes an `OrderPlaced` event (containing order ID, items, customer info) to a message broker, then immediately returns a response to the user without waiting for downstream processing. Multiple independent consumers subscribe to that event and react in parallel: an inventory service decrements stock, a payment service charges the customer, a notification service sends a confirmation email, and an analytics service logs it for reporting — each consumer fails/retries/scales independently of the others. Subsequent state changes (e.g. `PaymentConfirmed`, `OrderShipped`) become their own events triggering their own downstream reactions, forming a chain of loosely-coupled steps rather than one large synchronous function doing everything inline — this is also exactly the kind of multi-step process where the **Saga pattern** becomes relevant for handling failures partway through (e.g. payment fails after inventory was already reserved)."}, {"section": "System Design", "question": "How do you handle backpressure in a queue-based system when consumers can't keep up with producers?", "answer": "Options include: **scaling out consumers** (add more workers reading from the same queue, if the work is parallelizable); **bounding the queue** with a max size and applying backpressure to producers once full (reject/slow down new work rather than letting the queue grow unboundedly); **prioritization** (process higher-priority messages first if not everything can be processed promptly); and **load shedding** (deliberately drop or reject the lowest-priority excess work during sustained overload, rather than letting latency degrade for everything). The wrong approach — letting an unbounded queue simply grow during a sustained mismatch — eventually leads to unbounded memory growth and/or such severe processing lag that 'eventually consistent' becomes 'never actually caught up,' so some explicit limit and policy for what happens when it's hit is necessary."}, {"section": "System Design", "question": "What's the difference between a monolith and microservices, and when would you choose each?", "answer": "A **monolith** is a single deployable application containing all functionality — simpler to develop, test, and deploy initially (one codebase, one deployment pipeline, easy in-process function calls between modules with no network overhead or partial-failure handling needed). **Microservices** split functionality into multiple independently deployable services communicating over the network — each can be scaled, deployed, and owned by a separate team independently, but introduces real distributed-systems complexity (network calls can fail, services need service discovery, debugging requires distributed tracing across service boundaries). The common pragmatic advice: **start with a monolith** unless you already have a clear, pressing reason for microservices (e.g. genuinely independent scaling needs, multiple teams needing to deploy independently without stepping on each other) — premature microservices on a small team/product often just adds operational overhead without the org-scale benefits that justify it."}, {"section": "System Design", "question": "What is an API gateway, and what responsibilities does it typically take on in a microservices architecture?", "answer": "An API gateway is a single entry point that sits in front of multiple backend microservices, routing each incoming request to the appropriate service. Beyond routing, it commonly handles cross-cutting concerns once, rather than duplicating them in every service: authentication/authorization, rate limiting, request/response transformation, TLS termination, and aggregating responses from multiple services into one client-facing response (so a mobile client doesn't need to make 5 separate calls to 5 services). This keeps individual microservices simpler (they don't each need to re-implement auth, rate limiting, etc.) at the cost of the gateway itself becoming a critical, carefully-scaled component — if it goes down, the entire system is unreachable."}, {"section": "System Design", "question": "What is service discovery, and why is it needed in a microservices architecture?", "answer": "In a dynamic environment where service instances are constantly being created, destroyed, scaled, or rescheduled (especially in container orchestrators like Kubernetes), a service's IP address/location isn't fixed — service discovery is the mechanism by which a service finds the current network location of another service it needs to call, instead of hardcoding IPs that will inevitably become stale. **Client-side discovery**: the calling service queries a registry (e.g. Consul, etcd) directly and picks an instance itself. **Server-side discovery**: the caller just sends the request to a known load balancer/proxy, which itself queries the registry and routes accordingly (the caller never needs to know about discovery at all) — this is how most Kubernetes-based architectures work, via the cluster's built-in service abstraction and DNS."}, {"section": "System Design", "question": "What's the strangler fig pattern for migrating a monolith to microservices?", "answer": "Named after the strangler fig vine that gradually grows around and eventually replaces a host tree, this pattern incrementally extracts functionality out of a monolith into new microservices, one piece at a time, while the monolith keeps running — rather than attempting a risky 'big bang' full rewrite. A routing layer (often the same API gateway) is placed in front of the monolith, and specific routes/features are redirected to the new microservice as each one is built and verified, while everything not yet migrated continues being served by the monolith unchanged. Over time, more and more functionality 'strangles' the original monolith until little or nothing of the original remains — this approach lets you ship incrementally and de-risk the migration, rather than betting the whole project on one giant rewrite landing correctly."}, {"section": "System Design", "question": "What's the difference between synchronous and asynchronous communication between microservices?", "answer": "**Synchronous** communication (typically REST/gRPC over HTTP) means the calling service waits for a response before continuing — simple to reason about (looks like a normal function call) but couples the caller's availability/latency directly to the callee's: if the callee is slow or down, the caller is blocked or fails too, and chains of synchronous calls compound latency and failure risk across the whole chain. **Asynchronous** communication (via a message queue/event bus) means the caller fires off a message and continues immediately, without waiting for the receiver to process it — this decouples availability and timing (the receiver can be temporarily down and catch up later) at the cost of more complex error handling, eventual rather than immediate consistency, and the system being harder to reason about end-to-end (you can no longer just trace a single synchronous call stack). Most real systems mix both: synchronous for requests that genuinely need an immediate answer (e.g. 'is this item in stock'), asynchronous for things that can happen eventually (e.g. 'send a confirmation email')."}, {"section": "System Design", "question": "What's the circuit breaker pattern, and what problem does it solve?", "answer": "A circuit breaker wraps calls to a potentially-failing dependency and tracks recent failure rates; once failures exceed a threshold, it 'opens' — immediately failing (or returning a fallback) for subsequent calls **without even attempting** the real call, for some cooldown period, rather than letting every caller keep retrying a dependency that's clearly down. This prevents **cascading failures**: without it, a struggling downstream service gets hammered with continued requests (and retries) from upstream callers, making its recovery harder, while upstream callers themselves pile up threads/connections waiting on a slow/failing dependency, potentially exhausting their own resources and failing in turn. After the cooldown, the breaker enters a 'half-open' state, allowing a limited number of test calls through to check if the dependency has recovered before fully 'closing' (resuming normal traffic) again."}, {"section": "System Design", "question": "What's the bulkhead pattern, and how does it relate to circuit breakers?", "answer": "Named after a ship's bulkheads (compartments that prevent a single hull breach from flooding the entire vessel), this pattern **isolates resources** (thread pools, connection pools) per dependency or per type of work, so that one failing/slow dependency can't exhaust resources shared by everything else. For example, instead of one shared thread pool used for calls to *every* downstream service, give each downstream dependency its own dedicated, bounded pool — if Service A becomes slow and its calls pile up, it can only exhaust *its own* pool, leaving capacity for calls to Service B unaffected. Bulkheads and circuit breakers are complementary: bulkheads limit the *blast radius* of a failure, circuit breakers limit how *long* you keep attempting calls to something that's clearly failing — used together, they meaningfully reduce cascading-failure risk."}, {"section": "System Design", "question": "What are the operational costs of microservices that aren't always obvious upfront?", "answer": "Beyond the commonly-cited benefits (independent scaling, independent deployment), microservices introduce real costs: **distributed debugging** (a single user-facing error might require correlating logs across many services — requiring distributed tracing infrastructure you now have to build/maintain), **network reliability** (every inter-service call can now fail in ways an in-process function call never could — timeouts, partial failures, retries all need explicit handling), **data consistency** (no more simple cross-table transactions once data lives in different services' separate databases — you need patterns like Sagas), **versioning/compatibility** (services evolve independently, so you need careful API versioning to avoid breaking other teams' services), and significant **infrastructure/tooling overhead** (service discovery, API gateways, centralized logging/monitoring, CI/CD pipelines multiplied across many repos/services). These costs are why microservices are usually justified by organizational scale (many teams needing independence) more than by purely technical scaling needs, which can often be met by scaling a well-designed monolith horizontally."}, {"section": "System Design", "question": "What's the difference between distributed consensus and leader election, and why are they hard problems?", "answer": "**Leader election** is the specific problem of getting a group of nodes to agree on which single node is 'the leader' for some purpose (e.g. who's allowed to accept writes). **Distributed consensus** is the more general problem of getting multiple nodes to agree on *any* single value/decision, even though messages can be lost or delayed and nodes can crash — leader election is really just one common application of the general consensus problem. Both are hard because, in an asynchronous network, you fundamentally **cannot distinguish a slow node from a crashed one** — if a node doesn't respond, you don't know whether it's dead, partitioned, or just momentarily slow, and any protocol has to make progress despite that ambiguity without ever risking two nodes both incorrectly believing they're the sole leader at the same time (a 'split-brain' scenario)."}, {"section": "System Design", "question": "What is the Raft (or Paxos) consensus algorithm trying to solve, conceptually?", "answer": "These algorithms let a cluster of nodes agree on a single, ordered sequence of values/operations (often used to keep a replicated log consistent across all nodes) even when some nodes crash or messages are delayed, as long as a **majority (quorum)** of nodes remain reachable and functioning. Conceptually, Raft works by electing a single leader (via a randomized-timeout-based election, avoiding split votes most of the time) who is solely responsible for accepting new entries and replicating them to followers; an entry is considered 'committed' only once a majority of nodes have acknowledged it, which guarantees that even if the leader crashes immediately after, the committed entry survives on whichever node becomes the new leader (since any new leader must also have been part of that same majority). You don't need to know the deep mathematical proofs for an interview — what matters is understanding *why* majority/quorum-based agreement gives you safety despite individual node failures, which is the core idea both Paxos and Raft share."}, {"section": "System Design", "question": "What's a distributed transaction, and why is the two-phase commit (2PC) protocol problematic at scale?", "answer": "A distributed transaction needs multiple separate systems (e.g. two different databases, or two different microservices each with their own database) to either *all* commit a set of changes together or *all* roll back — no partial outcome where one committed and another didn't. **Two-phase commit** coordinates this: in phase 1 ('prepare'), a coordinator asks every participant 'can you commit this?' and each locks its resources and replies yes/no; in phase 2, if everyone said yes, the coordinator tells everyone to actually commit (otherwise, tells everyone to abort). The problem at scale: every participant holds locks for the **entire duration** of both phases (hurting concurrency/throughput under load), the protocol is **blocking** if the coordinator crashes between phases (participants are stuck holding locks, unsure whether to commit or abort, until the coordinator recovers), and it doesn't scale well across many participants or across network-partition-prone environments — which is why most large distributed systems avoid 2PC in favor of patterns like Sagas that accept eventual consistency instead of trying to force atomicity across system boundaries."}, {"section": "System Design", "question": "What is the Saga pattern, and how does it provide an alternative to distributed transactions?", "answer": "A Saga breaks a multi-step business process spanning multiple services into a sequence of local transactions, each with a corresponding **compensating action** that can undo it if a later step fails — instead of one all-or-nothing distributed transaction, you get a sequence of independent, locally-committed steps plus a defined rollback path. For example, an order Saga might be: (1) reserve inventory, (2) charge payment, (3) confirm order — if step 2 fails, you run inventory's compensating action ('release reservation') rather than relying on a coordinator to roll back a never-actually-atomic distributed transaction. Sagas can be coordinated via **orchestration** (a central coordinator service explicitly calls each step and triggers compensations on failure — easier to follow/debug, but the orchestrator becomes a central piece of business logic) or **choreography** (each service reacts to events from the previous step and emits its own event for the next, with no central coordinator — more decoupled, but harder to see the overall flow in one place as the number of steps grows)."}, {"section": "System Design", "question": "What's idempotency in the context of API design, and how do you implement an idempotent endpoint?", "answer": "An idempotent API endpoint produces the same effect (and ideally the same response) whether it's called once or multiple times with the same input — critical for safely retrying requests that might have actually succeeded server-side but failed to return a response to the client (e.g. due to a network blip), where the client genuinely cannot tell whether the original request succeeded. The common implementation is an **idempotency key**: the client generates a unique key (e.g. a UUID) and sends it with the request (often in a header like `Idempotency-Key`); the server checks if it's already processed that exact key — if so, it returns the same response as before without re-executing the operation, rather than e.g. creating a duplicate charge or duplicate order. Note that `GET`, `PUT`, and `DELETE` are conventionally idempotent by HTTP semantics already (calling them repeatedly with the same input should have the same effect as calling once), while `POST` (typically used for creation) is not inherently idempotent, which is exactly why explicit idempotency keys matter most for `POST` endpoints like 'create a payment.'"}, {"section": "System Design", "question": "What's the difference between optimistic concurrency control and a distributed lock?", "answer": "**Optimistic concurrency control** (covered earlier for single-database locking) assumes conflicts are rare and just detects them after the fact via a version check, retrying on conflict — no coordination overhead unless there's actually a conflict. A **distributed lock** (commonly implemented via Redis, ZooKeeper, or etcd) explicitly coordinates *before* the operation, ensuring only one process across the entire distributed system can hold the lock and proceed at a time — necessary when you genuinely need mutual exclusion across multiple separate services/machines (e.g. ensuring only one instance of a scheduled job runs at a time across a fleet of identical worker instances). Distributed locks introduce real failure-mode complexity of their own (what happens if the lock holder crashes without releasing it? — usually mitigated with a lock TTL/expiry), so they should be reached for only when actual mutual exclusion across processes is required, not as a default coordination mechanism."}, {"section": "System Design", "question": "What is consistent hashing, and what problem does it solve for distributed caches/databases?", "answer": "When distributing keys across N servers, a naive approach (`hash(key) % N`) means that adding or removing even one server changes the modulus and **remaps almost every key** to a different server — catastrophic for a cache, since it instantly invalidates nearly everything. Consistent hashing maps both servers and keys onto the same conceptual **ring** (via hashing), and each key is owned by the next server clockwise from its position on the ring. Adding or removing a server then only affects the keys between it and its neighbors on the ring — typically a small fraction of total keys, not nearly all of them — making the cache/cluster far more resilient to scaling up/down or individual node failures without a massive cache-invalidation storm. Real implementations often use **virtual nodes** (each physical server maps to many points on the ring) to smooth out uneven load distribution that plain consistent hashing can otherwise produce."}, {"section": "System Design", "question": "What's a 'split-brain' scenario in a distributed system, and how do you prevent it?", "answer": "Split-brain happens when a network partition causes a cluster to divide into two (or more) groups that each believe they're the legitimate, sole authority — e.g. two nodes both thinking they're 'the primary' and both accepting writes independently, leading to diverging, conflicting data that's genuinely difficult (sometimes impossible) to reconcile afterward. Prevention relies on **quorum-based decision-making**: a node/group can only act as the authoritative primary if it can confirm it has support from a **majority** of the total cluster — since two disjoint groups can't both simultaneously hold a majority of the same total node count, at most one side of any partition can legitimately proceed, and the minority side correctly recognizes it's lost quorum and steps back (refusing writes) rather than risking divergence."}, {"section": "System Design", "question": "What's the difference between a quorum-based system and a primary-based system for achieving consistency?", "answer": "A **primary-based** system designates one node as the authoritative source for writes (and often reads) at any given time — simple to reason about, but the primary is a bottleneck and requires a failover process (with some unavailability window) if it crashes. A **quorum-based** system (e.g. requiring writes to be acknowledged by W out of N replicas, and reads to check R out of N replicas, with `W + R > N` guaranteeing reads see the latest write) distributes the decision across multiple nodes rather than relying on one designated leader — more resilient to any single node's failure and avoids a hard failover step, but requires more careful tuning of the W/R parameters to balance consistency, availability, and latency, and is generally more complex to reason about than a simple 'ask the primary' model."}, {"section": "System Design", "question": "What is clock skew, and why can't distributed systems just rely on wall-clock timestamps to order events across nodes?", "answer": "Clock skew is the natural drift between different machines' system clocks — even with NTP synchronization, clocks across a fleet of servers can differ by milliseconds to seconds, and that drift isn't perfectly predictable or bounded in all conditions (network issues, NTP server unavailability, virtualization quirks can all make it worse). If you order events purely by their wall-clock timestamp from different machines, you can get an incorrect ordering — event B might get a timestamp earlier than event A's, even though A genuinely happened first, simply because B's machine's clock was running fast. The common alternative is **logical clocks** (Lamport timestamps, vector clocks), which track causal ordering based on the actual sequence of message exchanges between nodes rather than physical time — guaranteeing a correct *causal* order ('if A could have influenced B, A is ordered before B') even when physical clocks disagree, though concurrent unrelated events still can't be given a single global 'true' order without additional mechanisms like Google Spanner's TrueTime."}, {"section": "System Design", "question": "What's a rate limiter, and what are the common algorithms for implementing one?", "answer": "A rate limiter restricts how many requests a client can make in a given time window, protecting a service from being overwhelmed (intentionally or accidentally) by any single client. **Token bucket**: a bucket holds up to N tokens, refilling at a fixed rate; each request consumes one token, and requests are rejected once the bucket is empty — allows controlled bursts up to the bucket's capacity while enforcing a steady average rate over time. **Leaky bucket**: similar concept but requests are processed at a strictly fixed output rate regardless of how they arrived, smoothing out bursts entirely rather than allowing them. **Fixed window counter**: count requests in a fixed time window (e.g. 'this minute'), reject once a limit is hit — simple, but can allow up to 2x the intended rate right at window boundaries (a burst at the very end of one window plus a burst at the very start of the next). **Sliding window**: tracks requests over a continuously moving window (often approximated efficiently rather than tracking every individual timestamp) — avoids the boundary-burst problem of fixed windows at the cost of slightly more bookkeeping.\n```python\n# simplified token bucket\nclass TokenBucket:\n    def __init__(self, capacity, refill_rate):\n        self.capacity = capacity\n        self.tokens = capacity\n        self.refill_rate = refill_rate  # tokens per second\n        self.last_refill = time.time()\n\n    def allow_request(self):\n        now = time.time()\n        elapsed = now - self.last_refill\n        self.tokens = min(self.capacity, self.tokens + elapsed * self.refill_rate)\n        self.last_refill = now\n        if self.tokens >= 1:\n            self.tokens -= 1\n            return True\n        return False\n```"}, {"section": "System Design", "question": "How would you implement a distributed rate limiter shared across multiple service instances?", "answer": "Since each service instance can't track rate-limit counters independently (a client could get N times the intended limit by spreading requests across N instances), the counter state needs to live in a **shared store** all instances can access — typically Redis, using its atomic `INCR` (increment) operation combined with a `TTL` (so the counter resets after the window): \n```python\nkey = f'rate_limit:{user_id}:{current_minute}'\ncount = redis.incr(key)\nif count == 1:\n    redis.expire(key, 60)\nif count > LIMIT:\n    reject_request()\n```\nRedis's atomicity guarantees the increment is safe even with many concurrent requests across many service instances hitting it simultaneously, without needing a separate distributed lock. At very high scale, even this shared-Redis approach can become a bottleneck, leading to more sophisticated approaches like approximate, locally-cached counters that periodically sync with the central store, trading some precision for reduced load on the shared counter."}, {"section": "System Design", "question": "What is load shedding, and when would a system intentionally reject requests rather than queue them?", "answer": "Load shedding is deliberately rejecting some incoming requests (e.g. returning `503 Service Unavailable` immediately) once the system is at or near capacity, rather than accepting and queuing every request indefinitely. The reasoning: under genuine overload, queuing everything means **every** request's latency degrades (including requests that would otherwise have been served quickly), and the queue itself consumes memory that can eventually crash the process entirely — taking down *all* traffic, not just the excess. By rejecting some requests fast and explicitly, the system keeps serving the requests it *can* handle promptly, and clients receive a clear, fast failure signal (which they can react to — backing off, retrying later) instead of an indefinitely hanging request. This is especially important for protecting against unpredictable traffic spikes from exceeding a service's tested/known-safe capacity."}, {"section": "System Design", "question": "What's the difference between horizontally scaling stateless application servers versus scaling a stateful database?", "answer": "Stateless application servers can be scaled essentially by just adding more identical instances behind a load balancer — since no instance holds any unique state, any of them can serve any request, and the load balancer just needs to distribute traffic reasonably evenly. A stateful database is fundamentally harder to scale horizontally because the **data itself** has to live somewhere specific — you can't just spin up an empty new database instance and expect it to magically have all the existing data. Scaling a database horizontally requires explicit strategies (replication for read scaling, sharding for write/storage scaling), each with real trade-offs and operational complexity that simply adding more stateless app servers doesn't have — which is why 'just add more servers' is genuinely much easier for the stateless tier than for the data tier of an architecture."}, {"section": "System Design", "question": "What's auto-scaling, and what metrics typically trigger it?", "answer": "Auto-scaling automatically adjusts the number of running instances of a service based on real-time demand, adding instances under load and removing them when demand drops — avoiding both over-provisioning (paying for idle capacity around the clock) and under-provisioning (insufficient capacity during peak traffic). Common trigger metrics: **CPU utilization** (scale out once average CPU exceeds some threshold, e.g. 70%), **memory usage**, **request queue depth/latency** (scaling on latency directly targets the actual user-facing symptom you care about, rather than an indirect proxy like CPU), and **custom application metrics** (e.g. queue backlog size for a worker service). A good auto-scaling setup also needs sensible **cooldown periods** to avoid rapidly oscillating instance counts ('flapping') in response to brief, noisy spikes."}, {"section": "System Design", "question": "What's graceful degradation, and how does it differ from a system simply failing under load?", "answer": "Graceful degradation means a system continues providing **some** level of (reduced) functionality under stress or partial failure, rather than failing completely. Examples: temporarily disabling a non-critical recommendation feature to preserve capacity for core checkout functionality during a traffic spike; serving slightly stale cached data instead of failing outright when the live data source is overloaded; or returning a simplified response (skipping expensive personalization) when under heavy load. This requires deliberately designing which features are 'core' (must always work) versus 'enhancing' (acceptable to degrade or disable under stress) ahead of time — a system that hasn't made this distinction explicit tends to fail in an all-or-nothing way, where overload on any one component can take down the entire user experience instead of just the non-essential parts of it."}, {"section": "System Design", "question": "How would you design a URL shortener (like bit.ly)?", "answer": "**Core requirements**: given a long URL, generate a short, unique code; given the short code, redirect to the original URL. **Schema**: a simple table `urls(short_code PK, long_url, created_at, expires_at)`. **Generating the short code**: either hash the long URL (e.g. take the first 6-8 chars of a base62-encoded MD5/SHA hash, checking for collisions and re-hashing/salting if one occurs) or use a **counter-based** approach (an auto-incrementing global ID, base62-encoded — guarantees no collisions, but requires a centralized or distributed-unique-ID-generator to avoid a single point of write contention at scale). **Redirect flow**: `GET /{short_code}` looks up the long URL and responds with a `301`/`302` redirect — this read path should be **cached heavily** (Redis in front of the DB, since redirects vastly outnumber creations and the same popular short URLs get hit repeatedly) and can be served largely from a CDN edge-cache-friendly layer given how read-heavy it is. **Scale considerations**: shard the URL table by short_code hash if the dataset outgrows a single DB; consider rate-limiting URL creation to prevent abuse; and decide whether short codes are reused/expire or are permanent, which affects whether you ever need to reclaim/recycle codes."}, {"section": "System Design", "question": "How would you design a rate limiter as a standalone shared service used by multiple APIs?", "answer": "Expose a simple internal API: `check_limit(key, limit, window)` that any service calls before processing a request, returning allow/deny. Internally, back it with **Redis** for the actual counters (using `INCR`+`EXPIRE`, or a sorted-set-based sliding window for more precision), since Redis's single-threaded atomic operations and sub-millisecond latency make it well-suited for this extremely latency-sensitive check that sits in the hot path of every request. For very high scale, run Redis as a cluster (sharded by key, e.g. by user ID or API key) to distribute load, and consider a **local, short-lived cache** of 'definitely under limit' results in each calling service to avoid a network round-trip to Redis on every single request when far from the limit (only checking Redis when getting close to it, accepting slightly relaxed precision in exchange for lower latency and load on the shared rate-limiting service)."}, {"section": "System Design", "question": "How would you design a news feed system (like Twitter or Instagram's feed)?", "answer": "Two main approaches, often combined: **Fan-out on write (push)**: when a user posts, immediately push that post into the precomputed feed (e.g. a Redis list per user) of every one of their followers — feed reads become extremely fast (just read the precomputed list), but this is expensive for users with millions of followers (a single post triggers millions of writes) — the classic 'celebrity problem.' **Fan-out on read (pull)**: don't precompute anything; when a user requests their feed, query and merge recent posts from everyone they follow on the fly — writes are cheap (just one post insert), but reads become expensive, especially for users following thousands of accounts. Most large-scale systems use a **hybrid**: push-based fan-out for regular users (most have a manageable follower count), but pull-based (or a separate, lazily-merged path) specifically for celebrity/high-follower accounts, merging their posts into a requesting user's feed at read time rather than fanning out writes to millions of followers. The feed itself is typically backed by a cache (Redis) holding recent post IDs per user, hydrated with full post data from a separate content store on read."}, {"section": "System Design", "question": "How would you design a real-time chat application (like WhatsApp) at a high level?", "answer": "**Connection layer**: clients maintain a persistent **WebSocket** connection to a chat-server fleet; since WebSockets are stateful per-connection, you need a way to route a message to whichever specific server instance currently holds the recipient's connection — commonly solved with a **connection registry** (e.g. in Redis, mapping `user_id → server_instance`) that any server can consult. **Sending a message**: sender's client → sender's chat server → registry lookup for the recipient's server → if found, forward directly over an internal connection/pub-sub channel to that server, which pushes it to the recipient's WebSocket; if the recipient is offline, store the message (e.g. in a per-user message queue/table) for delivery once they reconnect. **Persistence & delivery guarantees**: every message is durably stored (so it survives a server crash) before being considered 'sent,' with delivery/read receipts tracked as separate state updates. **Scale considerations**: shard the connection registry and message storage by user ID; use a pub-sub layer (Redis pub/sub, or Kafka for higher durability) for cross-server-instance message routing, since any given pair of chatting users could be connected to two entirely different server instances."}, {"section": "System Design", "question": "How would you design a distributed unique ID generator (e.g. for the URL shortener or order IDs)?", "answer": "A naive auto-incrementing DB column doesn't scale once you have multiple database shards/instances (you'd get duplicate IDs across shards) and becomes a single point of write contention. Common alternatives: **UUID** (e.g. UUIDv4) — fully decentralized, no coordination needed at all, but the IDs are large (128 bits), not sortable by creation time, and can hurt database index performance due to their randomness causing poor locality. **Twitter's Snowflake approach**: combine a timestamp, a machine/worker ID, and a per-machine sequence number into a single 64-bit integer — IDs are roughly time-sortable (useful for pagination/ordering), compact, and each machine can generate IDs independently without coordinating with others, as long as machine IDs themselves are assigned uniquely (often via a small coordination service or static configuration at deploy time). The right choice depends on whether you need IDs to be roughly time-ordered/sortable (favoring Snowflake-style) or genuinely don't care about ordering and just want maximum simplicity with zero coordination (favoring UUIDs)."}, {"section": "System Design", "question": "How would you design a search autocomplete/typeahead system?", "answer": "**Data structure**: a **trie** (prefix tree) is the classic structure for this — each node represents a character, and walking from the root following the characters of a typed prefix gets you directly to the subtree of all matching completions, without scanning unrelated entries. Each trie node can cache its top-K most popular completions (precomputed/updated periodically) so a lookup just returns that cached list directly, rather than recomputing rankings on every single keystroke. **Updating popularity**: query frequency data is aggregated (often from search logs, processed in a separate offline/batch pipeline) and used to periodically rebuild or update the trie's cached top-K lists, rather than updating rankings synchronously on every search (which would be both unnecessary and expensive at the latency this feature demands). **Scale considerations**: the full trie for a large vocabulary may not fit on one machine, so it's commonly sharded (e.g. by first letter/prefix range) across multiple servers, with results merged if a query could span shard boundaries; and since this feature is extremely latency-sensitive (it must feel instant as the user types), aggressive caching of common prefixes at multiple layers (CDN/edge for very common queries, in-memory at the serving layer) is standard."}, {"section": "System Design", "question": "How would you design a notification system that sends push notifications, email, and SMS at scale?", "answer": "**Decouple via a queue**: the originating service (e.g. an order service) publishes a generic 'send notification' event/message rather than directly calling a notification API synchronously, so it doesn't block waiting on (potentially slow, sometimes-down) third-party providers. A **notification service** consumes these events, determines the right channel(s) based on user preferences (push vs. email vs. SMS, and which the user has actually opted into), and routes each to the relevant **provider adapter** (e.g. APNs/FCM for push, an email provider's API, an SMS gateway like Twilio) — abstracting provider-specific details behind a common interface so providers can be swapped without changing calling code. **Reliability**: each channel's send attempt should be retried with backoff on transient failures, with a dead-letter queue for ones that exhaust retries; for very high volume, consider rate-limiting outgoing sends per provider to respect their own API limits, and batching where providers support it (e.g. bulk email sends) rather than one API call per individual notification. **User preferences & deduplication**: a preferences table per user (channel opt-ins, quiet hours) is checked before sending, and idempotency keys prevent duplicate sends if the same event is processed more than once due to at-least-once delivery from the queue."}, {"section": "System Design", "question": "How would you design a system to count something at extremely high write volume, like video views or post likes?", "answer": "Incrementing a single counter row directly in a relational database for every single view/like creates massive write contention on that one row, especially for popular content — this is a classic **hot-row** problem. Common approaches: **in-memory aggregation with periodic flush** — increment counts in a fast in-memory store (Redis `INCR`, or even local in-process counters per server) and periodically (e.g. every few seconds) flush the aggregated delta to the durable database, drastically reducing the number of actual DB writes compared to one write per event. **Sharded counters** — instead of one counter row, maintain several (e.g. 10-100) counter shards for the same logical counter, with each incoming increment randomly hitting one shard, and the total computed by summing all shards on read — spreads write contention across multiple rows instead of one. For genuinely massive scale (think: a viral video's view count), a degree of **approximation** is often explicitly accepted (e.g. eventual consistency on the displayed count, occasionally batched/sampled rather than perfectly exact in real time), since perfect real-time exact counts at extreme scale usually aren't worth the engineering cost relative to a 'close enough, eventually accurate' count."}, {"section": "System Design", "question": "How would you design a file storage service (like Dropbox or Google Drive) at a high level?", "answer": "**Separate metadata from file content**: a relational/NoSQL database stores file **metadata** (filename, owner, folder structure, permissions, version history) while the actual file **bytes** are stored in a dedicated **object storage** system (like S3) optimized for storing large blobs cheaply and durably — never store large binary file content directly in a relational database. **Upload flow**: rather than routing large file uploads through your application servers (which would tie up application resources just shuffling bytes), commonly generate a **pre-signed URL** that lets the client upload directly to object storage, with the application server only handling the lightweight metadata record creation before/after. **Sync/versioning**: track file changes via content hashing (so identical content across versions/users isn't redundantly stored — deduplication) and chunk large files into blocks for efficient delta-sync (only re-uploading changed chunks of a large file that was slightly modified, not the whole file again, which is how real desktop sync clients achieve fast re-syncs). **Sharing/permissions**: a separate permissions table (or service) governs who can access which files/folders, checked on every metadata and content-access request."}, {"section": "System Design", "question": "How would you design a ride-sharing matching system (like Uber) at a high level?", "answer": "**Location tracking**: drivers' apps periodically send their GPS location (e.g. every few seconds) to a location service, which needs to efficiently answer 'which available drivers are near this rider's location' — typically using a **geospatial index** (geohashing, or a quadtree/grid-based spatial index) rather than scanning all drivers' locations linearly, letting the system quickly query 'drivers within X km of point (lat, lng).' **Matching**: when a rider requests a trip, query nearby available drivers via the geospatial index, apply matching logic (closest driver, but also factoring in driver rating, current load/ETA, surge pricing zones), and send a request to a candidate driver — with a timeout/fallback to the next candidate if they don't accept quickly. **State management**: trip state (requested → matched → in-progress → completed) needs to be tracked reliably with each transition, since both rider and driver apps need consistent, real-time visibility into the trip's current status — this is a natural fit for a state machine, often communicated to both parties via persistent connections (WebSockets or push notifications) rather than polling. **Scale considerations**: location data is extremely high-volume and write-heavy but short-lived (old locations quickly become irrelevant), favoring a fast in-memory/TTL-based store rather than a traditional durable database for the live-tracking piece, with longer-term trip/trip-history data persisted separately in a standard durable store."}, {"section": "System Design", "question": "What's the difference between block storage, file storage, and object storage?", "answer": "**Block storage** (e.g. AWS EBS) presents raw, fixed-size blocks of storage that an operating system formats with its own filesystem — it's what underlies a traditional disk/volume attached to a single server, offering the lowest-level, most flexible access but requiring the OS/application to manage filesystem structure itself; typically used for database storage volumes where low-latency, consistent block-level access matters. **File storage** (e.g. NFS, AWS EFS) provides a shared, hierarchical filesystem (directories and files) that multiple servers can mount and access simultaneously — convenient for shared access patterns (e.g. multiple app servers reading/writing the same files) but generally less performant and scalable than block or object storage for very large-scale use. **Object storage** (e.g. AWS S3) stores data as discrete objects (a blob plus metadata) accessed via a simple HTTP API, with effectively unlimited scalability and very high durability, but no traditional filesystem semantics (no partial-file edits, no nested locking, typically higher per-request latency than block storage) — it's the standard choice for storing large amounts of unstructured data like images, videos, backups, and logs."}, {"section": "System Design", "question": "How does object storage (like S3) achieve very high durability, and why is durability different from availability?", "answer": "**Durability** is the probability that, once stored, your data is *never lost* over time (often quoted as 'eleven nines,' 99.999999999% annual durability) — achieved by automatically and transparently storing multiple redundant copies of every object, often across multiple physically separate facilities/availability zones, with continuous background integrity checks that detect and repair any corrupted/lost replica before it could ever affect all copies simultaneously. **Availability** is whether you can *currently access* the data right now — a service could have a brief availability blip (e.g. a regional outage preventing reads for a few minutes) while still maintaining perfect durability (the data wasn't lost, just temporarily unreachable). The distinction matters in system design because they're optimized differently: durability is primarily about redundancy and corruption-detection across copies, while availability is about uptime/access paths — a system can reasonably trade some availability for cost savings in ways it should almost never trade away durability, since lost data usually can't be recovered at all, while an availability gap is just a temporary inconvenience."}, {"section": "System Design", "question": "How would you design storage for serving large media files (images/videos) efficiently and cheaply?", "answer": "Store the actual media bytes in **object storage** (cheap, durable, scales effortlessly), never in your primary application database. Serve them to users through a **CDN** sitting in front of that object storage, so repeat requests for the same popular media are served from edge caches close to users instead of repeatedly hitting the origin storage. For video specifically, pre-process uploads into multiple **resolutions/bitrates** (transcoding, often done asynchronously via a background job/queue right after upload) so clients can request the appropriate quality for their connection speed/device (adaptive bitrate streaming, e.g. via HLS/DASH) rather than always serving one fixed quality. For cost optimization, move older/rarely-accessed media to cheaper, slower **cold storage tiers** (e.g. S3 Glacier) via lifecycle policies, since paying premium 'hot storage' rates for content nobody's actively viewing anymore is unnecessary cost."}, {"section": "System Design", "question": "What's the difference between hot, warm, and cold storage tiers, and why does that distinction matter for cost?", "answer": "**Hot storage** is optimized for frequent, low-latency access (e.g. standard S3, or an in-memory/SSD-backed store) — most expensive per GB, but fastest to retrieve. **Warm storage** offers a middle ground — somewhat cheaper, with slightly higher retrieval latency, suited for data accessed occasionally but not rarely (e.g. S3 Infrequent Access). **Cold storage** (e.g. S3 Glacier) is by far the cheapest per GB but has meaningfully higher retrieval latency (sometimes minutes to hours, depending on the retrieval tier chosen) and often retrieval fees — suited for archival data accessed rarely, if ever (compliance backups, old logs). The cost matters because storage costs scale directly with total data volume, and most systems accumulate far more old/rarely-accessed data over time than actively-used recent data — automatically tiering data based on actual access patterns (via lifecycle policies that move data from hot → warm → cold as it ages) can reduce overall storage costs dramatically compared to leaving everything in the most expensive hot tier indefinitely."}, {"section": "System Design", "question": "How do you design authentication and authorization for a system with many internal microservices?", "answer": "A common pattern: a central **identity provider/auth service** authenticates the end user once (e.g. via OAuth2/OIDC) and issues a signed token (often a JWT) containing the user's identity and claims/roles. This token is passed along (e.g. via the API gateway, then forwarded internally) to downstream microservices, each of which can independently **verify** the token's signature (using a shared public key, requiring no network call back to the auth service for every single verification) and extract the user's identity/roles from its claims, without each service needing its own separate login flow or database of users. For **service-to-service** calls (not on behalf of an end user, e.g. a background job calling another internal service), a separate mechanism is typically used — service identities/API keys, or mutual TLS — distinct from end-user authentication, since 'which service is calling' is a different question from 'which user is this request on behalf of.'"}, {"section": "System Design", "question": "What's the difference between API keys, OAuth2 tokens, and mutual TLS for service-to-service authentication?", "answer": "**API keys** are simple, static secret strings passed with each request — easy to implement, but if leaked, they're valid until manually revoked/rotated, and they don't carry fine-grained, expiring permission scopes the way tokens can. **OAuth2 tokens** (often JWTs) are typically short-lived, carry specific scopes/claims, and can be issued per-service/per-purpose rather than one static long-lived secret — better security properties, but require the supporting OAuth2 infrastructure (token issuance, refresh, verification) to be in place. **Mutual TLS (mTLS)** has both client and server present and verify each other's TLS certificates during the connection handshake itself, authenticating at the transport layer before any application-level request even happens — strong security (the connection itself can't be established without valid certs) and commonly used within a trusted internal service mesh, but requires certificate issuance/rotation infrastructure (often automated via a service mesh like Istio or Linkerd) to be practical at scale."}, {"section": "System Design", "question": "How do you design a system to protect against a DDoS (distributed denial-of-service) attack at scale?", "answer": "Defense is layered: **edge/CDN absorption** — a large CDN's globally distributed edge network can absorb and filter much of the attack traffic before it ever reaches your origin infrastructure at all, since the attack volume gets spread across many edge locations. **Rate limiting and WAF (Web Application Firewall) rules** at the edge filter out clearly malicious/abusive traffic patterns before they consume backend resources. **Auto-scaling** provides some elasticity to absorb a genuine, if extreme, traffic spike, though pure auto-scaling alone isn't a complete DDoS defense (a sufficiently large attack can still outpace scaling, and scaling indefinitely against an attack is also extremely costly). **Anycast routing** can distribute attack traffic across multiple geographically distributed points of presence rather than concentrating it on one origin IP. Most organizations at meaningful scale rely on a specialized DDoS-protection service (e.g. Cloudflare, AWS Shield) rather than building all of this themselves, since these providers have purpose-built infrastructure and attack-pattern intelligence accumulated across many customers."}, {"section": "System Design", "question": "What's the difference between encryption in transit and encryption at rest, and where does each apply in a typical system?", "answer": "**Encryption in transit** protects data while it's moving across a network — between a client and server (TLS/HTTPS), and ideally also between internal services (mTLS within a service mesh) — protecting against an attacker who can intercept network traffic (e.g. on a shared network, or a compromised network device) from reading or tampering with the data. **Encryption at rest** protects data while it's stored — on disk, in a database, in object storage — protecting against an attacker who gains access to the underlying storage medium itself (a stolen disk, an improperly secured backup, unauthorized access to the storage system) even without intercepting any network traffic at all. A well-designed system needs **both**: encrypting only in transit still leaves stored data vulnerable to direct storage-access attacks, while encrypting only at rest still leaves data exposed to network interception while it's actually being transmitted between systems."}, {"section": "System Design", "question": "How would you design secure secrets management for a system with many services and credentials (DB passwords, API keys, certificates)?", "answer": "Never hardcode secrets in source code or commit them to version control (even in config files in a repo) — use a dedicated **secrets management service** (e.g. HashiCorp Vault, AWS Secrets Manager) that stores secrets encrypted at rest, controls fine-grained access (which specific service/role can retrieve which specific secret), and provides an **audit log** of every access (critical for detecting misuse or for compliance). Services fetch secrets at startup (or dynamically, for secrets that rotate) via an authenticated API call to the secrets manager, rather than secrets being baked into deployment artifacts or environment variables set manually by a human. This also enables **automatic rotation** of secrets (database passwords, API keys) on a schedule without requiring manual coordination across every service that uses them, and makes revoking a compromised credential immediate and centralized rather than requiring you to track down and update every place that credential was hardcoded."}, {"section": "System Design", "question": "What's the difference between logging, metrics, and distributed tracing, and why do you need all three?", "answer": "**Logging** captures discrete, detailed events (often with rich context) — best for understanding exactly *what happened* in a specific instance, e.g. debugging one particular failed request, but expensive to query/aggregate at scale and not great for spotting trends. **Metrics** are numeric, aggregated measurements over time (request count, average latency, error rate) — cheap to store and query even at huge volume, ideal for dashboards, trend-spotting, and alerting, but they lose the detailed context of any single event (you know error rate spiked, but not *which* specific requests failed or why). **Distributed tracing** follows a single request's journey across multiple services, showing exactly where time was spent and which service in the chain caused a failure or slowdown — essential in a microservices architecture where a single user-facing request might touch a dozen internal services, since logs/metrics from any one service alone can't show you the full cross-service picture. Together they cover three different questions: tracing answers 'where in this specific request did the problem happen,' logs answer 'what exactly happened there,' and metrics answer 'is this happening more/less than usual, system-wide.'"}, {"section": "System Design", "question": "How does distributed tracing actually correlate a single request across multiple microservices?", "answer": "When a request first enters the system (e.g. at the API gateway), a unique **trace ID** is generated and attached to it. As that request triggers calls to downstream services, the trace ID is propagated along with each call (typically via HTTP headers, e.g. following the W3C Trace Context standard), and each service creates its own **span** (a record of the work it did, with a start/end time) tagged with that same trace ID plus a parent-span reference linking it back to whichever call triggered it. All these spans, generated independently by different services, are later collected and reassembled (typically by a tracing backend like Jaeger or Zipkin) into a single coherent timeline showing the full call tree for that one request — which service called which, how long each took, and where exactly within that chain a failure or slowdown occurred."}, {"section": "System Design", "question": "What's the difference between monitoring and alerting, and what makes a good alert?", "answer": "**Monitoring** is the ongoing collection and visualization of system health data (dashboards showing latency, error rates, resource usage) — useful for humans actively investigating or doing periodic health checks. **Alerting** is the automated mechanism that proactively notifies someone when a specific condition indicates a real problem, without requiring a human to be actively watching a dashboard at that exact moment. A good alert is **actionable** (it tells you specifically enough what's wrong that you know where to start investigating, not just 'something, somewhere is bad'), **tied to actual user impact** rather than an arbitrary internal metric (alert on elevated error rate or latency affecting real users, not just 'CPU is at 80%' which may or may not actually matter), and tuned to avoid both **false positives** (alerting on noise causes alert fatigue, where people start ignoring alerts entirely) and **false negatives** (missing real problems). Over-alerting is often a worse failure mode in practice than under-alerting, since it erodes trust in the alerting system as a whole."}, {"section": "System Design", "question": "What's a health check, and what's the difference between liveness and readiness checks?", "answer": "A health check is an endpoint (commonly `/health` or similar) that orchestration/load-balancing infrastructure polls to determine whether a service instance is functioning correctly. A **liveness check** answers 'is this process still running and not deadlocked/stuck' — failing it typically causes the orchestrator (e.g. Kubernetes) to **restart** the instance, since the process itself is presumed broken. A **readiness check** answers 'is this instance currently able to serve traffic correctly right now' (e.g. has it finished its startup initialization, can it currently reach its database) — failing it causes the load balancer to **stop routing new traffic** to that instance without necessarily restarting it, which matters for cases like a temporary downstream dependency outage where restarting the instance itself wouldn't help and could even make things worse (e.g. losing in-flight work) while you wait for the dependency to recover."}, {"section": "System Design", "question": "What are the 'four golden signals' commonly used to monitor a service's health?", "answer": "From Google's SRE practices: **Latency** (how long requests take — importantly tracked separately for successful vs. failed requests, since a fast error is very different from a fast success), **Traffic** (how much demand the system is receiving, e.g. requests per second), **Errors** (the rate of requests failing, whether via explicit error responses or implicit failures like wrong results), and **Saturation** (how 'full' the service is relative to its capacity — e.g. CPU/memory/connection-pool utilization, which often predicts future problems before they actually manifest as latency/error issues). Tracking all four together gives a fairly complete picture of a service's real-time health, and is a commonly recommended minimum baseline set of metrics/dashboards for any production service, even before adding more domain-specific custom metrics."}, {"section": "System Design", "question": "How do you approach back-of-the-envelope capacity estimation in a system design interview?", "answer": "The goal isn't precision — it's demonstrating that you can reason about scale and that your design choices are actually informed by realistic numbers rather than guesswork. A typical approach: start from a given or reasonable assumption about **users/scale** (e.g. daily active users), derive **request volume** (how many actions per user per day, converted to requests per second, accounting for non-uniform traffic — peak traffic is often several times the daily average), estimate **storage** (size per record/item × number of records, projected over time, e.g. per year), and estimate **bandwidth** (data transferred per request × request rate). Round numbers aggressively throughout (e.g. treat a day as ~100,000 seconds rather than 86,400, since the goal is order-of-magnitude reasoning, not exact arithmetic) — and explicitly state your assumptions out loud, since a reasonable assumption clearly stated is far more valuable in an interview than a 'precise' number derived from an assumption you never mentioned."}, {"section": "System Design", "question": "Walk through estimating storage requirements for a system storing user-uploaded photos.", "answer": "Say the system has **10 million daily active users**, and each uploads on average **0.5 photos/day** → roughly **5 million photos/day**. If each photo averages **2 MB** (accounting for a typical compressed JPEG at common phone-camera resolutions), that's `5,000,000 × 2 MB = 10 TB/day` of new storage. Over a year: `10 TB × 365 ≈ 3.65 PB/year`. If the product also stores multiple resolutions per photo (e.g. original + thumbnail + a medium size, a common real-world pattern for serving different contexts efficiently), multiply accordingly — say 1.5x overhead for derived sizes, bringing it to roughly **5.5 PB/year**. This kind of estimate immediately tells you object storage (not a traditional database) is the only sane choice, and gives you a number to reason about cost and whether tiered storage (moving older photos to cheaper cold storage) is worth designing in from the start."}, {"section": "System Design", "question": "Walk through estimating the QPS (queries per second) a system needs to handle, given its daily active users.", "answer": "Say **20 million daily active users**, each performing on average **10 read requests/day** (e.g. viewing a feed, opening a profile). Total daily requests: `20,000,000 × 10 = 200,000,000 requests/day`. Converting to average QPS using the rounded ~100,000 seconds/day approximation: `200,000,000 / 100,000 ≈ 2,000 QPS` average. Critically, **peak traffic isn't the average** — real-world traffic is rarely uniform across 24 hours; a common rule of thumb is peak load is **2-3x the daily average**, so you'd actually design/provision for roughly **4,000-6,000 QPS** at peak, not the 2,000 average — under-provisioning for peak (rather than average) load is one of the most common mistakes in this kind of estimation, since average load is almost never the load that actually causes an outage."}, {"section": "System Design", "question": "Why do experienced engineers round numbers aggressively during back-of-envelope estimation, and is that actually a weakness?", "answer": "It's intentional, not a weakness — the goal of this kind of estimation is to get the right **order of magnitude** quickly enough to make an actual architectural decision (do we need sharding? can a single Redis instance handle this? is object storage clearly necessary?), and chasing precise arithmetic wastes time without meaningfully changing those decisions (whether peak load is 4,200 or 4,800 QPS doesn't change whether you need a load balancer and multiple instances — both numbers lead to the same architectural conclusion). Rounding `86,400 seconds/day` to `~100,000` or `1 million` to `10^6` makes mental math fast and far less error-prone, and an interviewer evaluating this is looking for sound reasoning and correctly identifying which numbers actually matter for the design — not for someone to produce a suspiciously precise figure that implies false confidence in inputs that were themselves just estimates to begin with."}, {"section": "System Design", "question": "What's a good general framework for approaching an open-ended system design interview question?", "answer": "A commonly recommended structure: 1) **Clarify requirements** — ask about functional requirements (what must the system actually do) and non-functional requirements (expected scale, latency expectations, consistency needs, read/write ratio) before designing anything, since the right design depends heavily on these and assuming wrong can derail the whole rest of the interview. 2) **Estimate scale** — rough back-of-envelope numbers (QPS, storage, bandwidth) to ground later decisions in reality rather than guesswork. 3) **Define the API/interface** — what does the system expose to its clients, at a high level. 4) **High-level design** — sketch the major components (load balancer, services, databases, caches, queues) and how data flows through them, before diving into any one component's details. 5) **Deep dive** — the interviewer will usually steer you toward specific components to go deeper on (e.g. 'how exactly does your database handle this') — this is where detailed knowledge (sharding strategy, specific caching approach, consistency trade-offs) actually gets demonstrated. 6) **Identify bottlenecks and trade-offs** — proactively call out weaknesses in your own design and how you'd address them, rather than waiting to be asked, since this signals genuine seniority and self-awareness about your own design's limitations."}, {"section": "System Design", "question": "What trade-offs should you explicitly call out when presenting a system design, even if the interviewer doesn't ask?", "answer": "Proactively naming trade-offs signals you actually understand the design rather than having memorized a 'correct' answer for a specific well-known problem. Worth calling out explicitly: **consistency vs. availability** choices (why you chose eventual consistency here, and what user-facing impact that has — e.g. 'a like might take a second to show up elsewhere'); **read vs. write optimization** choices (denormalization that speeds up reads at the cost of write complexity, or vice versa); **cost vs. performance** (using a more expensive, faster storage tier for hot data vs. cheaper cold storage); and **simplicity vs. scalability** (whether the added complexity of, say, sharding or a message queue is actually justified at the stated scale, or whether you'd start simpler and evolve into it later — explicitly stating 'I'd start without this and add it once we hit X scale' is often a stronger answer than over-engineering for hypothetical future scale that may never materialize). Naming these trade-offs explicitly — rather than presenting your design as the single obviously-correct answer — is usually exactly what distinguishes a senior-level response from a junior one in these interviews."}];

  var statusEl = document.getElementById("status");
  var warningsEl = document.getElementById("warnings");
  var contentEl=document.getElementById("content");
  var sectionMenuEl=document.getElementById("sectionMenu");

  function renderInlineMD(text) {
    var html = marked.parseInline(String(text || ""));
    return DOMPurify.sanitize(html);
  }
  function renderBlockMD(text) {
    var html = marked.parse(String(text || ""));
    return DOMPurify.sanitize(html);
  }

  function setStatus(text) {
    statusEl.textContent = text;
  }

  function showWarnings(warnings) {
    if (!warnings || warnings.length === 0) {
      warningsEl.innerHTML = "";
      return;
    }
    var box = document.createElement("details");
    box.className = "warn-box";
    var summary = document.createElement("summary");
    summary.textContent = warnings.length + " item(s) skipped while loading — click for details";
    box.appendChild(summary);
    var ul = document.createElement("ul");
    warnings.forEach(function (w) {
      var li = document.createElement("li");
      li.textContent = w;
      ul.appendChild(li);
    });
    box.appendChild(ul);
    warningsEl.innerHTML = "";
    warningsEl.appendChild(box);
  }

  // Validate + normalize a parsed JSON value (expected: array of {section, question, answer}).
  // Returns { entries: [...], warnings: [...] } for a single source (file).
  function validateEntries(parsed, sourceName) {
    var entries = [];
    var warnings = [];
    if (!Array.isArray(parsed)) {
      warnings.push(sourceName + ": not an array of question objects — file skipped");
      return { entries: entries, warnings: warnings };
    }
    parsed.forEach(function (item, idx) {
      if (!item || typeof item !== "object") {
        warnings.push(sourceName + " #" + (idx + 1) + ": not an object — entry skipped");
        return;
      }
      var section = typeof item.section === "string" ? item.section.trim() : "";
      var question = typeof item.question === "string" ? item.question.trim() : "";
      var answer = typeof item.answer === "string" ? item.answer : "";
      if (!section || !question) {
        warnings.push(sourceName + " #" + (idx + 1) + ": missing 'section' or 'question' — entry skipped");
        return;
      }
      entries.push({ section: section, question: question, answer: answer });
    });
    return { entries: entries, warnings: warnings };
  }

  function groupBySection(entries) {
