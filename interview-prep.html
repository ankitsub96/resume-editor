ser(name=\"A\")\n    db.add(user)\n\n    profile = Profile(user=user)\n    db.add(profile)\n\n    db.commit()\nexcept Exception:\n    db.rollback()\n    raise\nfinally:\n    db.close()\n```\n\nIf any step fails before `commit()`, everything is rolled back, ensuring atomicity."}, {"section": "FastAPI", "question": "How do you test FastAPI endpoints with `TestClient`?", "answer": "`TestClient` allows you to test FastAPI endpoints without starting a real HTTP server. It runs the application in-process and simulates requests against your ASGI app.\n\nBasic example:\n\n```python\nfrom fastapi import FastAPI\nfrom fastapi.testclient import TestClient\n\napp = FastAPI()\n\n@app.get('/items/{item_id}')\ndef get_item(item_id: int):\n    return {'id': item_id}\n\nclient = TestClient(app)\n\n\ndef test_get_item():\n    response = client.get('/items/1')\n\n    assert response.status_code == 200\n    assert response.json() == {'id': 1}\n```\n\nYou can test all HTTP methods:\n\n```python\nclient.get('/users')\nclient.post('/users', json={'name': 'John'})\nclient.put('/users/1')\nclient.delete('/users/1')\n```\n\nTesting request headers:\n\n```python\nresponse = client.get(\n    '/protected',\n    headers={'Authorization': 'Bearer token'}\n)\n```\n\nTesting query parameters:\n\n```python\nresponse = client.get('/items?skip=0&limit=10')\n```\n\nBenefits:\n\n- No running server required.\n- Very fast because everything executes in the same process.\n- Ideal for unit and integration testing.\n- Exercises the complete request/response lifecycle, including dependencies, middleware, and exception handlers."}, {"section": "FastAPI", "question": "How do you override a dependency in tests, e.g. to swap a real database for an in-memory test one?", "answer": "Use `app.dependency_overrides` to replace dependencies during tests.\n\nExample:\n\n```python\ndef override_get_db():\n    yield test_session\n\napp.dependency_overrides[get_db] = override_get_db\n```\n\nAfter tests:\n```python\napp.dependency_overrides.clear()\n```\n\nThis lets you inject mock or in-memory dependencies without modifying application code."}, {"section": "FastAPI", "question": "Do you need `pytest-asyncio` to test async FastAPI endpoints?", "answer": "Not when using `TestClient`.\n\nEven if your route is defined as `async def`, `TestClient` automatically handles the event loop internally.\n\nExample:\n\n```python\n@app.get('/hello')\nasync def hello():\n    return {'message': 'Hello'}\n\n\ndef test_hello():\n    response = client.get('/hello')\n\n    assert response.status_code == 200\n```\n\nThe test itself remains synchronous:\n\n```python\ndef test_hello():\n    ...\n```\n\nYou need `pytest-asyncio` (or AnyIO's pytest plugin) only when writing asynchronous tests directly.\n\nExample:\n\n```python\nimport pytest\n\n@pytest.mark.asyncio\nasync def test_service():\n    result = await some_async_function()\n    assert result == 'success'\n```\n\nTypical scenarios requiring `pytest-asyncio`:\n\n- Testing async service-layer functions.\n- Testing async utility functions.\n- Testing async database code directly.\n- Testing async dependencies outside `TestClient`.\n\nRule of thumb:\n\n- **Testing routes via `TestClient` → No `pytest-asyncio` needed.**\n- **Writing `async def` tests → `pytest-asyncio` required.**"}, {"section": "FastAPI", "question": "Do you need pytest-asyncio to test async FastAPI endpoints?", "answer": "Not when using `TestClient`, because it runs async routes internally in a synchronous test context.\n\n```python\ndef test_route():\n    response = client.get(\"/async-route\")\n```\n\nHowever, you **do need `pytest-asyncio`** if you write async test functions directly:\n\n```python\nimport pytest\n\n@pytest.mark.asyncio\nasync def test_async_service():\n    result = await some_async_function()\n```"}, {"section": "FastAPI", "question": "How would you test a protected endpoint that requires authentication?", "answer": "Two approaches:\n\n### 1. Dependency override (recommended for unit tests)\nBypass auth completely:\n\n```python\napp.dependency_overrides[get_current_user] = lambda: fake_user\n```\n\n### 2. Real auth flow (integration test)\nGet token and pass it:\n\n```python\nheaders = {\"Authorization\": \"Bearer <token>\"}\nresponse = client.get(\"/protected\", headers=headers)\n```\n\nUse overrides for isolated tests, and real auth flow for end-to-end validation."}, {"section": "FastAPI", "question": "How do you test a WebSocket endpoint?", "answer": "`TestClient` supports WebSockets via a context manager.\n\n```python\nfrom fastapi.testclient import TestClient\n\nclient = TestClient(app)\n\ndef test_websocket():\n    with client.websocket_connect(\"/ws\") as websocket:\n        websocket.send_text(\"hi\")\n        data = websocket.receive_text()\n        assert data == \"echo: hi\"\n```\n\nThis runs entirely in-process using ASGI, so no real network sockets or server startup are needed."}, {"section": "FastAPI", "question": "What's the benefit of using a separate test database with per-test transaction rollback, instead of letting tests write to your dev database?", "answer": "It ensures **test isolation and reproducibility**.\n\nEach test runs against a clean, predictable database state and any changes are rolled back after execution.\n\nTypical pattern:\n\n```python\nconnection = engine.connect()\ntransaction = connection.begin()\n\nsession = Session(bind=connection)\n\ntry:\n    yield session\nfinally:\n    session.close()\n    transaction.rollback()\n    connection.close()\n```\n\nBenefits:\n- No test pollution (no leftover rows)\n- Order-independent tests\n- Eliminates flaky behavior due to shared dev data\n\nWithout this, tests can pass/fail depending on execution order or prior state, making CI unreliable."}, {"section": "FastAPI", "question": "How do you manage configuration and environment variables in a FastAPI app?", "answer": "The idiomatic approach is `pydantic-settings` using `BaseSettings`.\n\n```python\nfrom pydantic_settings import BaseSettings\n\nclass Settings(BaseSettings):\n    database_url: str\n    debug: bool = False\n\n    class Config:\n        env_file = \".env\"\n\nsettings = Settings()\n```\n\nIt automatically:\n- Loads environment variables\n- Validates types at startup\n- Supports `.env` files\n\nThis ensures misconfiguration fails fast during app startup rather than at runtime."}, {"section": "FastAPI", "question": "Why is hardcoding secrets/config directly in source code considered bad practice, and what's the idiomatic FastAPI alternative?", "answer": "Hardcoding secrets is dangerous because:\n\n- They get committed to git history (cannot be fully removed)\n- They cannot differ across environments (dev/staging/prod)\n- Rotation requires code changes and redeployment\n\nIdiomatic FastAPI approach:\n\n```python\n# use environment variables instead\nDATABASE_URL=postgresql://...\nSECRET_KEY=...\n```\n\nAnd load via `BaseSettings`:\n\n```python\nsettings = Settings()\n```\n\nThis decouples configuration from code and allows secure secret management systems (AWS Secrets Manager, Vault, etc.)."}, {"section": "FastAPI", "question": "How do you load different settings for dev, staging, and production environments?", "answer": "Common strategies:\n\n### 1. ENV-based config selection\n```python\nENV = os.getenv(\"ENV\", \"dev\")\n```\n\n### 2. Separate settings classes\n```python\nclass Base(Settings):\n    debug: bool = False\n\nclass DevSettings(Base):\n    debug = True\n\nclass ProdSettings(Base):\n    debug = False\n```\n\n### 3. `.env` per environment\n```\n.env.dev\n.env.staging\n.env.prod\n```\n\nThen load dynamically based on deployment environment.\n\nKey principle: **code stays the same, environment decides behavior**."}, {"section": "FastAPI", "question": "How can dependency injection be used to inject settings into routes cleanly, instead of importing a global settings object everywhere?", "answer": "Use a dependency wrapper for settings.\n\n```python\nfrom functools import lru_cache\n\n@lru_cache\ndef get_settings():\n    return Settings()\n\n@app.get(\"/items\")\ndef read_items(settings: Settings = Depends(get_settings)):\n    return {\"db\": settings.database_url}\n```\n\nBenefits:\n- Avoids global state\n- Fully testable via overrides\n- Lazy-loaded and cached\n\nTesting override:\n```python\napp.dependency_overrides[get_settings] = lambda: test_settings\n```"}, {"section": "FastAPI", "question": "How do you accept a file upload in FastAPI?", "answer": "Use `UploadFile` with `File(...)`:\n\n```python\nfrom fastapi import UploadFile, File\n\n@app.post(\"/upload\")\nasync def upload(file: UploadFile = File(...)):\n    content = await file.read()\n    return {\n        \"filename\": file.filename,\n        \"size\": len(content)\n    }\n```\n\nRequires `multipart/form-data` request encoding."}, {"section": "FastAPI", "question": "What's the difference between `UploadFile` and just reading raw bytes from `Body`?", "answer": "`UploadFile` is designed specifically for file uploads and is much more memory-efficient than reading raw bytes.\n\n## Using `UploadFile`\n\n```python\nfrom fastapi import UploadFile, File\n\n@app.post('/upload')\nasync def upload(\n    file: UploadFile = File(...)\n):\n    contents = await file.read()\n\n    return {\n        'filename': file.filename,\n        'content_type': file.content_type\n    }\n```\n\nFeatures:\n\n- Uses `multipart/form-data`.\n- Streams large files efficiently.\n- Automatically stores large files on disk.\n- Exposes metadata like:\n  - `filename`\n  - `content_type`\n- Suitable for large uploads.\n\nExample methods:\n\n```python\nawait file.read()\nawait file.write(data)\nawait file.seek(0)\nawait file.close()\n```\n\n---\n\n## Using raw bytes\n\n```python\nfrom fastapi import Body\n\n@app.post('/upload')\nasync def upload(data: bytes = Body(...)):\n    return {'size': len(data)}\n```\n\nThis reads the entire request body into memory immediately.\n\nProblems:\n\n- High memory usage.\n- Unsuitable for large files.\n- No filename or content-type metadata.\n\nComparison:\n\n| Feature | `UploadFile` | Raw `bytes` |\n|----------|-------------|--------------|\n| Memory efficient | Yes | No |\n| Large files | Yes | No |\n| Filename available | Yes | No |\n| Content type available | Yes | No |\n| Uses multipart | Yes | No |\n\nFor real-world file uploads, `UploadFile` is almost always the correct choice."}, {"section": "FastAPI", "question": "How do you stream a large file response without loading the whole thing into memory?", "answer": "Use `StreamingResponse` with a generator:\n\n```python\nfrom fastapi.responses import StreamingResponse\n\ndef file_iterator():\n    with open(\"big.zip\", \"rb\") as f:\n        while chunk := f.read(1024 * 1024):\n            yield chunk\n\n@app.get(\"/download\")\ndef download():\n    return StreamingResponse(file_iterator(), media_type=\"application/octet-stream\")\n```\n\nThis streams chunks to the client without loading the full file into memory."}, {"section": "FastAPI", "question": "How do you handle multiple file uploads in a single request?", "answer": "Use a list of `UploadFile`:\n\n```python\nfrom fastapi import UploadFile, File\n\n@app.post(\"/upload-multiple\")\nasync def upload(files: list[UploadFile] = File(...)):\n    return [\n        {\"filename\": f.filename}\n        for f in files\n    ]\n```\n\nEach file is parsed from multipart form-data automatically."}, {"section": "FastAPI", "question": "What is CORS, and how do you configure it in FastAPI?", "answer": "CORS (Cross-Origin Resource Sharing) is a browser security mechanism that restricts frontend apps from calling APIs on different origins unless explicitly allowed.\n\nFastAPI config:\n\n```python\nfrom fastapi.middleware.cors import CORSMiddleware\n\napp.add_middleware(\n    CORSMiddleware,\n    allow_origins=[\"https://frontend.com\"],\n    allow_methods=[\"*\"],\n    allow_headers=[\"*\"],\n    allow_credentials=True,\n)\n```\n\nImportant rule:\n- `allow_origins=[\"*\"]` + credentials is invalid and unsafe\n\nCORS only applies to browsers, not backend-to-backend calls."}, {"section": "FastAPI", "question": "How do you serve static files (e.g., a built frontend) from FastAPI?", "answer": "Use `StaticFiles` from Starlette:\n\n```python\nfrom fastapi.staticfiles import StaticFiles\n\napp.mount(\"/static\", StaticFiles(directory=\"static\"), name=\"static\")\n```\n\nFor SPAs (React/Vue), you typically also serve `index.html` for unknown routes:\n\n```python\nfrom fastapi.responses import FileResponse\n\n@app.get(\"/{full_path:path}\")\ndef spa(full_path: str):\n    return FileResponse(\"dist/index.html\")\n```\n\nThis enables client-side routing support."}, {"section": "FastAPI", "question": "How does FastAPI automatically generate OpenAPI docs, and where does the information actually come from?", "answer": "FastAPI builds OpenAPI schemas by inspecting:\n\n- Path decorators (`@app.get`, etc.)\n- Function signatures\n- Type hints\n- Pydantic models\n\nExample:\n\n```python\n@app.get(\"/items/{id}\")\ndef read_item(id: int):\n    return {\"id\": id}\n```\n\nFrom this, FastAPI generates:\n- OpenAPI JSON spec\n- Swagger UI (`/docs`)\n- ReDoc (`/redoc`)\n\nNo manual documentation is needed — it is derived directly from type annotations."}, {"section": "FastAPI", "question": "How do you customize the docs — titles, descriptions, or hiding certain endpoints?", "answer": "App-level config:\n\n```python\napp = FastAPI(\n    title=\"My API\",\n    description=\"Service description\",\n    version=\"1.0.0\"\n)\n```\n\nRoute-level customization:\n\n```python\n@app.get(\n    \"/items\",\n    summary=\"List items\",\n    description=\"Returns paginated items\",\n    include_in_schema=True\n)\n```\n\nHide endpoint:\n```python\ninclude_in_schema=False\n```\n\nDocstrings are also used automatically if no explicit description is provided."}, {"section": "FastAPI", "question": "How do you document possible error responses for an endpoint in the generated docs?", "answer": "Use the `responses` parameter:\n\n```python\n@app.get(\n    \"/items/{id}\",\n    responses={\n        404: {\"description\": \"Item not found\"},\n        500: {\"description\": \"Server error\"}\n    }\n)\ndef get_item(id: int):\n    ...\n```\n\nThis ensures Swagger UI shows all possible HTTP responses, not just the default 200 response."}, {"section": "FastAPI", "question": "What's the role of Uvicorn versus Gunicorn when deploying a FastAPI app?", "answer": "**Uvicorn** is the ASGI server that runs FastAPI:\n\n- Handles event loop\n- Processes requests\n- Executes async code\n\n**Gunicorn** is a process manager:\n\n- Manages multiple worker processes\n- Restarts crashed workers\n\nTypical setup:\n\n```bash\ngunicorn -k uvicorn.workers.UvicornWorker app:app -w 4\n```\n\nOr just Uvicorn:\n\n```bash\nuvicorn app:app --workers 4\n```\n\nGunicorn is optional in modern deployments, especially with containers/Kubernetes."}, {"section": "FastAPI", "question": "How many worker processes should you run, and why does that number matter?", "answer": "A common starting heuristic is `(2 × CPU cores) + 1`, because each worker process can effectively utilize a core, while the extra worker helps cover I/O wait and scheduling gaps.\n\nHowever, the real trade-offs are more important than the formula:\n\n- **Too few workers** → underutilized CPU, lower throughput, reduced concurrency\n- **Too many workers** → excessive context switching, higher memory usage, and duplicated resources (each worker has its own:\n  - memory space\n  - DB connection pool\n  - caches)\n\nExample:\n```bash\nuvicorn app:app --workers 4\n```\n\nImportant constraint:\nIf you run multiple workers, total DB connections scale roughly as:\n```\nworkers × pool_size\n```\nSo you must ensure you don't exceed database connection limits.\n\nUltimately, optimal worker count is workload-dependent and should be validated with load testing, not just heuristics."}, {"section": "FastAPI", "question": "What's the performance impact of running genuinely CPU-bound work (e.g. image processing, heavy computation) inside an async FastAPI route?", "answer": "CPU-bound work inside an `async def` endpoint does **not benefit from async at all**, because there is no I/O wait where the event loop can yield control.\n\nImpact:\n- Blocks the event loop for that worker\n- Prevents other requests from being processed concurrently on the same worker\n- Reduces throughput significantly under load\n\nBad example:\n```python\n@app.get(\"/process\")\nasync def process():\n    heavy_computation()  # blocks event loop\n```\n\nCorrect approach:\n- Offload to a process pool or external worker system\n\nExample using ProcessPoolExecutor:\n```python\nfrom concurrent.futures import ProcessPoolExecutor\nimport asyncio\n\nexecutor = ProcessPoolExecutor()\n\n@app.get(\"/process\")\nasync def process():\n    loop = asyncio.get_running_loop()\n    result = await loop.run_in_executor(executor, heavy_computation)\n    return result\n```\n\nOr use task queues (Celery, RQ) for long-running CPU-heavy workloads.\n\nKey idea: async improves **I/O concurrency**, not CPU parallelism."}, {"section": "FastAPI", "question": "How do you horizontally scale a FastAPI app, and what does that require of the app's design?", "answer": "Horizontal scaling means running multiple instances of the FastAPI app behind a load balancer.\n\nExample architecture:\n- Multiple Uvicorn/Gunicorn worker processes\n- Multiple containers or pods\n- Load balancer (NGINX, AWS ALB, etc.) distributing traffic\n\nCritical requirement: **stateless application design**\n\nThis means:\n- No in-memory session state\n- No per-process caches that affect correctness\n- No WebSocket or session state stored only in one instance\n\nInstead, shared state must be externalized:\n- Redis (cache, sessions, rate limiting)\n- Database (persistent state)\n- Distributed stores\n\nBad design:\n- Storing user session in a Python dict\n\nGood design:\n- Storing session in Redis keyed by session ID\n\nThis ensures any request can hit any instance safely."}, {"section": "FastAPI", "question": "What's the role of a reverse proxy like Nginx in front of a FastAPI/Uvicorn deployment?", "answer": "A reverse proxy (like NGINX) sits in front of FastAPI and handles infrastructure concerns that the app server shouldn't manage.\n\nKey responsibilities:\n\n- TLS/SSL termination (HTTPS handling)\n- Load balancing across multiple app instances\n- Serving static files efficiently\n- Request buffering and timeout control\n- Rate limiting (basic level)\n- Single stable entry point for clients\n\nExample flow:\n```\nClient → NGINX → Uvicorn workers → FastAPI app\n```\n\nThis separation improves scalability, security, and operational flexibility."}, {"section": "FastAPI", "question": "How do you handle graceful shutdown so in-flight requests aren't dropped when redeploying?", "answer": "Graceful shutdown ensures existing requests finish before the server exits.\n\nUvicorn/Gunicorn behavior:\n- Stops accepting new connections on SIGTERM\n- Allows in-flight requests to complete within a timeout\n\nExample deployment behavior:\n- Load balancer drains traffic\n- Server receives termination signal\n- Existing requests finish processing\n- Process exits cleanly\n\nKubernetes-style rollout requirement:\n- PreStop hook or termination grace period must be configured\n- Pod must stay alive long enough to finish active requests\n\nKey idea: shutdown should be **coordinated between orchestrator, proxy, and app server**."}, {"section": "FastAPI", "question": "What are the main strategies for API versioning, and what are the trade-offs?", "answer": "### 1. URL Path Versioning (most common)\n```\n/v1/users\n/v2/users\n```\nPros:\n- Very explicit\n- Easy caching and routing\n- Simple client usage\n\nCons:\n- Duplicates route structure across versions\n\n---\n\n### 2. Header-based versioning\n```\nAccept: application/vnd.api+json;version=2\n```\nPros:\n- Clean URLs\n- Flexible\n\nCons:\n- Harder to debug and test manually\n- Less visible to developers\n\n---\n\n### 3. Query parameter versioning\n```\n/users?version=2\n```\nPros:\n- Easy to implement\n\nCons:\n- Easy to forget\n- Pollutes query semantics\n\n**In practice, path versioning is most widely adopted due to clarity and tooling support.**"}, {"section": "FastAPI", "question": "How do you change a response model without breaking existing clients?", "answer": "The core principle is **backward compatibility**.\n\n### Safe changes:\n- Add new optional fields\n- Extend responses without removing existing fields\n\n### Breaking changes:\n- Renaming fields\n- Changing field types\n- Removing fields\n\n### Safe evolution pattern:\n1. Add new field alongside old field\n2. Support both for a transition period\n3. Deprecate old field (document clearly)\n4. Remove only after client migration window\n\nExample:\n```json\n{\n  \"name\": \"old_value\",\n  \"full_name\": \"new_value\"\n}\n```\n\nIf breaking changes are unavoidable, introduce a new API version (`/v2`)."}, {"section": "FastAPI", "question": "What's the value of using the same Pydantic models for both request validation and OpenAPI documentation simultaneously?", "answer": "Using Pydantic models as a single source of truth ensures:\n\n- Validation logic and API documentation stay synchronized\n- No risk of documentation drift\n- OpenAPI schema is auto-generated directly from code\n\nExample:\n\n```python\nfrom pydantic import BaseModel\n\nclass Item(BaseModel):\n    name: str\n    price: float\n```\n\nThis single model is used for:\n- Request validation\n- Response serialization\n- OpenAPI schema generation\n\nBenefit: the API contract is always consistent with implementation, reducing integration bugs and outdated documentation issues."}, {"section": "FastAPI", "question": "How would you add response caching to a FastAPI endpoint?", "answer": "Response caching in FastAPI is typically implemented at multiple layers depending on scale.\n\n### 1. Simple in-process caching (single worker)\nUse `functools.lru_cache` for expensive pure functions (not async routes directly):\n\n```python\nfrom functools import lru_cache\n\n@lru_cache(maxsize=128)\ndef compute_expensive_value(x: int):\n    return x * 2\n```\n\nUsed inside route:\n```python\n@app.get(\"/items/{x}\")\ndef get_item(x: int):\n    return {\"result\": compute_expensive_value(x)}\n```\n\nLimitation: only works per-process.\n\n---\n\n### 2. Distributed caching (production-grade)\nUse Redis for shared caching across workers/instances:\n\n```python\nimport json\nimport redis\n\nr = redis.Redis()\n\n@app.get(\"/items/{x}\")\ndef get_item(x: int):\n    key = f\"item:{x}\"\n\n    cached = r.get(key)\n    if cached:\n        return json.loads(cached)\n\n    result = {\"result\": x * 2}\n    r.setex(key, 60, json.dumps(result))  # TTL = 60s\n    return result\n```\n\n---\n\n### 3. Decorator-based abstraction\nLibraries like `fastapi-cache2` provide:\n\n```python\n@cache(expire=60)\n@app.get(\"/items/{x}\")\ndef get_item(x: int):\n    return expensive_call(x)\n```\n\n---\n\nKey idea: in-memory caching is fast but local; Redis-based caching is scalable and consistent across deployments."}, {"section": "FastAPI", "question": "How do you implement rate limiting in FastAPI?", "answer": "Rate limiting is typically implemented at either the application layer or infrastructure layer.\n\n---\n\n### 1. Application-level (SlowAPI)\n\n```python\nfrom slowapi import Limiter\nfrom slowapi.util import get_remote_address\n\nlimiter = Limiter(key_func=get_remote_address)\n\n@app.get(\"/items\")\n@limiter.limit(\"5/minute\")\ndef read_items():\n    return {\"ok\": True}\n```\n\nFor distributed systems, Redis is used as backend storage.\n\n---\n\n### 2. Infrastructure-level (preferred in production)\nHandled by:\n- NGINX\n- API Gateways (Kong, AWS API Gateway, Cloudflare)\n\nExample concept:\n```\nClient → NGINX (rate limit) → FastAPI\n```\n\n---\n\nKey trade-off:\n- App-level: flexible but adds overhead\n- Gateway-level: efficient and protects app before requests reach it"}, {"section": "FastAPI", "question": "What HTTP status codes and headers are relevant for communicating caching and rate-limit state to clients?", "answer": "### Caching-related headers\n\n- `Cache-Control: max-age=60` → client/proxy caching duration\n- `ETag` → resource version identifier\n- `If-None-Match` → conditional request validation\n- `304 Not Modified` → no need to resend body\n\nExample flow:\n```\nClient sends If-None-Match → server compares ETag → returns 304 if unchanged\n```\n\n---\n\n### Rate limiting headers\n\n- `429 Too Many Requests` → rate limit exceeded\n- `Retry-After: 60` → wait time before retrying\n\nOptional metadata:\n- `X-RateLimit-Limit`\n- `X-RateLimit-Remaining`\n- `X-RateLimit-Reset`\n\n---\n\nKey idea: headers allow clients to self-regulate before hitting hard limits."}, {"section": "FastAPI", "question": "What's the `lifespan` context manager for, and how did it replace the older `@app.on_event` decorators?", "answer": "`lifespan` defines logic that runs exactly once when the application starts and once when it shuts down.\n\nIt replaced the older:\n\n```python\n@app.on_event('startup')\n@app.on_event('shutdown')\n```\n\npattern.\n\nModern approach:\n\n```python\nfrom contextlib import asynccontextmanager\nfrom fastapi import FastAPI\n\n\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    print('Starting application')\n\n    app.state.db = await create_db_pool()\n\n    yield\n\n    print('Shutting down application')\n\n    await app.state.db.close()\n\n\napp = FastAPI(lifespan=lifespan)\n```\n\nExecution flow:\n\n```text\nApplication starts\n↓\nCode before yield executes\n↓\nApplication serves requests\n↓\nApplication shuts down\n↓\nCode after yield executes\n```\n\nPreviously:\n\n```python\n@app.on_event('startup')\nasync def startup():\n    ...\n\n@app.on_event('shutdown')\nasync def shutdown():\n    ...\n```\n\nThe old event system still works but is considered legacy.\n\nAdvantages of `lifespan`:\n\n- Keeps startup and shutdown logic together.\n- Easier resource sharing.\n- Cleaner code organization.\n- Better aligns with ASGI standards.\n\nTypical startup tasks:\n\n- Creating DB pools.\n- Loading ML models.\n- Initializing Redis clients.\n- Warming caches.\n\nTypical shutdown tasks:\n\n- Closing connections.\n- Flushing logs.\n- Releasing resources."}, {"section": "FastAPI", "question": "What kind of work belongs in startup logic versus shutdown logic?", "answer": "### Startup responsibilities\n- Initialize DB connection pools\n- Load ML models into memory\n- Warm caches\n- Connect to external services\n\n### Shutdown responsibilities\n- Close DB pools cleanly\n- Flush logs/metrics buffers\n- Release file handles\n- Gracefully disconnect external clients\n\n---\n\n### Core principle\nStartup = prepare reusable resources\nShutdown = clean up resources safely\n\nThis prevents:\n- connection leaks\n- data loss\n- abrupt termination issues"}, {"section": "FastAPI", "question": "How would you initialize a database connection pool once at startup and share it across all requests?", "answer": "Use `lifespan` and attach the pool to `app.state`.\n\n### Setup:\n```python\n@asynccontextmanager\nasync def lifespan(app: FastAPI):\n    app.state.db_pool = await create_pool()\n    yield\n    await app.state.db_pool.close()\n\napp = FastAPI(lifespan=lifespan)\n```\n\n---\n\n### Access in routes:\n```python\nfrom fastapi import Request\n\n@app.get(\"/items\")\ndef get_items(request: Request):\n    pool = request.app.state.db_pool\n    return {\"ok\": True}\n```\n\n---\n\n### Better practice (recommended)\nWrap access in a dependency:\n```python\ndef get_pool(request: Request):\n    return request.app.state.db_pool\n```\n\nThen use:\n```python\npool = Depends(get_pool)\n```\n\nThis avoids direct coupling to `app.state` everywhere."}, {"section": "FastAPI", "question": "How do you implement pagination query parameters cleanly using a reusable dependency instead of repeating `skip`/`limit` params on every endpoint?", "answer": "Instead of duplicating `skip` and `limit` parameters across many routes, create a reusable dependency.\n\nExample:\n\n```python\nfrom fastapi import Depends, Query\n\n\nclass Pagination:\n    def __init__(\n        self,\n        skip: int = Query(0, ge=0),\n        limit: int = Query(20, ge=1, le=100)\n    ):\n        self.skip = skip\n        self.limit = limit\n```\n\nUse it in routes:\n\n```python\n@app.get('/users')\ndef get_users(\n    pagination: Pagination = Depends()\n):\n    return {\n        'skip': pagination.skip,\n        'limit': pagination.limit\n    }\n```\n\nIncoming request:\n\n```http\nGET /users?skip=10&limit=25\n```\n\nProduces:\n\n```json\n{\n  \"skip\": 10,\n  \"limit\": 25\n}\n```\n\nAdvantages:\n\n- Eliminates duplication.\n- Centralizes validation rules.\n- Ensures consistency across endpoints.\n- Makes changing defaults trivial.\n\nAlternative using Pydantic:\n\n```python\nfrom pydantic import BaseModel\n\nclass PaginationParams(BaseModel):\n    skip: int = 0\n    limit: int = 20\n```\n\nReusable dependencies are particularly useful in medium and large APIs."}, {"section": "FastAPI", "question": "What's the difference between the `Annotated[Type, Depends(...)]` style and the older default-value `= Depends(...)` style?", "answer": "Both styles are functionally equivalent and instruct FastAPI to resolve dependencies.\n\nOlder style:\n\n```python\n@app.get('/users/me')\ndef get_me(\n    user: User = Depends(get_current_user)\n):\n    return user\n```\n\nModern recommended style:\n\n```python\nfrom typing import Annotated\n\n@app.get('/users/me')\ndef get_me(\n    user: Annotated[\n        User,\n        Depends(get_current_user)\n    ]\n):\n    return user\n```\n\n`Annotated` separates:\n\n- The actual type (`User`)\n- The dependency metadata (`Depends(...)`)\n\nThis becomes especially useful when additional metadata is needed.\n\nExample:\n\n```python\nfrom typing import Annotated\nfrom fastapi import Query\n\nLimit = Annotated[\n    int,\n    Query(ge=1, le=100)\n]\n\n@app.get('/items')\ndef get_items(limit: Limit = 20):\n    return {'limit': limit}\n```\n\nBenefits of `Annotated`:\n\n- Clear separation of type and metadata.\n- Better static type checking.\n- Preferred by FastAPI documentation.\n- More flexible when combining multiple annotations.\n- Consistent with modern Python typing practices.\n\nFor new projects, the `Annotated` style is generally recommended."}, {"section": "FastAPI", "question": "How would you structure a medium-sized FastAPI project's folder layout for maintainability?", "answer": "A scalable FastAPI project is usually organized by **feature/domain**, not by technical layer.\n\n---\n\n### Example structure:\n```\napp/\n  main.py\n  core/\n    config.py\n    database.py\n    security.py\n\n  users/\n    router.py\n    service.py\n    models.py\n    schemas.py\n\n  orders/\n    router.py\n    service.py\n    models.py\n    schemas.py\n```\n\n---\n\n### Why this works\n- Keeps all feature-related code together\n- Reduces cross-file jumping\n- Easier ownership per module\n- Scales better than layered architecture (all models/routes/services separated globally)\n\n---\n\n### main.py stays thin:\n```python\napp.include_router(users.router)\napp.include_router(orders.router)\n```\n\n---\n\nKey idea: structure by **business capability**, not file type."}, {"section": "Python Basics", "question": "What's the difference between `is` and `==`?", "answer": "`==` calls `__eq__` and checks **value equality**. `is` checks **identity** — whether two names point to the same object in memory (compares `id()`). Use `is` for `None`/singleton checks (`x is None`), `==` for everything else, since two equal values aren't always the same object."}, {"section": "Python Basics", "question": "Why does `a = 256; b = 256; a is b` return `True`, but the same with `300` often returns `False`?", "answer": "CPython caches small integers in the range **-5 to 256** (a startup optimization), so names bound to those values point to the same pre-allocated object. `300` falls outside that range, so each literal typically creates a new object — `is` comparison becomes unreliable. This is an implementation detail, not a language guarantee, so never rely on integer identity in real code."}, {"section": "Python Basics", "question": "What are Python's main built-in numeric types, and how does integer division differ between `/` and `//`?", "answer": "`int`, `float`, and `complex` are the built-ins. `/` is **true division** and always returns a `float` (`7 / 2 == 3.5`). `//` is **floor division** — it rounds toward negative infinity, not just truncates, so `-7 // 2 == -4`, not `-3`."}, {"section": "Python Basics", "question": "Are strings mutable in Python? What's the practical consequence?", "answer": "No — `str` is immutable. Every 'modification' (`.upper()`, concatenation, slicing) creates a new string object. For building strings in a loop, repeated `+=` is O(n²) due to repeated copying; prefer collecting parts in a list and joining once with `''.join(parts)`, which is O(n)."}, {"section": "Python Basics", "question": "What's the difference between `None`, `False`, and an empty collection in a boolean context?", "answer": "All three are falsy in an `if` check, but they mean different things: `None` is the absence of a value, `False` is a boolean, and `[]`/`{}`/`''` are empty containers that still exist. Conflating them is a common bug source — e.g. a function returning `0` or `[]` as a valid result will be silently treated as 'no result' by a careless `if not result:` check. Prefer explicit checks like `if result is None:` when zero/empty is a legitimate value."}, {"section": "Python Basics", "question": "Why is `def f(items=[]):` considered a classic Python bug?", "answer": "Default argument values are evaluated **once**, at function definition time, not on every call. A mutable default like `[]` is shared across all calls that don't pass their own argument, so appending to it persists and leaks state between unrelated calls. Fix: use `def f(items=None): items = items if items is not None else []`."}, {"section": "Python Basics", "question": "What's the difference between a shallow copy and a deep copy?", "answer": "`copy.copy()` (shallow) creates a new outer container but the nested objects inside it are still shared references with the original. `copy.deepcopy()` recursively copies every nested object too, so the result is fully independent. Shallow copies are cheaper but can cause surprising shared-state bugs if you mutate a nested list/dict."}, {"section": "Python Basics", "question": "If lists are mutable, why does `a = [1,2,3]; b = a; b.append(4)` change `a` too?", "answer": "`b = a` doesn't copy the list — it just binds a second name to the **same object**. Both `a` and `b` reference identical memory, so mutating through either name is visible through the other. To get an independent copy you need `b = a.copy()` or `b = a[:]`."}, {"section": "Python Basics", "question": "How does Python pass arguments to functions — by value or by reference?", "answer": "Neither, exactly — Python uses **'pass by object reference'** (sometimes called 'pass by assignment'). The function parameter is bound to the same object the caller passed. If that object is mutable and you mutate it in place (e.g. `list.append()`), the caller sees the change. If you rebind the parameter name to a new object, the caller is unaffected, because rebinding only changes the local name."}, {"section": "Python Basics", "question": "What does it mean that tuples are immutable, but `t = ([1,2], 3); t[0].append(4)` still works?", "answer": "Tuple immutability only applies to the tuple's own slots — you can't reassign `t[0]` to a different object. But if a slot holds a mutable object like a list, that object's *contents* can still be mutated freely; the tuple itself never changes (it still points to the same list object), only the list does."}, {"section": "Python Basics", "question": "What's the LEGB rule?", "answer": "It's the order Python searches for a name: **Local** (current function) → **Enclosing** (any outer function in a closure) → **Global** (module level) → **Built-in** (e.g. `len`, `print`). Python stops at the first scope where the name is found, which is why a local variable can 'shadow' a global one of the same name."}, {"section": "Python Basics", "question": "What's the difference between `*args` and `**kwargs`?", "answer": "`*args` collects extra **positional** arguments into a tuple; `**kwargs` collects extra **keyword** arguments into a dict. Order in a signature matters: `def f(a, b, *args, c=1, **kwargs):` — positional-or-keyword params, then `*args`, then keyword-only params, then `**kwargs`."}, {"section": "Python Basics", "question": "Why does this closure print `2, 2, 2` instead of `0, 1, 2`?\n```python\nfns = [lambda: i for i in range(3)]\nprint([f() for f in fns])\n```", "answer": "Closures in Python capture **variables by reference, not by value** — each lambda looks up `i` when it's *called*, not when it's defined, and by then the loop has finished with `i == 2`. Fix it by capturing the current value as a default argument: `lambda i=i: i`, which evaluates `i` at definition time instead."}, {"section": "Python Basics", "question": "What's a closure, concretely?", "answer": "A closure is an inner function that remembers variables from its enclosing scope even after that outer function has returned. Python implements this via `__closure__` cell objects attached to the function — each free variable gets a cell that both the outer and inner function reference, so updates are visible to the inner function later."}, {"section": "Python Basics", "question": "What does the `nonlocal` keyword do, and how is it different from `global`?", "answer": "`nonlocal` lets an inner function **rebind** a variable from its nearest enclosing (non-global) function scope, rather than creating a new local variable. `global` does the same but reaches all the way to module scope. Without one of these, assigning to a name inside a function always creates a new local variable, even if a same-named variable exists in an outer scope."}, {"section": "Python Basics", "question": "Are Python function arguments positional-only, keyword-only, or both by default — and how do you restrict them?", "answer": "By default, parameters are **positional-or-keyword** — callable either way. You can force positional-only with `/` (`def f(a, b, /):`) and keyword-only with `*` (`def f(*, c):`). This is useful for API design: positional-only protects against callers depending on parameter names you might want to rename later."}, {"section": "Python Basics", "question": "What is a decorator, mechanically?", "answer": "A decorator is just a function that takes a function (or class) as input and returns a replacement — usually a wrapper that adds behavior around the original. `@my_decorator` above `def f(): ...` is exactly equivalent to `f = my_decorator(f)`."}, {"section": "Python Basics", "question": "Why should you use `functools.wraps` when writing a decorator?", "answer": "Without it, the wrapper function replaces the original's `__name__`, `__doc__`, and other metadata, which breaks introspection, debugging, and tools like Sphinx or `help()`. `functools.wraps(func)` copies that metadata onto the wrapper so the decorated function still looks like itself."}, {"section": "Python Basics", "question": "How do you write a decorator that accepts its own arguments, like `@retry(times=3)`?", "answer": "You need an extra layer of nesting: the outer function takes the decorator's arguments and returns the *actual* decorator, which takes the function and returns the wrapper.\n```python\ndef retry(times=3):\n    def decorator(func):\n        def wrapper(*args, **kwargs):\n            for _ in range(times):\n                try:\n                    return func(*args, **kwargs)\n                except Exception:\n                    pass\n            raise\n        return wrapper\n    return decorator\n```"}, {"section": "Python Basics", "question": "What's the difference between a function decorator and a class decorator?", "answer": "A function decorator wraps a function and is the common case. A **class decorator** instead wraps or modifies a class — it receives the class object and can return a modified version, add methods, or wrap it entirely (this is how `dataclasses.dataclass` and some ORMs' `@register` patterns work)."}, {"section": "Python Basics", "question": "Can a class itself be used as a decorator?", "answer": "Yes — any object with a `__call__` method can act as a decorator. Implementing the decorator as a class instead of a closure is useful when the decorator needs to maintain state (e.g. a call counter) without relying on `nonlocal`, since instance attributes naturally hold that state."}, {"section": "Python Basics", "question": "What order do stacked decorators apply in?", "answer": "Bottom-up at definition time, but the **outermost** decorator's wrapper runs first at call time. `@a` then `@b` above `def f` means `f = a(b(f))` — `b` wraps `f` first, then `a` wraps that result, so when you call the final function, `a`'s wrapper code runs before `b`'s."}, {"section": "Python Basics", "question": "What's the difference between an iterable and an iterator?", "answer": "An **iterable** is anything with `__iter__` that can produce an iterator (lists, dicts, strings...). An **iterator** is the object actually doing the work — it has both `__iter__` (returning itself) and `__next__`, and maintains state about where it is. `iter(some_list)` converts an iterable into an iterator; calling `next()` on it advances and eventually raises `StopIteration`."}, {"section": "Python Basics", "question": "Why use a generator instead of returning a list?", "answer": "Generators produce values **lazily**, one at a time, instead of building the entire sequence in memory up front. For large or infinite sequences (e.g. reading a huge file line by line, or streaming API results), this keeps memory usage flat (O(1)) instead of O(n)."}, {"section": "Python Basics", "question": "What does `yield` actually do to a function?", "answer": "Any function containing `yield` becomes a generator function — calling it doesn't run the body at all, it just returns a generator object. Each call to `next()` resumes execution from where it last paused, runs until the next `yield`, returns that value, and suspends again, preserving all local state in between."}, {"section": "Python Basics", "question": "What's the difference between `yield` and `yield from`?", "answer": "## Short Answer\n\n- `yield` returns a single value and pauses execution.\n- `yield from` delegates iteration to another iterable or generator.\n\n---\n\n## `yield`\n\nA generator using `yield` produces values one at a time.\n\n```python\ndef numbers():\n    yield 1\n    yield 2\n    yield 3\n```\n\nUsage:\n\n```python\nfor n in numbers():\n    print(n)\n```\n\nOutput:\n\n```text\n1\n2\n3\n```\n\n---\n\n## `yield from`\n\nSuppose you already have a generator:\n\n```python\ndef evens():\n    yield 2\n    yield 4\n```\n\nWithout `yield from`:\n\n```python\ndef all_numbers():\n    for n in evens():\n        yield n\n```\n\nWith `yield from`:\n\n```python\ndef all_numbers():\n    yield from evens()\n```\n\nThis is shorter and easier to read.\n\n---\n\n## Additional Benefits of `yield from`\n\nIt automatically forwards:\n\n- `.send()`\n- `.throw()`\n- `.close()`\n- return values from sub-generators\n\n---\n\n## Real-world Use Cases\n\n- Building data-processing pipelines.\n- Chaining multiple generators.\n- Coroutine-based systems.\n\n---\n\n## Interview Follow-ups\n\n- What is a coroutine?\n- How does `yield from` differ from `await`?\n- Why was PEP 380 introduced?\n\n---\n\n## Common Mistakes\n\n❌ Assuming `yield from iterable` is identical to:\n\n```python\nfor x in iterable:\n    yield x\n```\n\nWhile they look similar, `yield from` also forwards `.send()`, `.throw()`, and generator return values."}, {"section": "Python Basics", "question": "How would you write a generator expression to lazily sum the squares of even numbers in a huge list?", "answer": "```python\ntotal = sum(x * x for x in huge_list if x % 2 == 0)\n```\n\n---\n\n## Why is this efficient?\n\nThe generator expression produces values one at a time instead of building an intermediate list in memory.\n\nThis makes it highly memory-efficient when processing very large datasets.\n\n---\n\n## Benefits\n\n- Constant memory usage.\n- Better scalability.\n- Improved performance for large inputs.\n\n---\n\n## Interview Follow-ups\n\n- When should you prefer a list comprehension?\n- What is lazy evaluation?"}, {"section": "Python Basics", "question": "What happens if you call `next()` on an exhausted generator?", "answer": "Calling `next()` on an exhausted generator raises `StopIteration`.\n\n---\n\n## Detailed Explanation\n\nGenerators are single-use iterators. Once all values have been produced, the generator becomes exhausted.\n\nAny subsequent call to `next()` raises `StopIteration`.\n\nGenerators cannot be reset or rewound. To iterate again, a new generator instance must be created.\n\n---\n\n## Important Points\n\n- Generators preserve state while active.\n- Exhausted generators remain exhausted forever.\n- `for` loops automatically handle `StopIteration` internally.\n\n---\n\n## Interview Follow-ups\n\n- How does a `for` loop use `StopIteration`?\n- Why are generators considered single-use iterators?"}, {"section": "Python Basics", "question": "What does the `with` statement actually do under the hood?", "answer": "The `with` statement works with objects implementing the context manager protocol.\n\n---\n\n## Execution Flow\n\n1. Call `__enter__()`.\n2. Execute the body of the `with` block.\n3. Always call `__exit__()` when leaving the block.\n\nThis cleanup occurs regardless of whether execution finishes normally or because of an exception.\n\n---\n\n## Why use `with`?\n\nIt guarantees proper resource cleanup and exception safety.\n\nTypical resources include:\n\n- Files\n- Database connections\n- Locks\n- Network connections\n\n---\n\n## Interview Follow-ups\n\n- What arguments does `__exit__()` receive?\n- How does `with` compare to `try/finally`?"}, {"section": "Python Basics", "question": "How do you write a custom context manager without defining a full class?", "answer": "Use `contextlib.contextmanager`.\n\n---\n\n## Detailed Explanation\n\nThe decorator converts a generator function into a context manager.\n\n- Code before `yield` behaves like `__enter__()`.\n- The yielded value becomes the value bound by `as`.\n- Code after `yield` behaves like `__exit__()`.\n\n---\n\n## Advantages\n\n- Less boilerplate.\n- Easier to read and maintain.\n- Ideal for simple resource-management logic.\n\n---\n\n## Interview Follow-ups\n\n- When should you prefer a class-based context manager?\n- Why is cleanup usually placed inside `finally`?"}, {"section": "Python Basics", "question": "If `__exit__` returns `True`, what happens to an exception raised inside the `with` block?", "answer": "If `__exit__()` returns `True`, the exception is suppressed.\n\n---\n\n## Detailed Explanation\n\nThe exception is considered handled and does not propagate outside the `with` block.\n\nProgram execution continues normally after the block.\n\nReturning `False` or `None` allows the exception to propagate.\n\n---\n\n## Important Note\n\nException suppression should be intentional and limited to specific scenarios.\n\nAccidentally swallowing exceptions can make debugging difficult.\n\n---\n\n## Interview Follow-ups\n\n- Why do most context managers return `False`?\n- When is exception suppression appropriate?"}, {"section": "Python Basics", "question": "How can you manage multiple resources cleanly with context managers?", "answer": "Multiple context managers can be combined in a single `with` statement.\n\nFor dynamically created resources, `contextlib.ExitStack` is preferred.\n\n---\n\n## Why use `ExitStack`?\n\n`ExitStack` allows context managers to be added programmatically while still guaranteeing cleanup.\n\nResources are always released in reverse order of acquisition.\n\n---\n\n## Benefits\n\n- Supports a variable number of resources.\n- Avoids deeply nested `with` statements.\n- Ensures reliable cleanup.\n\n---\n\n## Interview Follow-ups\n\n- Why are resources released in reverse order?\n- When is `ExitStack` necessary?"}, {"section": "Python Basics", "question": "What's the difference between `__str__` and `__repr__`?", "answer": "## Short Answer\n\n- `__str__` provides a human-friendly representation.\n- `__repr__` provides a developer-oriented representation.\n\n---\n\n## `__repr__`\n\nUsed primarily for debugging and interactive sessions.\n\nIt should ideally be unambiguous and, when practical, capable of recreating the object.\n\n---\n\n## `__str__`\n\nUsed when displaying objects to end users.\n\nIt focuses on readability rather than precision.\n\n---\n\n## Important Behavior\n\nIf `__str__` is not implemented, Python automatically falls back to `__repr__`.\n\n---\n\n## Interview Follow-ups\n\n- Why should `__repr__` be unambiguous?\n- Which method does the REPL display by default?"}, {"section": "Python Basics", "question": "Why does calling a blocking, synchronous function (e.g. `time.sleep()` or a sync DB driver) inside an `async def` function cause problems?", "answer": "## Short Answer\n\nBlocking calls prevent the event loop from running other coroutines, effectively freezing the entire asynchronous application.\n\n---\n\n## Detailed Explanation\n\nAsyncio relies on **cooperative multitasking**. Coroutines must periodically yield control back to the event loop so other tasks can run.\n\nSynchronous blocking operations such as:\n\n- `time.sleep()`\n- Traditional database drivers\n- Blocking network requests\n- CPU-intensive computations\n\nnever yield control, causing the entire event loop to stall.\n\nAs a result, all other coroutines remain paused until the blocking operation completes.\n\n---\n\n## Solutions\n\n- Use async-native libraries (`asyncio.sleep()`, async DB drivers, `aiohttp`, etc.).\n- Offload blocking operations to a thread or process pool using `run_in_executor()`.\n- Move CPU-intensive work to separate processes.\n\n---\n\n## Interview Follow-ups\n\n- How does the asyncio event loop work?\n- What's the difference between concurrency and parallelism?\n- When should CPU-bound tasks use multiprocessing instead of asyncio?"}, {"section": "Python Basics", "question": "What's the Method Resolution Order (MRO) and why does it matter for multiple inheritance?", "answer": "The **Method Resolution Order (MRO)** determines the order in which Python searches classes when looking for an attribute or method.\n\nPython uses the **C3 Linearization algorithm** to compute this order.\n\nYou can inspect it using:\n\n```python\nprint(MyClass.__mro__)\n# or\nprint(MyClass.mro())\n```\n\n### Example\n\n```python\nclass A:\n    def greet(self):\n        print('A')\n\nclass B(A):\n    def greet(self):\n        print('B')\n\nclass C(A):\n    def greet(self):\n        print('C')\n\nclass D(B, C):\n    pass\n\nobj = D()\nobj.greet()\n```\n\nOutput:\n\n```python\nB\n```\n\nMRO:\n\n```python\nprint(D.mro())\n# [D, B, C, A, object]\n```\n\n### Why it matters\n\nConsider the classic **diamond inheritance** problem:\n\n```text\n      A\n     / \\\n    B   C\n     \\ /\n      D\n```\n\nWithout a well-defined MRO, methods from `A` could be executed multiple times or skipped entirely.\n\nC3 linearization guarantees:\n\n- A child appears before its parents.\n- Parent order is preserved.\n- Each class appears exactly once.\n\nThis makes multiple inheritance predictable and safe."}, {"section": "Python Basics", "question": "What does `super()` do, and why is it preferred over calling a parent class directly?", "answer": "`super()` returns a proxy object that delegates method calls to the **next class in the MRO**, not necessarily the immediate parent.\n\n### Single inheritance\n\n```python\nclass Animal:\n    def speak(self):\n        print('Animal speaks')\n\nclass Dog(Animal):\n    def speak(self):\n        super().speak()\n        print('Dog barks')\n\nDog().speak()\n```\n\nOutput:\n\n```python\nAnimal speaks\nDog barks\n```\n\n### Why not call the parent directly?\n\n```python\nAnimal.speak(self)\n```\n\nThis hardcodes the parent class and breaks cooperative multiple inheritance.\n\n### Multiple inheritance example\n\n```python\nclass A:\n    def method(self):\n        print('A')\n\nclass B(A):\n    def method(self):\n        print('B')\n        super().method()\n\nclass C(A):\n    def method(self):\n        print('C')\n        super().method()\n\nclass D(B, C):\n    def method(self):\n        print('D')\n        super().method()\n\nD().method()\n```\n\nOutput:\n\n```python\nD\nB\nC\nA\n```\n\nBecause every class cooperates via `super()`, each class participates exactly once according to the MRO.\n\n`super()` is therefore essential for correct multiple inheritance behavior."}, {"section": "Python Basics", "question": "What's the difference between a classmethod, a staticmethod, and an instance method?", "answer": "Python supports three kinds of methods.\n\n## 1. Instance Method\n\nReceives `self` and operates on a specific object.\n\n```python\nclass User:\n    def __init__(self, name):\n        self.name = name\n\n    def greet(self):\n        print(f'Hello {self.name}')\n\nu = User('John')\nu.greet()\n```\n\nOutput:\n\n```python\nHello John\n```\n\n---\n\n## 2. Class Method\n\nReceives `cls` and operates on the class itself.\n\nOften used as alternate constructors.\n\n```python\nclass User:\n    def __init__(self, name):\n        self.name = name\n\n    @classmethod\n    def from_dict(cls, data):\n        return cls(data['name'])\n\nu = User.from_dict({'name': 'John'})\n```\n\n---\n\n## 3. Static Method\n\nReceives neither `self` nor `cls`.\n\nIt's simply a regular function namespaced inside the class.\n\n```python\nclass MathUtils:\n    @staticmethod\n    def add(a, b):\n        return a + b\n\nprint(MathUtils.add(2, 3))\n```\n\n### Summary\n\n| Method Type | First Argument | Access Instance? | Access Class? |\n|-------------|---------------|------------------|---------------|\n| Instance | `self` | Yes | Yes |\n| Class | `cls` | No | Yes |\n| Static | None | No | No |"}, {"section": "Python Basics", "question": "How does the `@property` decorator work, and why use it instead of plain getter/setter methods?", "answer": "`@property` allows a method to be accessed like an attribute.\n\nExample:\n\n```python\nclass Temperature:\n    def __init__(self, celsius):\n        self._celsius = celsius\n\n    @property\n    def fahrenheit(self):\n        return (self._celsius * 9/5) + 32\n\nobj = Temperature(25)\nprint(obj.fahrenheit)\n```\n\nOutput:\n\n```python\n77.0\n```\n\nNotice:\n\n```python\nobj.fahrenheit\n```\n\ninstead of:\n\n```python\nobj.get_fahrenheit()\n```\n\n### Property Setter Example\n\n```python\nclass Person:\n    def __init__(self, age):\n        self.age = age\n\n    @property\n    def age(self):\n        return self._age\n\n    @age.setter\n    def age(self, value):\n        if value < 0:\n            raise ValueError('Age cannot be negative')\n        self._age = value\n```\n\n### Why use `@property`?\n\n- Validation\n- Computed attributes\n- Lazy loading\n- Backward compatibility\n\nA major advantage is that you can later add logic to an attribute without changing the public API."}, {"section": "Python Basics", "question": "What's the difference between composition and inheritance, and when would you prefer one?", "answer": "## Inheritance\n\nRepresents an **is-a** relationship.\n\n```python\nclass Animal:\n    def speak(self):\n        print('Speaking')\n\nclass Dog(Animal):\n    pass\n```\n\nA `Dog` **is an** `Animal`.\n\n---\n\n## Composition\n\nRepresents a **has-a** relationship.\n\n```python\nclass Engine:\n    def start(self):\n        print('Engine started')\n\nclass Car:\n    def __init__(self):\n        self.engine = Engine()\n\n    def start(self):\n        self.engine.start()\n```\n\nA `Car` **has an** `Engine`.\n\n### Why composition is often preferred\n\n- More flexible\n- Easier testing and mocking\n- Reduces tight coupling\n- Avoids deep inheritance hierarchies\n\nGeneral guideline:\n\n> Favor composition over inheritance unless there is a genuine \"is-a\" relationship."}, {"section": "Python Basics", "question": "What problem do `dataclasses` solve?", "answer": "`dataclasses` eliminate repetitive boilerplate code for classes that primarily store data.\n\nWithout dataclass:\n\n```python\nclass User:\n    def __init__(self, name, age):\n        self.name = name\n        self.age = age\n\n    def __repr__(self):\n        return f'User({self.name}, {self.age})'\n```\n\nUsing dataclass:\n\n```python\nfrom dataclasses import dataclass\n\n@dataclass\nclass User:\n    name: str\n    age: int\n```\n\nAutomatically generated:\n\n- `__init__`\n- `__repr__`\n- `__eq__`\n- `__hash__` (optionally)\n\n### Immutable dataclass\n\n```python\n@dataclass(frozen=True)\nclass Point:\n    x: int\n    y: int\n```\n\n### Mutable defaults\n\nWrong:\n\n```python\nitems = []\n```\n\nCorrect:\n\n```python\nfrom dataclasses import field\n\n@dataclass\nclass Basket:\n    items: list = field(default_factory=list)\n```\n\nThis avoids sharing the same list across instances."}, {"section": "Python Basics", "question": "What's an abstract base class (ABC), and what does it actually enforce?", "answer": "An **Abstract Base Class (ABC)** defines an interface that subclasses must implement.\n\nExample:\n\n```python\nfrom abc import ABC, abstractmethod\n\nclass Animal(ABC):\n\n    @abstractmethod\n    def speak(self):\n        pass\n```\n\nSubclass:\n\n```python\nclass Dog(Animal):\n    def speak(self):\n        return 'Woof'\n```\n\nTrying to instantiate without implementing:\n\n```python\nclass Cat(Animal):\n    pass\n\nCat()\n```\n\nProduces:\n\n```python\nTypeError: Can't instantiate abstract class\n```\n\nABC enforcement happens at **instantiation time**.\n\nBenefits:\n\n- Enforces interfaces\n- Improves maintainability\n- Makes contracts explicit"}, {"section": "Python Basics", "question": "What's the difference between `__new__` and `__init__`?", "answer": "`__new__` creates the object. `__init__` initializes it.\n\nCreation flow:\n\n```text\n__new__() → object created → __init__() → object returned\n```\n\nExample:\n\n```python\nclass Demo:\n    def __new__(cls):\n        print('Creating instance')\n        return super().__new__(cls)\n\n    def __init__(self):\n        print('Initializing instance')\n\nobj = Demo()\n```\n\nOutput:\n\n```python\nCreating instance\nInitializing instance\n```\n\n### Key differences\n\n| Feature | `__new__` | `__init__` |\n|----------|-----------|------------|\n| Creates object | Yes | No |\n| Returns object | Yes | No (`None`) |\n| Runs first | Yes | No |\n\n`__new__` is commonly overridden when:\n\n- Implementing Singleton pattern\n- Subclassing immutable types (`str`, `tuple`)\n- Controlling instance creation"}, {"section": "Python Basics", "question": "What's the difference between `except Exception:` and a bare `except:`?", "answer": "`except Exception:` catches normal runtime exceptions.\n\n```python\ntry:\n    x = 1 / 0\nexcept Exception as e:\n    print(type(e))\n```\n\nA bare `except:` catches **everything**, including:\n\n- `KeyboardInterrupt`\n- `SystemExit`\n- `GeneratorExit`\n\nExample:\n\n```python\ntry:\n    while True:\n        pass\nexcept:\n    print('Caught')\n```\n\nPressing Ctrl+C may not terminate the program.\n\nTherefore:\n\n```python\nexcept Exception:\n```\n\nis almost always preferred."}, {"section": "Python Basics", "question": "What's the purpose of the `else` clause on a `try` block?", "answer": "The `else` block executes only if the `try` block succeeds without raising an exception.\n\nExample:\n\n```python\ntry:\n    num = int(input())\nexcept ValueError:\n    print('Invalid input')\nelse:\n    print('Parsed:', num)\n```\n\nWhy not put code after `try`?\n\nBecause code inside `else` is not accidentally covered by the preceding `except` clauses.\n\n```python\ntry:\n    risky_operation()\nexcept Exception:\n    ...\nelse:\n    another_operation()\n```\n\nIf `another_operation()` raises, that exception propagates normally rather than being mistakenly caught."}, {"section": "Python Basics", "question": "How does exception chaining with `raise ... from ...` help debugging?", "answer": "`raise ... from ...` preserves the original exception while raising a more meaningful one.\n\nExample:\n\n```python\nclass ConfigError(Exception):\n    pass\n\ntry:\n    config = {}\n    port = config['port']\nexcept KeyError as e:\n    raise ConfigError('Missing configuration') from e\n```\n\nTraceback:\n\n```text\nKeyError: 'port'\n\nThe above exception was the direct cause of:\n\nConfigError: Missing configuration\n```\n\nBenefits:\n\n- Preserves root cause\n- Improves debugging\n- Adds domain-specific meaning"}, {"section": "Python Basics", "question": "Why is catching broad exceptions and silently passing (`except Exception: pass`) considered dangerous?", "answer": "Silently swallowing exceptions hides bugs and makes failures extremely difficult to debug.\n\nBad:\n\n```python\ntry:\n    process_data()\nexcept Exception:\n    pass\n```\n\nPossible hidden errors:\n\n- Typo (`AttributeError`)\n- Database failure\n- Network timeout\n- Logic bug\n\nBetter:\n\n```python\nimport logging\n\ntry:\n    process_data()\nexcept SpecificException as e:\n    logging.exception(e)\n```\n\nCatch only exceptions you can meaningfully handle."}, {"section": "Python Basics", "question": "What's a custom exception hierarchy, and why bother creating one for an application?", "answer": "A custom exception hierarchy groups application-specific errors under a common base class.\n\nExample:\n\n```python\nclass PaymentError(Exception):\n    pass\n\nclass CardDeclinedError(PaymentError):\n    pass\n\nclass InsufficientFundsError(PaymentError):\n    pass\n```\n\nUsage:\n\n```python\ntry:\n    charge_card()\nexcept PaymentError:\n    print('Payment failed')\n```\n\nBenefits:\n\n- Granular error handling\n- Cleaner APIs\n- Separates application errors from built-in exceptions"}, {"section": "Python Basics", "question": "What is the GIL, and what does it actually prevent?", "answer": "The **Global Interpreter Lock (GIL)** is a mutex in CPython that allows only one thread to execute Python bytecode at a time.\n\nThis means CPU-bound Python threads cannot run truly in parallel.\n\n```python\nimport threading\n```\n\nEven on an 8-core machine, only one thread executes Python bytecode at a given instant.\n\nThe GIL does **not** prevent:\n\n- Multiple threads existing\n- I/O concurrency\n- Context switching\n\nThe GIL is released during blocking I/O operations, allowing other threads to run."}, {"section": "Python Basics", "question": "Given the GIL, when does `threading` actually help, and when doesn't it?", "answer": "### Threading helps for I/O-bound work\n\nExamples:\n\n- HTTP requests\n- File I/O\n- Database queries\n\n```python\nimport threading\nimport requests\n\nthreads = [\n    threading.Thread(target=requests.get, args=('https://example.com',))\n    for _ in range(10)\n]\n```\n\n### Threading does NOT help for CPU-bound work\n\nExamples:\n\n- Image processing\n- Mathematical computation\n- Data compression\n\nFor CPU-heavy tasks, use `multiprocessing`."}, {"section": "Python Basics", "question": "What's the difference between `threading` and `multiprocessing` for working around the GIL?", "answer": "| Feature | Threading | Multiprocessing |\n|----------|-----------|----------------|\n| Unit | Threads | Processes |\n| Memory | Shared | Separate |\n| GIL | Shared | Separate GIL per process |\n| CPU Parallelism | No | Yes |\n| Overhead | Low | Higher |\n\nExample:\n\n```python\nfrom multiprocessing import Pool\n\nwith Pool(4) as pool:\n    result = pool.map(pow, [1, 2, 3], [2, 2, 2])\n```\n\n`multiprocessing` achieves true parallelism because each process has its own interpreter and GIL."}, {"section": "Python Basics", "question": "What problem does `asyncio` solve that threading doesn't already solve?", "answer": "`asyncio` provides cooperative concurrency using a single thread and an event loop.\n\nUnlike threads, coroutines voluntarily yield execution at `await` points.\n\nBenefits:\n\n- Very low memory overhead\n- No locking in most cases\n- Can manage thousands of concurrent connections\n\nExample:\n\n```python\nimport asyncio\n\nasync def worker():\n    await asyncio.sleep(1)\n    print('Done')\n\nasync def main():\n    await asyncio.gather(*(worker() for _ in range(1000)))\n\nasyncio.run(main())\n```\n\nCreating thousands of OS threads would be expensive, but thousands of coroutines are lightweight."}, {"section": "Python Basics", "question": "What does `await` actually do, mechanically?", "answer": "`await` suspends the current coroutine and gives control back to the event loop.\n\nExample:\n\n```python\nasync def fetch():\n    print('Start')\n    await asyncio.sleep(2)\n    print('End')\n```\n\nExecution flow:\n\n```text\nCoroutine starts\n↓\nReaches await\n↓\nCoroutine pauses\n↓\nEvent loop runs other coroutines\n↓\nAwaited operation completes\n↓\nCoroutine resumes\n```\n\nWithout `await`, a coroutine would block the event loop and prevent concurrency.\n\n`await` is therefore the fundamental building block that enables asynchronous execution in Python."}, {"section": "Python Basics", "question": "What's a race condition, and how do you typically prevent one in threaded code?", "answer": "## Short Answer\n\nA race condition occurs when multiple threads access and modify shared state concurrently, causing the program's behavior to depend on unpredictable execution timing.\n\n---\n\n## Detailed Explanation\n\nRace conditions typically occur during read-modify-write operations.\n\nFor example, two threads incrementing a shared counter may both read the same old value before either writes the updated value, causing one update to be lost.\n\nThese bugs are often:\n\n- Intermittent\n- Difficult to reproduce\n- Highly dependent on timing\n\n---\n\n## Prevention Techniques\n\nCommon synchronization primitives include:\n\n- `threading.Lock`\n- `threading.RLock`\n- Semaphores\n- Queues\n- Condition variables\n\nThe critical section should be protected so only one thread can modify shared state at a time.\n\n---\n\n## Interview Follow-ups\n\n- What is a critical section?\n- How does the GIL affect race conditions?\n- Why are queues often preferred over shared mutable state?"}, {"section": "Python Basics", "question": "What's a deadlock, and what's a common way to cause one accidentally?", "answer": "## Short Answer\n\nA deadlock occurs when two or more threads wait indefinitely for resources held by one another.\n\n---\n\n## Detailed Explanation\n\nDeadlocks happen when a circular dependency exists between threads.\n\nA classic scenario occurs when:\n\n- Thread A acquires Lock X and waits for Lock Y.\n- Thread B acquires Lock Y and waits for Lock X.\n\nNeither thread can proceed.\n\n---\n\n## Common Causes\n\n- Acquiring multiple locks in inconsistent order.\n- Nested locking.\n- Forgetting to release locks.\n- Resource starvation.\n\n---\n\n## Prevention Strategies\n\n- Always acquire locks in a globally consistent order.\n- Keep critical sections small.\n- Use timeouts when acquiring locks.\n- Prefer higher-level concurrency abstractions when possible.\n\n---\n\n## Interview Follow-ups\n\n- What are the Coffman deadlock conditions?\n- How can deadlocks be detected or avoided?"}, {"section": "Python Basics", "question": "How does CPython primarily manage memory for objects?", "answer": "## Short Answer\n\nCPython primarily uses **reference counting** for memory management.\n\n---\n\n## Detailed Explanation\n\nEvery Python object maintains a reference count representing how many references point to it.\n\nWhenever a new reference is created, the count increases. When a reference is removed, the count decreases.\n\nWhen the count reaches zero, the object is immediately deallocated.\n\nThis provides mostly deterministic cleanup behavior.\n\n---\n\n## Advantages\n\n- Immediate reclamation of most unused objects.\n- Predictable resource cleanup.\n- Simple implementation.\n\n---\n\n## Limitations\n\nReference counting alone cannot reclaim cyclic references.\n\nThis is why Python also includes a cyclic garbage collector.\n\n---\n\n## Interview Follow-ups\n\n- What is `sys.getrefcount()`?\n- Why does Python still need a garbage collector?"}, {"section": "Python Basics", "question": "If reference counting handles most cleanup, why does Python still need a garbage collector?", "answer": "## Short Answer\n\nReference counting cannot reclaim objects involved in reference cycles.\n\n---\n\n## Detailed Explanation\n\nConsider two objects referencing each other.\n\nEven when no external references exist, each object still keeps the other's reference count above zero.\n\nAs a result, reference counting alone cannot free these objects.\n\nPython's cyclic garbage collector periodically searches for unreachable object cycles and reclaims them.\n\n---\n\n## The `gc` Module\n\nThe `gc` module provides tools to:\n\n- Inspect tracked objects.\n- Trigger collection manually.\n- Tune collection behavior.\n- Debug memory issues.\n\n---\n\n## Interview Follow-ups\n\n- What kinds of objects are tracked by the garbage collector?\n- How can cyclic references impact long-running services?"}, {"section": "Python Basics", "question": "What are weak references, and what problem do they solve?", "answer": "## Short Answer\n\nA weak reference points to an object without increasing its reference count.\n\n---\n\n## Detailed Explanation\n\nNormally, storing an object reference keeps that object alive.\n\nWeak references allow objects to be referenced without preventing garbage collection.\n\nIf all strong references disappear, the object can still be reclaimed.\n\n---\n\n## Common Use Cases\n\n- Caches\n- Observer patterns\n- Parent-child relationships\n- Avoiding memory leaks in large object graphs\n\n---\n\n## Why are they useful?\n\nThey prevent objects from being kept alive solely because they appear in caches or callback registries.\n\n---\n\n## Interview Follow-ups\n\n- What is the difference between strong and weak references?\n- Why are weak references useful in cache implementations?"}, {"section": "Python Basics", "question": "What's a memory leak typically caused by in long-running Python services, given that CPython has automatic memory management?", "answer": "## Short Answer\n\nMost Python memory leaks are caused by unintentionally retaining references to objects that are no longer needed.\n\n---\n\n## Detailed Explanation\n\nAutomatic memory management only frees objects that are unreachable.\n\nIf application code continues holding references, memory usage keeps growing.\n\nCommon causes include:\n\n- Unbounded caches.\n- Global collections that continually grow.\n- Forgotten callbacks or closures.\n- Large objects retained in queues.\n- Circular references involving external resources.\n\n---\n\n## Important Insight\n\nThese are often not true leaks at the interpreter level.\n\nThe application itself is still referencing the objects, so the garbage collector behaves correctly.\n\n---\n\n## Prevention Strategies\n\n- Use bounded caches.\n- Remove unused references.\n- Employ weak references where appropriate.\n- Monitor memory usage continuously.\n\n---\n\n## Interview Follow-ups\n\n- How would you investigate memory growth in production?\n- What tools can profile Python memory usage?"}, {"section": "Python Basics", "question": "Do Python type hints get enforced at runtime?", "answer": "## Short Answer\n\nNo. Python type hints are not enforced by CPython at runtime.\n\n---\n\n## Detailed Explanation\n\nType hints primarily serve as metadata for:\n\n- Static analysis tools.\n- IDEs.\n- Documentation generation.\n- Code readability.\n\nCPython does not validate annotated types during function calls.\n\nStatic type checkers such as `mypy` and `pyright` analyze code before execution and report type mismatches.\n\n---\n\n## Runtime Validation\n\nLibraries such as:\n\n- Pydantic\n- Typeguard\n- Beartype\n\ncan optionally enforce types during execution.\n\n---\n\n## Interview Follow-ups\n\n- Why did Python choose optional typing?\n- What are the benefits of static type checking?"}, {"section": "Python Basics", "question": "What's the difference between `Optional[X]` and just `X` in a type hint?", "answer": "## Short Answer\n\n`Optional[X]` indicates that a value may either be of type `X` or `None`.\n\n`X` alone means the value should never be `None`.\n\n---\n\n## Detailed Explanation\n\n`Optional[X]` is equivalent to:\n\n```python\nX | None\n```\n\nType checkers require code to explicitly handle the possibility of `None`.\n\nUsing plain `X` communicates that callers can safely assume the value always exists.\n\n---\n\n## Why does this matter?\n\nExplicitly modeling nullable values improves correctness and prevents `AttributeError` caused by unexpected `None` values.\n\n---\n\n## Interview Follow-ups\n\n- Why is explicit handling of `None` valuable?\n- How do modern Python versions express union types?"}, {"section": "Python Basics", "question": "What's the practical difference between `List[int]` and `Sequence[int]` as a parameter type?", "answer": "## Short Answer\n\n`List[int]` requires a mutable list.\n\n`Sequence[int]` accepts any sequence-like object, including lists, tuples, and other sequence implementations.\n\n---\n\n## Detailed Explanation\n\n`Sequence` represents a more general, read-only contract.\n\nUsing `Sequence[int]` makes APIs more flexible because callers are not forced to convert their data into lists.\n\nUse `List[int]` only when mutation of the provided collection is required.\n\n---\n\n## Best Practice\n\nFor function parameters, prefer the most general type that satisfies your requirements.\n\nThis reduces unnecessary coupling.\n\n---\n\n## Interview Follow-ups\n\n- What is covariance in typing?\n- Why is programming to interfaces preferable?"}, {"section": "Python Basics", "question": "What's a `Protocol` in Python's typing system, and how does it differ from an ABC?", "answer": "## Short Answer\n\nA `Protocol` enables structural typing, while an Abstract Base Class (ABC) uses nominal typing.\n\n---\n\n## Detailed Explanation\n\nWith `Protocol`, a class satisfies an interface simply by implementing the required methods and attributes.\n\nExplicit inheritance is unnecessary.\n\nABCs, on the other hand, require explicit subclassing.\n\n---\n\n## Why is this useful?\n\nProtocols align naturally with Python's duck-typing philosophy.\n\nThey allow static type checking without imposing inheritance hierarchies.\n\n---\n\n## Interview Follow-ups\n\n- What is structural typing?\n- How do protocols support dependency inversion?"}, {"section": "Python Basics", "question": "Why might you reach for `TypedDict` instead of a plain `Dict[str, Any]` or a full dataclass?", "answer": "## Short Answer\n\n`TypedDict` provides static typing for dictionary shapes while preserving normal dictionary behavior at runtime.\n\n---\n\n## Detailed Explanation\n\n`Dict[str, Any]` provides almost no type safety.\n\nA dataclass introduces additional structure and object semantics.\n\n`TypedDict` occupies the middle ground by specifying:\n\n- Required keys.\n- Optional keys.\n- Expected value types.\n\nwhile keeping the runtime object as a standard dictionary.\n\n---\n\n## Common Use Cases\n\n- JSON payloads.\n- API responses.\n- Configuration dictionaries.\n\n---\n\n## Interview Follow-ups\n\n- When would a dataclass still be preferable?\n- What are the limitations of `TypedDict`?"}, {"section": "Python Basics", "question": "When should you prefer a list comprehension over a generator expression?", "answer": "## Short Answer\n\nUse a list comprehension when you need the entire collection in memory.\n\nUse a generator expression when values are consumed lazily and only once.\n\n---\n\n## List Comprehensions\n\nPrefer when you need:\n\n- Random access.\n- Multiple iterations.\n- `len()`.\n- In-place modifications.\n\n---\n\n## Generator Expressions\n\nPrefer when:\n\n- Processing large datasets.\n- Streaming data.\n- Minimizing memory usage.\n- Performing single-pass iteration.\n\n---\n\n## Interview Follow-ups\n\n- What is lazy evaluation?\n- Why are generators more memory efficient?"}, {"section": "Python Basics", "question": "What's the difference between `map`/`filter` and an equivalent comprehension — is one actually faster?", "answer": "## Short Answer\n\nBoth approaches are functionally equivalent in most cases.\n\nComprehensions are generally considered more readable and idiomatic in Python.\n\n---\n\n## Performance\n\nPerformance differences are usually negligible.\n\n`map()` and `filter()` may occasionally be slightly faster for simple operations implemented in C.\n\nHowever, readability is typically more important than micro-optimizations.\n\n---\n\n## Best Practice\n\nPrefer comprehensions unless `map()` or `filter()` clearly improves clarity.\n\n---\n\n## Interview Follow-ups\n\n- Why are comprehensions considered more Pythonic?\n- When might `map()` still be preferable?"}, {"section": "Python Basics", "question": "What does `functools.reduce` do, and why is it used less often in idiomatic Python than `map`/`filter`?", "answer": "## Short Answer\n\n`reduce()` repeatedly combines elements from an iterable to produce a single accumulated result.\n\n---\n\n## Detailed Explanation\n\nEach iteration applies a binary function to the accumulated value and the next element.\n\nMany common reduction operations already have dedicated built-ins such as:\n\n- `sum()`\n- `max()`\n- `min()`\n- `all()`\n- `any()`\n\nThese are usually more readable.\n\n---\n\n## Why is `reduce()` less common?\n\nComplex `reduce()` expressions can be difficult to understand and maintain.\n\nExplicit loops often communicate intent more clearly.\n\n---\n\n## Interview Follow-ups\n\n- What programming paradigm popularized `reduce()`?\n- Why is readability emphasized in Python?"}, {"section": "Python Basics", "question": "What does `functools.lru_cache` do, and what's a gotcha when applying it to instance methods?", "answer": "## Short Answer\n\n`lru_cache` memoizes function results, avoiding repeated computation for identical arguments.\n\n---\n\n## Detailed Explanation\n\nThe cache stores previously computed results keyed by function arguments.\n\nRepeated calls with the same arguments return cached values immediately.\n\n---\n\n## Common Benefits\n\n- Improved performance.\n- Reduced redundant computation.\n- Faster recursive algorithms.\n\n---\n\n## Instance Method Gotcha\n\nWhen used on instance methods, `self` becomes part of the cache key.\n\nThis means cached entries maintain references to instance objects, potentially preventing garbage collection and increasing memory usage in long-running applications.\n\n---\n\n## Interview Follow-ups\n\n- How does cache eviction work?\n- Why must cache keys be hashable?"}, {"section": "Python Basics", "question": "What's the difference between `functools.partial` and just writing a small wrapper lambda?", "answer": "## Short Answer\n\nBoth can pre-fill function arguments, but `partial()` provides better introspection, serialization support, and clearer inten
