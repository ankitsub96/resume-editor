 score as irrelevant/ambiguous), instead of just feeding weak context to the generator anyway, the system can trigger a **fallback** — commonly a live web search, or a query reformulation and re-retrieval attempt — rather than confidently generating an answer from context that was never actually relevant. This directly addresses the common naive-RAG failure mode of generating a fluent, confident-sounding answer from poor or irrelevant retrieved context."}, {"section": "RAG", "question": "What is agentic RAG, and how does it differ from a fixed RAG pipeline?", "answer": "Agentic RAG treats retrieval as one **tool** among potentially several that an LLM-driven agent can choose to invoke, reason about the results of, and decide whether to invoke again (possibly with a different query, or a different tool/source entirely) — rather than retrieval being one fixed, always-executed step in a linear pipeline. This allows much more adaptive behavior: the agent might decide a question doesn't need retrieval at all, might retrieve, evaluate the results as insufficient, and retrieve again with a refined query, or might combine retrieval with other tools (a calculator, a SQL query, a web search) as needed for a given question — at the cost of more unpredictable latency/cost (the number of steps/tool calls isn't fixed in advance) and added complexity in controlling/bounding the agent's behavior."}, {"section": "RAG", "question": "What's the difference between RAG-as-a-fixed-pipeline and RAG-as-a-tool inside an agent loop?", "answer": "In a fixed pipeline, retrieval happens unconditionally, exactly once, as a hardcoded step regardless of the specific query — simple, predictable latency and cost, but inflexible (every query pays the retrieval cost even if unnecessary, and there's no opportunity to retrieve again if the first attempt was insufficient). As a tool inside an agent loop, the LLM itself decides *whether* and *when* to call retrieval (alongside other available tools), potentially multiple times with refined queries, based on its own evaluation of whether it has enough information yet — more powerful and adaptive, but with variable, harder-to-predict latency/cost per query, and requiring careful prompt design and guardrails (e.g. a max number of tool calls) to prevent the agent from looping unnecessarily or never converging on a final answer."}, {"section": "RAG", "question": "What is GraphRAG, and what kind of questions is it particularly suited for?", "answer": "GraphRAG builds a **knowledge graph** from the source corpus (extracting entities and their relationships, e.g. via an LLM-driven extraction pass over the documents) in addition to or instead of plain vector-chunk retrieval, then retrieves by traversing relevant parts of that graph — following entity relationships rather than just chunk-level semantic similarity. It's particularly well-suited for questions that require understanding **relationships and connections** across many documents (e.g. 'how are these three people/organizations connected,' or summarizing themes that span an entire large corpus rather than residing in any single passage) — cases where plain chunk-based vector retrieval struggles, since the needed information isn't localized to any one retrievable chunk but emerges from the structure connecting many of them."}, {"section": "RAG", "question": "What is contextual compression in a RAG pipeline, and why apply it after retrieval?", "answer": "Contextual compression takes the retrieved chunks and, before sending them to the final LLM generation step, extracts/summarizes only the parts actually relevant to the specific query — discarding irrelevant sentences within an otherwise-relevant chunk — typically using a smaller, cheaper LLM call dedicated to this compression step. This reduces the token count (and therefore cost/latency) of the final generation prompt and can improve answer quality by removing distracting irrelevant content that survived the initial chunk-level retrieval but isn't actually useful for this specific query, at the cost of an additional LLM call (and its own latency/cost) in the pipeline."}, {"section": "RAG", "question": "How would you design a RAG system that needs to answer both 'lookup' questions (specific facts) and 'summarization' questions (broad themes across many documents)?", "answer": "These require fundamentally different retrieval strategies, so a robust system typically **routes** between them: lookup questions are well-served by standard chunk-level dense/hybrid retrieval (find the few most relevant specific passages). Broad summarization questions ('what are the main themes across our customer feedback this quarter') are poorly served by retrieving just a handful of top-K chunks, since the answer genuinely depends on synthesizing across potentially hundreds of documents that no small K would cover — these are better handled with techniques like **map-reduce summarization** (summarize each document/cluster independently, then summarize the summaries) or pre-computed, periodically-refreshed corpus-level summaries (or a GraphRAG-style approach), rather than forcing the same top-K-chunk retrieval pattern onto a fundamentally different kind of question."}, {"section": "RAG", "question": "What's the 'stuff' method for assembling retrieved context into a prompt, and what's its limitation?", "answer": "'Stuff' simply concatenates all retrieved chunks directly into a single prompt alongside the user's question, in one LLM call — simplest possible approach, and works fine as long as the total retrieved content fits comfortably within the model's context window. Its limitation is exactly that constraint: it doesn't scale to cases where retrieved context (or the number of relevant chunks) exceeds what fits in one prompt, and even within the context window, simply concatenating many chunks without structure can make it harder for the model to clearly distinguish and weigh each separate source."}, {"section": "RAG", "question": "What's the 'map-reduce' approach to handling retrieved context that's too large to fit in one prompt?", "answer": "Map-reduce processes each retrieved chunk (or document) **independently** first ('map' step — e.g. summarizing each one, or extracting just the relevant facts from each relative to the question), then combines those individual outputs in a final 'reduce' step (another LLM call that synthesizes the per-chunk outputs into one final answer). This scales to arbitrarily many chunks (since each map step only ever sees one chunk, regardless of total corpus size) at the cost of many more LLM calls (one per chunk for mapping, plus the final reduce call) and potential **loss of cross-chunk relationships** — since each chunk is processed in isolation during the map step, the model can't reason about connections *between* chunks until the reduce step, by which point it's working from summaries rather than the original full content."}, {"section": "RAG", "question": "What's the 'refine' approach to context assembly, and how does it differ from map-reduce?", "answer": "Refine processes retrieved chunks **sequentially**, maintaining a running answer that gets updated/refined with each new chunk (start with chunk 1, generate an initial answer; feed chunk 2 plus the current answer, ask the model to refine/update it; repeat through all chunks) — rather than map-reduce's independent-then-combine pattern. This lets later chunks build on and potentially correct earlier conclusions (better preserving cross-chunk reasoning than map-reduce's isolated mapping step), but is inherently **sequential** (each step depends on the previous one's output, so it can't be parallelized the way map-reduce's independent map steps can) and the running answer can sometimes drift or get 'diluted' if many chunks are processed in sequence, especially if later chunks are less relevant than earlier ones."}, {"section": "RAG", "question": "What's the 'lost in the middle' phenomenon, and how does it affect how you should order retrieved context in a prompt?", "answer": "Research has shown many LLMs attend less reliably to information placed in the **middle** of a long context window compared to information near the very beginning or very end — meaning a critically relevant chunk buried in the middle of a long, stuffed prompt may effectively get 'ignored' even though it's technically present in the context. A practical mitigation is to deliberately **order retrieved chunks by relevance with the most important ones placed near the beginning and/or end** of the context, rather than in arbitrary or purely chronological order, and to generally favor fewer, more carefully selected chunks over stuffing in many lower-relevance ones that push the genuinely important content toward that less-attended middle region."}, {"section": "RAG", "question": "How should you format/label retrieved chunks within the prompt so the LLM can distinguish and cite them correctly?", "answer": "Clearly delimit each chunk (e.g. with XML-like tags or markdown headers) and attach an explicit, stable identifier/source label to each one, then instruct the model explicitly to cite using those labels:\n```\n<context>\n<source id=\"doc_1\">FastAPI uses Depends() for dependency injection...</source>\n<source id=\"doc_2\">Pydantic v2 rewrote validation in Rust...</source>\n</context>\n\nAnswer the question using only the sources above. Cite each claim with its source id, e.g. [doc_1].\n```\nThis structure makes it much easier for the model to reliably produce accurate citations (since each piece of context has an unambiguous handle to reference) and also makes it easier for *you* to programmatically verify those citations afterward — e.g. checking that a cited source ID actually exists and that the claim attributed to it is genuinely supported by that source's text."}, {"section": "RAG", "question": "What's the trade-off between including more context (higher K) and prompt cost/latency, and how do you decide where to draw the line?", "answer": "Every additional chunk in the prompt linearly increases token count, which increases both per-call cost (most LLM APIs charge per token) and generation latency (longer prompts take longer to process, and the model still has to generate the full response after reading all that context). The decision should be grounded in measured **marginal value**: does going from K=5 to K=10 measurably improve your evaluation metrics (faithfulness, answer correctness) enough to justify roughly double the context cost, or does the answer quality plateau well before that — if quality plateaus at K=5, paying for K=10 is pure waste. This is exactly the kind of decision that should be made by running your actual evaluation suite at multiple K values and looking at the cost/quality curve, not by picking an arbitrary 'safe-sounding' number."}, {"section": "RAG", "question": "What does 'grounding' mean in the context of RAG, and how do you actually verify a generated answer is grounded?", "answer": "Grounding means every factual claim in the LLM's generated answer is actually supported by the retrieved context provided to it, rather than being drawn from the model's own (potentially incorrect or outdated) parametric memory. Verifying this can be done via: an explicit **citation requirement** in the prompt (forcing the model to tag each claim with which source it came from, then spot-checking those citations are accurate), a separate **faithfulness-checking LLM call** (ask a second model: 'is this claim from the answer actually supported by this retrieved context, yes/no') — this is essentially what RAGAS-style faithfulness metrics automate — or, for the highest-stakes use cases, human review against the cited sources."}, {"section": "RAG", "question": "Why can an LLM still hallucinate even when given correct, relevant retrieved context?", "answer": "Even with good context present, the model might: ignore it and answer from its own (possibly wrong) parametric memory anyway, especially if its training-data 'beliefs' conflict with the retrieved context; partially answer using the context but then 'fill in' additional unsupported details the context didn't actually contain, because the model is optimizing for a fluent, complete-sounding answer; or misread/misinterpret nuanced or ambiguous context (e.g. a qualifying clause, a date range, a negation) and confidently state something the context doesn't actually support. This is exactly why retrieval alone doesn't eliminate hallucination — it reduces but doesn't remove it, and explicit grounding-verification steps remain important even in a well-functioning RAG system."}, {"section": "RAG", "question": "How does explicitly instructing the model to say 'I don't know' help with hallucination, and what's the limitation of this approach?", "answer": "A prompt instruction like 'If the provided context doesn't contain the answer, say you don't know rather than guessing' gives the model explicit permission and instruction to abstain rather than feel compelled to produce *some* answer regardless of whether the context supports it — measurably reducing confident-but-unsupported answers in practice. The limitation is that this relies entirely on the model **correctly recognizing** that the context is insufficient, which it doesn't always do reliably — a model can still confidently hallucinate an answer even with this instruction present, especially when the retrieved context is partially relevant (enough to seem sufficient) but doesn't actually contain the specific fact being asked about."}, {"section": "RAG", "question": "What's the role of citations in reducing the practical impact of hallucination, even if they don't eliminate it?", "answer": "Citations don't prevent the model from generating an unsupported claim, but they make unsupported claims **verifiable and auditable** — a user (or an automated checker) can click through to the cited source and immediately see whether the claim is actually supported, rather than having to blindly trust the answer or independently fact-check it from scratch. This shifts hallucination from a silent, hard-to-detect failure mode into a visible, checkable one — which matters enormously in practice, since a wrong answer with an honest, checkable citation is generally far less harmful than a wrong answer presented with unearned confidence and no way to verify it."}, {"section": "RAG", "question": "How would you build an automated faithfulness/groundedness check into a RAG pipeline?", "answer": "A common pattern: after generation, make a separate LLM call (sometimes called an 'LLM-as-judge' step) that's given the generated answer and the retrieved context, and asked to extract each individual factual claim in the answer and judge whether each one is directly supported by the provided context — returning a structured verdict per claim rather than one vague overall judgment.\n```python\nverification_prompt = f'''\nGiven this context: {context}\nAnd this answer: {answer}\nList each factual claim in the answer, and for each, state whether it is\nDIRECTLY supported by the context, PARTIALLY supported, or NOT supported.\n'''\nverdict = llm.generate(verification_prompt)\n```\nThis can run synchronously (blocking the response until verified, with a fallback if unsupported claims are found) or asynchronously for offline quality monitoring/alerting — the synchronous approach catches problems before the user sees them but adds latency and cost to every single response."}, {"section": "RAG", "question": "What's the difference between a model hallucinating a fact versus hallucinating a citation (citing a source that doesn't actually support the claim)?", "answer": "**Factual hallucination** is stating something untrue or unsupported as if it were a fact. **Citation hallucination** is a more specific and arguably more dangerous failure mode: the model correctly attaches a citation marker (e.g. `[doc_2]`) to a claim, giving the *appearance* of verifiable grounding, but the cited source doesn't actually contain or support that specific claim — this is worse than an uncited hallucination precisely because the presence of a citation creates false confidence/trust that the claim has been verified, when it hasn't. Detecting this specifically requires checking not just 'does a citation exist' but 'does the cited source's actual content support the specific claim it's attached to' — a meaningfully stricter check than just confirming citation markers are present and correctly formatted."}, {"section": "RAG", "question": "What are the main dimensions you'd evaluate in a RAG system, and why does it need to be broken into multiple separate metrics rather than one overall 'is it good' score?", "answer": "RAG quality depends on multiple, fairly independent failure points, and a single overall score conflates them, making it impossible to know *what to fix* when quality is poor. Key dimensions: **retrieval quality** (did we retrieve the actually-relevant documents at all — context precision/recall), **faithfulness/groundedness** (is the generated answer actually supported by what was retrieved, not hallucinated), and **answer relevance/correctness** (does the final answer actually address the user's question well, and is it factually correct relative to ground truth, not just relative to the retrieved context). A system can score well on one dimension and poorly on another — e.g. perfect retrieval but a hallucinating generator, or excellent faithful generation undermined by poor retrieval — so evaluating them separately is essential for actually diagnosing and fixing problems."}, {"section": "RAG", "question": "What is RAGAS, and what does it provide for RAG evaluation?", "answer": "RAGAS is an evaluation framework specifically designed for RAG pipelines that computes a set of metrics — commonly **faithfulness** (are claims in the answer supported by retrieved context), **answer relevance** (does the answer actually address the question, penalizing incomplete or off-topic answers), **context precision** (of the retrieved chunks, how many were actually relevant/used), and **context recall** (of the relevant information that exists, how much was actually retrieved) — typically computed using an LLM-as-judge approach (an LLM evaluates these properties given the question, retrieved context, generated answer, and sometimes a ground-truth reference) rather than requiring extensive human-labeled evaluation data for every single metric, making it practical to run continuously during development rather than only via periodic manual review."}, {"section": "RAG", "question": "What's the difference between context precision and context recall in RAG evaluation?", "answer": "**Context precision** asks: of the chunks that were actually retrieved, what fraction were genuinely relevant/useful for answering the question — low precision means a lot of retrieved noise diluting the useful signal, even if the relevant information was technically present somewhere in there. **Context recall** asks: of all the relevant information that exists in the corpus and *should* have been retrieved to fully answer the question, what fraction was actually retrieved — low recall means genuinely necessary information was missed entirely, which (as covered earlier) caps the maximum possible answer quality regardless of generation quality. A system can have high precision but low recall (retrieves a small, clean, but incomplete set of relevant chunks) or the reverse (retrieves everything relevant, but buried among a lot of irrelevant noise) — they capture genuinely different failure modes."}, {"section": "RAG", "question": "How do you build a golden evaluation dataset for a RAG system, and why is this often the hardest part of evaluation in practice?", "answer": "A golden dataset needs representative (question, expected-relevant-source(s), ideally a reference answer) triples — built either by having domain experts manually write realistic questions against your actual corpus (most accurate, but slow and expensive to scale), or by using an LLM to auto-generate plausible questions from existing documents (faster to produce volume, but needs human spot-checking, since auto-generated questions can be unrealistic, too easy, or not representative of how real users actually phrase questions). It's often the hardest part of RAG evaluation in practice because **good evaluation data requires real domain understanding** of what users actually ask and what a genuinely correct answer looks like — and many teams under-invest here, leading to evaluation results that look good on paper but don't reflect real-world query patterns or real failure modes."}, {"section": "RAG", "question": "What's the difference between online and offline evaluation for a RAG system in production?", "answer": "**Offline evaluation** runs against a fixed, curated golden dataset (or recently-collected real queries with retrospectively-judged correctness) before deployment or as part of CI, giving fast, repeatable, controlled feedback on whether a pipeline change improved or regressed quality — but it can't fully capture the diversity and drift of real, ever-evolving user queries. **Online evaluation** monitors real production traffic continuously — implicit signals (did the user immediately rephrase their question, suggesting the first answer was unsatisfactory; did they click through to a cited source; explicit thumbs up/down feedback) — capturing real-world performance and emerging failure patterns that a static offline dataset will eventually miss as usage patterns shift over time, but with noisier, less controlled signal than a curated test set. Mature systems run both: offline evaluation as a fast gate for development changes, online monitoring as the ongoing reality check that those offline metrics still correlate with real-world quality."}, {"section": "RAG", "question": "What's 'LLM-as-judge' evaluation, and what are its known limitations?", "answer": "LLM-as-judge uses an LLM (often a stronger/more capable one than the system under evaluation) to score outputs against criteria like faithfulness, relevance, or correctness — instead of requiring exhaustive human labeling for every evaluation run, which doesn't scale to the volume needed for rapid iterative development. Known limitations: **self-preference bias** (judge models can systematically favor outputs that resemble their own typical generation style/phrasing, even when not actually better), **inconsistency** (the same judge can give different scores on repeated identical evaluations due to sampling randomness, requiring careful prompt design and sometimes multiple samples/averaging), and **the judge inheriting the same blind spots** as other LLMs (e.g. it may confidently misjudge factual correctness on topics it itself doesn't reliably know, especially for niche/domain-specific content) — meaning LLM-as-judge scores should be periodically validated against actual human judgment, not trusted unconditionally as ground truth."}, {"section": "RAG", "question": "What metrics specifically measure retrieval quality in isolation, separate from end-to-end answer quality?", "answer": "**Recall@K**: of the documents that are actually relevant to a query (per your golden dataset), what fraction appear within the top-K retrieved results — directly measures whether retrieval is finding the right information at all. **MRR (Mean Reciprocal Rank)**: the average of `1/rank` of the first relevant result across many queries — rewards relevant results appearing *higher* in the ranking, not just being present somewhere within top-K (a relevant result at rank 1 contributes much more to MRR than the same relevant result buried at rank 10). **NDCG (Normalized Discounted Cumulative Gain)**: accounts for graded relevance (some results being *more* relevant than others, not just binary relevant/irrelevant) and rewards highly-relevant results appearing higher in the ranking — a more nuanced metric than recall@K or MRR when you have graded rather than binary relevance judgments available in your evaluation data."}, {"section": "RAG", "question": "Why should you evaluate retrieval quality separately, before evaluating end-to-end generated-answer quality, when debugging a RAG system?", "answer": "If you only measure end-to-end answer quality and it's poor, you don't actually know *why* — it could be a retrieval failure (the right chunk was never even found), a context-assembly issue (the right chunk was retrieved but got buried in the middle of a long prompt and effectively ignored), or a pure generation failure (the model had perfectly good context but still answered badly or hallucinated despite it). Measuring retrieval quality in isolation first (recall@K, MRR against your golden dataset) immediately tells you whether the foundational input to generation was even adequate — if recall@K is poor, no amount of prompt-engineering or generation-model upgrades will meaningfully fix end-to-end quality, so debugging effort should be directed at retrieval first, generation second, in that order."}, {"section": "RAG", "question": "How would you design a RAG system that needs to respect document-level access permissions (e.g. some documents are only visible to certain users/roles)?", "answer": "Attach **access-control metadata** (e.g. allowed role/team/user IDs) to each chunk at indexing time, and apply a **mandatory pre-filter** based on the requesting user's permissions as part of every retrieval call — never relying on filtering *after* retrieval, and never relying on the LLM itself to 'choose not to use' unauthorized content it was given access to in its context (since once sensitive content is in the prompt, there's no reliable guarantee the model won't reference or leak it in its answer). This means the permission check has to happen at the retrieval/database layer itself, as a hard filter applied before any content ever reaches the LLM, not as a soft instruction layered on top afterward."}, {"section": "RAG", "question": "How would metadata filtering be used to implement time-based relevance, e.g. always preferring the most recent version of a policy document?", "answer": "Attach a `last_updated` (or `effective_date`) timestamp as metadata on each chunk, and either filter to only the latest version of each document at retrieval time (if older versions are explicitly superseded and shouldn't be retrievable at all), or boost recency as a factor in ranking (combining semantic similarity score with a recency-decay factor) when older versions might still occasionally be relevant (e.g. for historical/audit queries) but newer content should generally be preferred. The key design decision is whether old versions should be **excluded entirely** (cleaner, avoids ever surfacing outdated info, but loses historical queryability) or **demoted but still searchable** (more flexible, but requires careful ranking-weight tuning to avoid stale content occasionally outranking current content)."}, {"section": "RAG", "question": "What's faceted search/filtering in the context of RAG, and how would you let a user narrow retrieval to a specific subset of documents (e.g. 'only search the engineering wiki')?", "answer": "Faceted filtering lets retrieval be constrained along one or more structured dimensions (document category, team/source, date range, content type) in addition to the semantic similarity search — implemented by attaching those dimensions as metadata at indexing time and exposing filter parameters in the retrieval call that get applied (ideally as a pre-filter, as discussed earlier) before or during the vector similarity search. For a user-facing 'only search X' feature, this is usually surfaced as an explicit UI control (a dropdown/toggle) that maps directly to a metadata filter value passed through to the underlying vector search call, rather than trying to infer the user's intended scope purely from the natural-language query text itself."}, {"section": "RAG", "question": "How would you handle retrieval over structured data (e.g. a SQL database) as part of a RAG system, rather than just unstructured documents?", "answer": "Rather than trying to chunk/embed structured tabular data directly (which usually loses the precise, exact-value semantics that structured data needs — e.g. 'revenue > 1M' isn't well-served by semantic similarity search), a common pattern is **text-to-SQL**: the LLM is given the database schema and the user's natural-language question, and generates an actual SQL query, which is executed against the real database, with the query's results then fed back into the LLM's context for a final natural-language answer. This combines the precision of structured queries (exact filters, aggregations, joins) with the natural-language interface RAG users expect, and is architecturally quite different from chunk-based vector retrieval — many production systems route between vector-based RAG and text-to-SQL depending on whether a query is asking about unstructured content or structured/tabular data."}, {"section": "RAG", "question": "What's a practical risk of using an LLM to generate SQL queries directly against a production database as part of a retrieval pipeline, and how do you mitigate it?", "answer": "The generated SQL could be incorrect (subtly wrong joins/filters producing a plausible-looking but wrong result), overly expensive (an unbounded query that scans a huge table and degrades database performance), or in the worst case, destructive if the execution path isn't properly restricted (a generated `DELETE`/`UPDATE` statement, or a query against tables it shouldn't have access to). Mitigations: execute generated queries against a **read-only database connection/role** with no write permissions at all, restrict the connection to only the specific schemas/tables intended to be queryable, enforce query timeouts and row-limits to bound worst-case cost, and ideally validate/sandbox the generated SQL (e.g. parsing it to confirm it's a `SELECT`-only statement) before execution rather than trusting the LLM's output to always be well-behaved."}, {"section": "RAG", "question": "How does RAG extend to multi-modal content, e.g. retrieving relevant images or retrieving based on an image query?", "answer": "Multi-modal RAG typically uses **multi-modal embedding models** (e.g. CLIP-style models) that map both images and text into the *same* shared vector space, so a text query's embedding can be directly compared against image embeddings (and vice versa) using the same similarity search infrastructure as text-only RAG. For documents containing both text and images (e.g. a PDF with diagrams), this can mean generating and indexing embeddings for images alongside text chunks, often with the image's surrounding text/caption also indexed to provide additional retrievable context — and at generation time, using a multi-modal LLM that can directly accept and reason over retrieved images, not just retrieved text."}, {"section": "RAG", "question": "How would you handle a PDF that contains a mix of text, tables, and images during RAG ingestion?", "answer": "A robust ingestion pipeline typically uses a **layout-aware document parser** (rather than naive text extraction, which often garbles tables and loses image context entirely) to separately identify and extract text blocks, tables, and images/figures as distinct elements, preserving their relationship to surrounding context (e.g. a figure's caption, a table's preceding explanatory paragraph). Tables are often converted to a serialized format (markdown or row-as-sentence) as discussed earlier; images may be processed through a multi-modal embedding model or an image-captioning step (generating a text description that gets indexed as searchable text, even if the image itself isn't directly embedded) — the key principle is that naive 'extract all text and ignore structure' parsing tends to badly degrade exactly the content (tables, figures) that's often most information-dense in real-world documents."}, {"section": "RAG", "question": "What's a common approach for making tables in a document genuinely searchable and answerable via RAG, beyond just serializing them into the chunk text?", "answer": "Beyond serialization for retrieval, a complementary approach is treating structured tables more like structured data than free text: extracting the table into an actual structured representation (a small in-memory dataframe, or rows in a lightweight database) and, at query time, routing table-related questions through a more precise mechanism — e.g. text-to-pandas-code generation (the LLM writes a short pandas query against the extracted table rather than trying to eyeball the answer from a serialized text version), or text-to-SQL if tables are loaded into an actual database. This is more engineering investment than simple serialization but produces dramatically more reliable answers for genuinely numerical/tabular questions (sums, comparisons, filters) than asking an LLM to reason over a wall of serialized table text and do arithmetic itself, which LLMs are known to do unreliably."}, {"section": "RAG", "question": "Why is naive text extraction from PDFs often a bigger practical source of RAG quality problems than people initially expect?", "answer": "Many real-world PDFs have complex, inconsistent layouts (multi-column text, headers/footers interleaved with body content, tables without clear delimiters in the raw extracted text, scanned/image-based pages requiring OCR) — naive text extraction libraries often produce garbled, out-of-order, or incomplete text from exactly these common real-world documents, silently corrupting the input to your entire pipeline before chunking or embedding even happens. Because this failure happens so early in the pipeline (at ingestion) and produces text that still *looks* plausible at a glance, it's frequently under-diagnosed — teams spend significant effort tuning chunking, embeddings, or prompts without realizing the actual root cause of poor retrieval/answer quality is that the source text being chunked was already corrupted during extraction, before any of those later stages even ran."}, {"section": "RAG", "question": "What does an indexing pipeline need to handle for keeping a RAG system's knowledge base up to date over time?", "answer": "Beyond the initial one-time ingestion, a production pipeline needs to handle: **incremental updates** (detecting new or changed documents and only re-processing those, rather than re-embedding the entire corpus on every update — usually via tracking a content hash or last-modified timestamp per document), **deletion/deprecation** (removing chunks for documents that no longer exist or have been explicitly retired, so stale content doesn't linger in the index), and **versioning** (deciding whether to keep old versions queryable, as discussed in the metadata-filtering section, or fully replace them). Without explicit incremental-update logic, teams often default to periodically re-indexing everything from scratch, which works but scales poorly in both cost and latency-to-freshness as the corpus grows."}, {"section": "RAG", "question": "What's the latency budget breakdown in a typical production RAG request, and where does most of the time usually go?", "answer": "A typical request involves: query embedding (usually fast, tens of milliseconds), vector search (also usually fast for a well-indexed corpus, tens of milliseconds even at large scale with an ANN index), optional re-ranking (can add meaningfully more, especially with a cross-encoder over many candidates — potentially hundreds of milliseconds), and finally LLM generation, which is almost always the dominant cost — often several seconds, especially for longer generated answers, dwarfing the retrieval-side latency entirely. This means that for most RAG systems, the highest-leverage place to optimize end-to-end latency is usually the generation step itself (model choice, output length, streaming the response to the user incrementally rather than waiting for full completion) rather than further optimizing an already-fast retrieval stage."}, {"section": "RAG", "question": "How would you reduce RAG system costs without significantly hurting answer quality?", "answer": "Common levers: **caching** frequently-asked or repeated queries (and their full retrieval+generation results) rather than re-running the entire pipeline for identical or near-identical questions; using a **smaller/cheaper model for less complex sub-tasks** (e.g. query rewriting or relevance grading) while reserving the most capable model only for final answer generation; **tuning K down** if evaluation shows quality plateaus well before your current chunk count; **reducing embedding dimensionality** if a smaller dimension shows negligible quality loss on your evaluation set (as discussed earlier); and **streaming responses** to improve perceived latency even when actual total cost/compute is unchanged. The general principle is identifying which parts of the pipeline contribute the least marginal quality per dollar/millisecond, via actual measurement, rather than guessing which corners are safe to cut."}, {"section": "RAG", "question": "What does a production RAG system need for observability beyond just logging final answers?", "answer": "Effective debugging requires visibility into **every stage**, not just the final output: the actual query sent to retrieval (including any transformations applied), which specific chunks were retrieved and their similarity scores, whether/how re-ranking changed the order, the exact assembled prompt sent to the LLM, and the raw generated answer alongside any post-processing — ideally all correlated under one trace ID per request (similar to distributed tracing in a microservices system). Without this stage-by-stage visibility, diagnosing a bad answer requires guessing whether the failure was in retrieval, ranking, prompt assembly, or generation, rather than being able to directly inspect exactly what happened at each step for that specific request."}, {"section": "RAG", "question": "What's the operational risk of letting a RAG index grow unbounded over time without any cleanup/lifecycle policy?", "answer": "An ever-growing index increases storage costs linearly, can degrade search latency/throughput as the corpus scales (even with efficient ANN indexes, very large indexes still cost more to search and especially more to rebuild/maintain), and — perhaps most importantly for answer quality — accumulates increasing amounts of **stale, superseded, or simply outdated** content that can get retrieved and confidently presented as current, correct information if there's no active process for deprecating or removing it. A mature system needs an explicit lifecycle policy: defined retention rules, a process for marking/removing superseded document versions, and periodic audits checking whether retrieved-but-flagged-low-quality content (identified via production monitoring) should be cleaned up or re-processed."}, {"section": "RAG", "question": "How would you handle a sudden spike in query volume to a production RAG system without degrading quality or crashing the underlying infrastructure?", "answer": "Apply the same general scalability patterns covered elsewhere (rate limiting, auto-scaling, caching, graceful degradation) specifically tuned to RAG's particular cost profile: since LLM generation is usually the dominant latency/cost contributor, prioritize **caching** (especially for repeated/similar queries) and consider a **fallback to a cheaper/faster model** under sustained heavy load rather than letting queue depth and latency grow unboundedly for everyone. The vector database and embedding-generation steps usually scale more gracefully than LLM generation calls (which often hit hard rate limits from third-party providers), so capacity planning for a RAG system needs to specifically account for the generation step's distinct scaling constraints, not just assume the whole pipeline scales uniformly together."}, {"section": "RAG", "question": "What's a common mistake teams make when first building a RAG system, regarding evaluation?", "answer": "Shipping based purely on eyeballing a handful of example queries and subjectively judging 'this looks good,' without building any systematic evaluation set or metrics — this leads to a system that looks fine on the few cases the developer happened to manually test, but has unknown (often poor) performance on the actual diversity of real user queries, with no way to detect regressions when the pipeline is later changed (a new chunking strategy, a different embedding model). Investing early in even a modest golden evaluation set (even 20-50 representative question/expected-source pairs) pays for itself quickly once the pipeline starts evolving, since it converts 'does this change help or hurt' from a guess into a measurable comparison."}, {"section": "RAG", "question": "Why does 'it works great in my testing' often fail to predict real-world RAG performance?", "answer": "Developers testing their own system tend to ask questions they already know the answer to and already know are well-covered by the indexed corpus — a strong selection bias toward exactly the queries the system is most likely to handle well. Real users ask things the developer never anticipated (ambiguous phrasing, questions about edge cases or gaps in the corpus, compound questions, queries using different terminology than the source documents) — meaning a system that feels solid in casual developer testing can still have substantial blind spots that only surface once it meets the actual diversity of real usage, which is exactly why production monitoring and ongoing evaluation against real (anonymized) query logs matters even after a system initially ships."}, {"section": "RAG", "question": "What's a common mistake regarding chunk size that teams discover only after going to production?", "answer": "Picking a chunk size once during initial development (often copied from a tutorial or a default library setting) and never revisiting it, even as the actual document types and query patterns in production turn out to differ meaningfully from what was assumed during initial testing — e.g. discovering that user questions are mostly about specific numeric details that get diluted in the chosen chunk size, or that the chosen size frequently splits semantically important content (like the tables/code issues covered earlier) in ways that weren't caught during limited initial testing. Chunk size (and chunking strategy generally) should be revisited based on production evaluation data, not treated as a one-time setup decision made before real usage patterns were even known."}, {"section": "RAG", "question": "What's a common mistake regarding how teams handle retrieval failures (when nothing relevant is actually in the corpus)?", "answer": "Many naive pipelines always force the top-K retrieved chunks into the prompt regardless of how irrelevant they actually are (since top-K retrieval, as discussed, always returns *something*), leading the LLM to either hallucinate an answer loosely inspired by irrelevant context, or confidently answer as if the weakly-related context were actually sufficient. A more robust design explicitly checks retrieval confidence/relevance (via a threshold, or an explicit relevance-grading step like Corrective RAG's approach) and has a defined fallback behavior for genuine retrieval failures — explicitly telling the user 'I couldn't find relevant information about this' rather than silently generating a plausible-sounding but ungrounded answer from low-relevance context."}, {"section": "RAG", "question": "What's a common mistake when migrating or upgrading an embedding model in an existing production RAG system?", "answer": "Forgetting (or underestimating the cost of) the fact that switching embedding models requires **fully re-embedding the entire existing corpus** — as covered in the embedding-drift discussion — and discovering this only after partially migrating, ending up with a corrupted index containing vectors from two incompatible embedding spaces mixed together, which produces meaningless similarity scores. The safe migration pattern is to build the new index fully in parallel (under a separate namespace/collection), validate it against your evaluation set before cutover, and only then switch production traffic over — never incrementally mixing old and new embeddings within what's treated as a single logical index."}, {"section": "RAG", "question": "What's a common mistake regarding how teams test/tune their RAG system's prompt template?", "answer": "Iterating on the prompt template using only a handful of manually-inspected examples (similar to the broader evaluation pitfall above), and changing multiple things at once (prompt wording, chunk count, chunk order) between tests, making it impossible to attribute an observed quality change to any specific modification. A more disciplined approach changes one variable at a time and re-runs the same evaluation set after each change, so improvements (or regressions) can be confidently attributed to the specific change made, rather than relying on impression-based judgments across a handful of ad hoc test queries that may not be representative."}, {"section": "RAG", "question": "What's a subtle but common mistake in how teams measure 'does my RAG system answer correctly' that conflates two genuinely different questions?", "answer": "Conflating **'is the answer factually correct relative to ground truth'** with **'is the answer faithful to/grounded in the retrieved context'** — these are different questions, and a system can score well on one while failing the other. An answer can be faithful to retrieved context that itself happens to be wrong or outdated (faithful, but not factually correct), or an answer can happen to be factually correct by coincidence/prior model knowledge despite not actually being supported by what was retrieved (correct, but not actually grounded — meaning the retrieval step contributed nothing, and you'd get the same lucky-correct answer even with broken retrieval, masking a real underlying problem). Evaluating both separately (faithfulness against retrieved context, and correctness against external ground truth) reveals failure modes that either metric alone would miss."}, {"section": "System Design", "question": "What's the difference between scalability, availability, and reliability?", "answer": "**Scalability** is a system's ability to handle increasing load (more users, more data, more requests) by adding resources, ideally without a redesign. **Availability** is the percentage of time the system is operational and responding to requests — often measured in 'nines' (99.9%, 99.99%). **Reliability** is the probability the system produces *correct* results consistently over time, without silent corruption or data loss — a system can be highly available (always responds) while being unreliable (sometimes returns wrong data), so the two aren't the same axis. A well-designed system explicitly targets all three, since optimizing one in isolation (e.g. adding caching for scalability) can sometimes hurt another (stale cache data hurting reliability of the response)."}, {"section": "System Design", "question": "What's the difference between vertical and horizontal scaling, and what are the trade-offs?", "answer": "**Vertical scaling** means adding more resources (CPU, RAM, faster disk) to a single existing machine. It's simple — no architectural changes needed — but has a hard ceiling (you can't buy an infinitely powerful machine), causes downtime during the upgrade, and is a single point of failure regardless of how powerful that one machine is. **Horizontal scaling** means adding more machines and distributing load across them. It scales much further and improves fault tolerance (one machine dying doesn't take down the whole system), but requires the application to support running multiple instances — which usually means designing for **statelessness**, handling data partitioning, and adding a load balancer in front. Most large-scale systems eventually have to scale horizontally; vertical scaling is often a reasonable first step for a smaller system before that complexity is justified."}, {"section": "System Design", "question": "What's the difference between latency and throughput?", "answer": "**Latency** is how long a single request takes, end to end (e.g. 'this API responds in 50ms'). **Throughput** is how many requests the system can handle per unit time (e.g. '10,000 requests/second'). They're related but distinct: a system can have low latency but low throughput (fast per-request, but can't handle many concurrently — e.g. limited by a single-threaded bottleneck), or high throughput but high latency (handles huge volume, but each individual request is slow, e.g. heavily batched processing). Optimizing for one doesn't automatically improve the other — adding more parallel workers typically improves throughput without changing per-request latency, while reducing a slow database query improves latency without necessarily changing overall throughput capacity."}, {"section": "System Design", "question": "Explain the CAP theorem — what does it actually constrain, and what's commonly misunderstood about it?", "answer": "CAP theorem states that during a **network partition** (P — when nodes can't communicate with each other), a distributed system must choose between **Consistency** (every read sees the most recent write, everywhere) and **Availability** (every request gets a response, even if it might not reflect the latest write). You cannot have both during a partition. The common misunderstanding is treating CAP as 'pick 2 of 3 always' — partition tolerance isn't really optional for any real distributed system (networks *will* partition eventually), so the real choice systems make is between **CP** (refuse to serve some requests during a partition, to stay consistent — e.g. traditional RDBMS clusters, ZooKeeper) and **AP** (keep serving requests during a partition, accepting that some might be stale or need later reconciliation — e.g. Cassandra, DynamoDB). Outside of an actual partition, a well-designed system can be both consistent and available — CAP is specifically about the trade-off *during* a partition, not a permanent global property."}, {"section": "System Design", "question": "What's the difference between strong consistency and eventual consistency?", "answer": "**Strong consistency** guarantees that as soon as a write completes, every subsequent read (from any node) sees that write — there's no window where stale data could be returned. **Eventual consistency** guarantees that if no new writes occur, all replicas will *eventually* converge to the same value, but there's a window (often milliseconds, sometimes longer under load) where different nodes might return different (stale) data for the same key. Strong consistency is easier to reason about but typically costs more latency/availability (often requiring coordination across replicas before acknowledging a write). Eventual consistency scales better and tolerates partitions more gracefully, but pushes complexity onto the application — e.g. a user might not immediately see their own post in a feed that read from a stale replica, which products often paper over with techniques like 'read your own writes' consistency for the specific user who just wrote."}, {"section": "System Design", "question": "What is a single point of failure (SPOF), and how do you systematically find and eliminate them?", "answer": "A SPOF is any single component whose failure takes down the entire system (or a critical part of it) — a single database instance, a single load balancer, a single server running a critical background job. You find them by tracing every request path through the architecture and asking 'if this specific box/process/network link died right now, what breaks?' — doing this for every component in the diagram. You eliminate them through **redundancy**: multiple instances behind a load balancer (so any one failing doesn't matter), database replication with automatic failover, multiple availability zones/regions, and redundant network paths. The general principle is that any component without at least one standby/replica is a SPOF, and the cost of adding redundancy should be weighed against how critical that component actually is — not every component needs five-nines redundancy."}, {"section": "System Design", "question": "What does 'availability' mean quantitatively (the 'nines'), and what's the practical difference between 99.9% and 99.99%?", "answer": "Availability is the percentage of time a system successfully serves requests over some period, conventionally expressed in 'nines.' The difference between consecutive nines is roughly an order of magnitude less downtime per year: **99.9%** ('three nines') allows about **8.76 hours** of downtime per year; **99.99%** ('four nines') allows about **52.6 minutes** per year; **99.999%** ('five nines') allows only about **5.26 minutes** per year. Each additional nine gets dramatically more expensive and operationally demanding to achieve — five-nines essentially requires automated failover everywhere, since a human paged at 3am can't physically diagnose and fix anything within a 5-minute budget for the *entire year*. Most products deliberately target a specific nines-level appropriate to their actual business need rather than chasing the maximum possible, since the cost curve is steep."}, {"section": "System Design", "question": "What's the difference between a stateless and a stateful service, and why does statelessness matter for horizontal scaling?", "answer": "A **stateless** service doesn't retain any client-specific data between requests in its own memory — every request carries everything needed to process it (e.g. a token identifying the user), so any instance can handle any request, in any order, with identical results. A **stateful** service holds onto data between requests (e.g. an in-memory session, a WebSocket connection registry) tied to a specific instance. Statelessness matters for scaling because it means you can freely add/remove instances behind a load balancer and route any request to any instance — true horizontal scaling. Stateful services either need 'sticky sessions' (routing a given client consistently to the same instance, which complicates load balancing and creates partial SPOFs) or need to externalize that state to a shared store (Redis, a database) so any instance can access it — effectively converting the stateful pieces into a stateless service backed by a stateful *store*."}, {"section": "System Design", "question": "What is back-pressure in a system, and why does it matter?", "answer": "Back-pressure is a mechanism for a system to signal 'slow down' to whatever is producing work faster than it can be consumed, instead of silently accepting work it can't keep up with until it runs out of memory or falls hopelessly behind. Examples: a queue that blocks/rejects new messages once it hits a size limit, an HTTP server returning `429 Too Many Requests` instead of queuing requests indefinitely, or TCP's own flow-control windows throttling a sender to match the receiver's processing rate. Without back-pressure, a sudden traffic spike can cause **unbounded queue growth**, leading to ever-increasing latency (everything's still 'succeeding' eventually, just impossibly slowly) or an eventual crash from memory exhaustion — back-pressure converts that into an explicit, fast failure for excess load instead, which is almost always the better failure mode."}, {"section": "System Design", "question": "What's the difference between fault tolerance and high availability?", "answer": "**Fault tolerance** is a system's ability to continue operating *correctly* even when a component fails — often via redundancy that masks the failure entirely from the end user (e.g. a RAID array surviving a disk failure with zero data loss and no visible interruption). **High availability** is about minimizing *downtime* overall, which fault tolerance contributes to, but HA can also be achieved through fast detection-and-recovery (failing over to a standby within seconds) rather than true fault-masking. In practice the terms overlap heavily, but fault tolerance implies a stronger guarantee — failures are invisible, not just quickly recovered from — and is typically more expensive to achieve fully."}, {"section": "System Design", "question": "What happens step by step when a user types a URL into a browser, at a system-design level?", "answer": "1) **DNS resolution**: the browser resolves the domain to an IP address (checking local cache, then OS cache, then a DNS resolver, which queries root → TLD → authoritative nameservers if not cached). 2) **TCP connection**: the browser opens a TCP connection to that IP (a 3-way handshake), and if HTTPS, performs a **TLS handshake** to negotiate encryption. 3) **HTTP request**: the browser sends an HTTP request, which typically first hits a **load balancer**, which routes it to one of many backend application servers. 4) **Application processing**: that server may query a **database**, check a **cache**, call other internal services, then build a response. 5) **Response & rendering**: the response travels back through the same path; the browser parses HTML/CSS/JS and may trigger further requests (images, API calls) repeating parts of this flow, often hitting a **CDN** for static assets instead of the origin server entirely."}, {"section": "System Design", "question": "What is a load balancer, and what are the main load-balancing algorithms?", "answer": "A load balancer distributes incoming requests across multiple backend servers, so no single server is overwhelmed and the system can scale horizontally. Common algorithms: **Round robin** (cycle through servers in order — simple, but ignores current server load); **Least connections** (send to whichever server currently has the fewest active connections — better balances uneven request durations); **Weighted round robin / least connections** (account for servers with different capacities); and **IP hash / consistent hashing** (route based on a hash of the client's IP or another key, so the same client consistently lands on the same server — useful for sticky sessions, at the cost of uneven distribution if traffic isn't uniformly distributed across hash buckets)."}, {"section": "System Design", "question": "What's the difference between Layer 4 and Layer 7 load balancing?", "answer": "**Layer 4** (transport layer) load balancers make routing decisions based only on IP address and TCP/UDP port — they're fast and protocol-agnostic, but can't see or act on the actual HTTP request content (path, headers, cookies). **Layer 7** (application layer) load balancers understand HTTP itself, so they can route based on URL path (`/api/*` to one service, `/static/*` to another), inspect headers/cookies for sticky sessions, terminate TLS, and do content-based routing — at the cost of more processing overhead per request and being protocol-specific (you need an HTTP-aware L7 balancer for HTTP, separately for other protocols). Most modern web architectures use L7 load balancers (e.g. Nginx, ALB, Envoy) specifically because path/header-based routing is so commonly needed."}, {"section": "System Design", "question": "What is a CDN, and how does it actually improve performance?", "answer": "A Content Delivery Network is a globally distributed set of edge servers that cache content (static assets, sometimes API responses) **physically closer to end users**, reducing the round-trip latency a request would otherwise need to reach a single origin server far away. When a user requests a cached asset, the CDN's nearest edge node serves it directly (often in single-digit milliseconds), only contacting the origin server on a **cache miss** (or once that asset's TTL expires). Beyond raw latency, CDNs also reduce load on the origin server (since most requests never reach it) and provide some DDoS absorption, since attack traffic gets distributed across many edge locations rather than concentrated on one origin."}, {"section": "System Design", "question": "What's the difference between a forward proxy and a reverse proxy?", "answer": "A **forward proxy** sits in front of clients, making requests *on their behalf* to external servers — the destination server sees the proxy's IP, not the actual client's (common for corporate network filtering, or anonymizing client requests). A **reverse proxy** sits in front of servers, receiving requests *on their behalf* from external clients — the client thinks it's talking directly to the service, but the reverse proxy is actually routing, load-balancing, terminating TLS, or caching before forwarding to the real backend (Nginx in front of an app server is a classic reverse proxy setup). The key distinction is *which side* (client or server) the proxy is representing/hiding."}, {"section": "System Design", "question": "What's the practical system-design difference between TCP and UDP, and when would you choose UDP?", "answer": "**TCP** guarantees ordered, reliable delivery (retransmits lost packets, ensures correct sequencing) at the cost of connection setup overhead and head-of-line blocking (one lost packet stalls everything behind it until it's retransmitted). **UDP** has no such guarantees — packets can arrive out of order or not at all, with no automatic retransmission — but has lower overhead and no head-of-line blocking. You'd choose UDP when occasional packet loss is acceptable and low latency matters more than perfect reliability: real-time video/voice calls (a dropped video frame is fine, but waiting for a retransmit causes visible lag), live game state updates, or DNS queries (small enough that the application layer can just retry the whole query if needed, faster than TCP's connection setup for a single tiny exchange)."}, {"section": "System Design", "question": "What is a WebSocket, and when would you choose it over HTTP polling or Server-Sent Events (SSE)?", "answer": "A WebSocket is a **persistent, full-duplex** connection over a single TCP connection, allowing both client and server to send messages at any time without the overhead of repeated HTTP request/response cycles. Choose WebSockets when you need **bidirectional** real-time communication — chat applications, collaborative editing, multiplayer game state. **Polling** (repeatedly asking 'anything new?') is simpler but wastes resources on empty responses and adds latency up to the polling interval. **SSE** is simpler than WebSockets and works over plain HTTP, but is **one-directional** (server-to-client only) — fine for live feeds/notifications where the client never needs to push data back through the same channel, but insufficient for genuinely interactive bidirectional use cases."}, {"section": "System Design", "question": "Why does connection pooling matter at the network/infrastructure level in a microservices architecture, beyond just database connections?", "answer": "Every new TCP connection (and TLS handshake, if encrypted) between services has real setup latency and resource cost; in a microservices architecture where Service A might call Service B many times per second, opening a fresh connection per call adds that overhead to *every single request*. An HTTP connection pool (keep-alive connections reused across multiple requests to the same destination) amortizes that setup cost across many requests instead of paying it repeatedly, which matters a lot at scale — without it, a high-traffic service mesh can spend a surprisingly large fraction of total latency and CPU just on repeated connection establishment rather than actual request processing."}, {"section": "System Design", "question": "What's the fundamental difference between SQL and NoSQL databases, and how do you choose between them?", "answer": "**SQL (relational)** databases enforce a fixed schema, support powerful multi-table joins, and provide strong ACID transaction guarantees — well-suited when data has clear relationships and consistency/correctness matters a lot (financial records, inventory). **NoSQL** databases trade some of that structure/consistency for flexibility and horizontal scalability: **document stores** (MongoDB) for semi-structured, evolving schemas; **key-value stores** (Redis, DynamoDB) for simple, extremely fast lookups by key; **wide-column stores** (Cassandra) for massive write throughput across many nodes; **graph databases** (Neo4j) for deeply relationship-heavy queries (social graphs, recommendation engines). The choice comes down to: how rigid/related is your data, how much scale do you need, and how strict does consistency need to be — many real systems use **both**, picking the right tool per use case (e.g. Postgres for core transactional data, Redis for caching/sessions, Elasticsearch for full-text search) rather than one database for everything."}, {"section": "System Design", "question": "What is database indexing, and why does it speed up reads while slowing down writes?", "answer": "An index is an auxiliary data structure (commonly a **B-tree**, sometimes a hash index) that maps a column's values to the location of the corresponding rows, letting the database jump directly to matching rows instead of scanning the entire table (a 'full table scan'). This turns an O(n) lookup into roughly O(log n). The trade-off: every `INSERT`/`UPDATE`/`DELETE` now also has to update every index on that table to keep them in sync with the data, so writes get slower and use more storage as you add more indexes. The practical implication: index columns you frequently filter/sort/join on, but don't reflexively index every column — on a write-heavy table, excessive indexing can become the actual bottleneck."}, {"section": "System Design", "question": "What's the difference between database replication and sharding?", "answer": "**Replication** copies the *same* full dataset across multiple servers (replicas) — primarily for read scalability (spread read queries across replicas) and fault tolerance (a replica can be promoted if the primary fails); every replica has all the data. **Sharding** (horizontal partitioning) splits the data itself across multiple servers, where each shard holds only a *subset* of the rows — primarily for write scalability and handling datasets too large for one machine to hold at all. They're complementary, not alternatives: a large system commonly shards the data across many database clusters, and *each shard* is itself replicated for fault tolerance — solving two different scaling dimensions (read capacity vs. total data/write capacity) simultaneously."}, {"section": "System Design", "question": "What's the difference between primary-replica (master-slave) and multi-master replication?", "answer": "**Primary-replica**: all writes go to a single primary node, which then propagates changes to one or more read-only replicas. Simple to reason about (one clear source of truth for writes), but the primary is a write bottleneck and, until failover completes, a SPOF for writes specifically. **Multi-master**: multiple nodes can all accept writes simultaneously, which removes the single-write-bottleneck and improves write availability, but introduces the hard problem of **conflict resolution** — what happens when two masters accept conflicting writes to the same record before they've synced? Resolving this requires strategies like last-write-wins (simple but can silently lose data), vector clocks, or application-level conflict resolution logic, which is why multi-master setups are considerably more complex to operate correctly."}, {"section": "System Design", "question": "What is database sharding, and what are the common sharding strategies?", "answer": "Sharding splits a large dataset across multiple database instances so no single one needs to hold (or serve queries for) the entire dataset. Common strategies: **Range-based** (shard by a value range, e.g. user IDs 1–1M on shard A, 1M–2M on shard B — simple, but can create hot shards if data/access isn't uniform across ranges); **Hash-based** (hash the shard key and use the result to pick a shard — distributes load evenly, but makes range queries across multiple keys expensive since related data may land on different shards); and **Directory-based** (a lookup service maps each key to its shard explicitly — flexible and supports easy rebalancing, but adds an extra lookup hop and that directory service itself becomes a critical dependency). The right shard key is one that distributes load evenly *and* keeps commonly-queried-together data on the same shard where possible."}, {"section": "System Design", "question": "What's a 'hot shard,' and how do you avoid creating one?", "answer": "A hot shard is one that receives disproportionately more traffic/load than the others, becoming a bottleneck even though the overall cluster has plenty of spare capacity elsewhere — e.g. if you shard by user ID range and one celebrity user's ID happens to fall in a particular range that also handles a huge volume of unrelated requests, or if you shard a global feed by 'day' and today's shard obviously gets vastly more traffic than last year's. Avoiding this requires choosing a shard key that distributes load **evenly and unpredictably enough** that no single shard systematically attracts a disproportionate share — hash-based sharding on a high-cardinality key (like user ID, hashed) is more resistant to this than range-based sharding on a naturally skewed access pattern (like 'most recent data,' which is almost always hotter than old data)."}, {"section": "System Design", "question": "What is database normalization, and when would you deliberately denormalize?", "answer": "**Normalization** organizes data to minimize redundancy — each fact is stored exactly once, with relationships expressed via foreign keys, typically following normal forms (1NF, 2NF, 3NF) that eliminate duplicate/derivable data. This keeps writes consistent (update one place, not many copies) but requires **joins** to reassemble related data for reads. **Denormalization** deliberately duplicates some data to avoid those joins — e.g. storing a post's author name directly on the post record instead of joining to a users table every time a feed is rendered. You denormalize when read performance at scale matters more than the storage cost and write-time complexity of keeping duplicated data in sync (which you then have to handle explicitly, e.g. updating all duplicated copies of a username if the user changes it) — a common pattern in read-heavy systems like social feeds, far less appropriate for data where consistency is critical (financial ledgers)."}, {"section": "System Design", "question": "What's the difference between optimistic and pessimistic locking, and when would you use each?", "answer": "**Pessimistic locking** acquires a lock on a row *before* reading/modifying it, blocking any other transaction from touching it until the lock is released — safe by construction, but reduces concurrency since other transactions must wait, and can cause deadlocks if not managed carefully. **Optimistic locking** doesn't lock anything upfront; instead it reads a version number (or timestamp) alongside the data, and on write, checks that the version hasn't changed since the read — if it has, the write is rejected and the caller retries. Optimistic locking scales much better under **low contention** (most of the time nobody else touched the row, so no wasted locking overhead), but performs poorly under **high contention** (frequent retries as conflicting writes pile up) — pessimistic locking is the better choice when conflicts are expected to be frequent."}, {"section": "System Design", "question": "What is a write-ahead log (WAL), and why do most databases use one?", "answer": "A WAL is a sequential, append-only log where every change is recorded *before* it's actually applied to the main data files — the database writes 'I'm about to do X' to the log first, flushes that to durable storage, and only then applies the change to the actual data structures (which can happen lazily/in batches, since the log already guarantees durability). This gives you crash recovery: if the database crashes mid-operation, on restart it can replay the WAL to recover any changes that were logged but not yet fully applied to the main data files, ensuring no acknowledged write is ever lost. It also lets databases batch/optimize the actual data-file writes for performance, since durability is already guaranteed by the (cheaper, sequential, append-only) log write."}, {"section": "System Design", "question": "What's the difference between ACID guarantees and the BASE model often associated with distributed/NoSQL systems?", "answer": "**ACID** (Atomicity, Consistency, Isolation, Durability) is the traditional relational-database guarantee: transactions either fully complete or fully roll back, the database never violates its constraints, concurrent transactions don't interfere with each other, and committed writes survive crashes. **BASE** (Basically Available, Soft state, Eventually consistent) describes the looser guarantees many distributed NoSQL systems make instead: the system stays available even under partial failure, its state may be in flux/not immediately consistent across replicas, but it converges to consistency given enough time without new writes. BASE isn't 'worse ACID' — it's a deliberate trade-off prioritizing availability and partition tolerance (the AP side of CAP) over the strict consistency ACID guarantees, appropriate when eventual consistency is an acceptable cost for better scalability/availability."}, {"section": "System Design", "question": "How would you design a database schema to handle a many-to-many relationship at scale, e.g. users following other users?", "answer": "Use a **join/association table** rather than trying to store arrays of IDs directly in either table: `follows(follower_id, followee_id, created_at)`, with a composite primary key (or unique index) on `(follower_id, followee_id)` to prevent duplicate follows, and separate indexes on each column individually to efficiently answer both 'who does this user follow' and 'who follows this user' queries. At very large scale (millions of users with huge follower counts — the 'celebrity problem'), this table itself often needs sharding (commonly by `follower_id`, since 'who do I follow' is usually the more latency-sensitive read for rendering a feed), and a system might additionally denormalize follower/following *counts* onto the user record itself rather than running a `COUNT(*)` over potentially millions of rows on every profile view."}, {"section": "System Design", "question": "Why is connection pooling especially critical in a microservices architecture with many service instances connecting to a shared database?", "answer": "Each service instance maintains its own connection pool, and the database has a hard ceiling on total concurrent connections it can support (often in the low thousands, limited by memory per connection and OS-level constraints). If you have, say, 50 service instances each opening 20 connections 'just in case,' that's 1,000 connections before accounting for any other services — easily exhausting the database's limit even if actual concurrent query load is much lower. This requires deliberately sizing each pool conservatively, monitoring total connections across all instances, and sometimes introducing a centralized connection proxy/pooler (like PgBouncer for Postgres) that multiplexes many application-level connections down to a much smaller number of actual database connections."}, {"section": "System Design", "question": "Why add a caching layer, and what are the main caching strategies (cache-aside, write-through, write-back)?", "answer": "Caching avoids repeating expensive work (a slow DB query, a costly computation) by storing the result somewhere faster to access on subsequent requests, directly improving latency and reducing load on the underlying system. **Cache-aside** (lazy loading): the application checks the cache first; on a miss, it queries the source of truth and populates the cache for next time — simple and resilient (a cache outage just means more misses, not failure), but the first request after expiry/miss always pays the full cost. **Write-through**: every write goes to the cache and the database synchronously together — reads are always fresh, but writes are slower (you're paying both costs every time) and the cache holds data that might never actually be read. **Write-back (write-behind)**: writes go to the cache immediately and are asynchronously flushed to the database later — very fast writes, but risks data loss if the cache fails before the flush happens, so it's used only where that risk is acceptable."}, {"section": "System Design", "question": "What is cache invalidation, and why is it considered one of the genuinely hard problems in computer science?", "answer": "Cache invalidation is the problem of knowing **when** cached data is stale and needs to be removed/refreshed, so the cache doesn't keep serving outdated results after the underlying data changes. It's hard because there's no perfect general solution: invalidate too aggressively (e.g. very short TTLs) and you lose most of the cache's benefit; invalidate too lazily and users see stale data; and explicitly invalidating on every write requires the write path to know about (and successfully reach) every cache that might hold a copy of that data, which becomes genuinely difficult once data is cached in multiple places (CDN, app-level cache, browser cache) with different invalidation mechanisms and potential network failures between the write and the invalidation call."}, {"section": "System Design", "question": "What's the difference between a local (in-process) cache and a distributed cache like Redis?", "answer": "A **local cache** (e.g. an in-memory dict, or a library like `functools.lru_cache`) lives inside a single application process's memory — extremely fast (no network hop) but only visible to that one process; if you run 10 instances of your service behind a load balancer, you effectively have 10 separate, inconsistent caches, and a cache invalidation on one instance doesn't affect the others. A **distributed cache** (Redis, Memcached) runs as a separate shared service that all instances talk to over the network — slightly slower than local memory due to the network hop, but consistent across all instances and able to hold far more data than any single process's memory could. Many systems use both in a tiered approach: a small local cache for the hottest data (lowest possible latency) backed by a distributed cache for everything else."}, {"section": "System Design", "question": "What is cache eviction, and what are the common eviction policies?", "answer": "Since cache memory is finite, eviction is the process of removing entries to make room for new ones once the cache is full. **LRU (Least Recently Used)**: evict whichever entry hasn't been accessed for the longest time — works well when recent access predicts future access (true for most real-world access patterns). **LFU (Least Frequently Used)**: evict whichever entry has been accessed the fewest times overall — better than LRU when some items are consistently popular over long periods even with oc
